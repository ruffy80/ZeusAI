<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — ZeusAI</title>
  <style>
    body { background:#05060e; color:#e6f1ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin:0; padding:48px; }
    main { max-width: 960px; margin:0 auto; }
    h1 { color:#00d4ff; }
    a { color:#00d4ff; }
    .card { background:#0b0f1f; border:1px solid #1b2440; border-radius:12px; padding:24px; margin:16px 0; }
    button { background:#00d4ff; color:#05060e; border:none; padding:12px 18px; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
<main>
  <h1>Dashboard</h1>
  
    <div class="card" id="snap">Loading snapshot…</div>
    <script>
      async function refresh(){
        try {
          const r = await fetch('/snapshot'); const d = await r.json();
          document.getElementById('snap').innerHTML = '<pre style="white-space:pre-wrap">'+JSON.stringify(d,null,2)+'</pre>';
        } catch(e) { document.getElementById('snap').textContent = 'offline'; }
      }
      refresh(); setInterval(refresh, 5000);
    </script>
  <p style="margin-top:48px;opacity:.6;font-size:.85em">Auto-generated by Zeus Autonomous Core. Page is wired to live unicorn APIs.</p>
</main>
<script src="/zac-bridge.js"></script>
</body>
</html>
