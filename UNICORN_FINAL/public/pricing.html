<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pricing — ZeusAI</title>
  <style>
    body { background:#05060e; color:#e6f1ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin:0; padding:48px; }
    main { max-width: 960px; margin:0 auto; }
    h1 { color:#00d4ff; }
    a { color:#00d4ff; }
    .card { background:#0b0f1f; border:1px solid #1b2440; border-radius:12px; padding:24px; margin:16px 0; }
    button { background:#00d4ff; color:#05060e; border:none; padding:12px 18px; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
<main>
  <h1>Pricing</h1>
  
    <div class="card" id="pricing-list">Loading live pricing from unicorn…</div>
    <script>
      fetch('/api/catalog/master').then(r=>r.json()).then(d=>{
        const items = (d && (d.items||d.products||d.catalog||[]));
        const el = document.getElementById('pricing-list');
        if (!items.length) { el.textContent = 'No services available yet.'; return; }
        el.innerHTML = items.slice(0,30).map(it => '<div style="padding:12px 0;border-bottom:1px solid #1b2440"><strong>'+(it.name||it.id)+'</strong> — '+(it.price?('$'+it.price):'price on request')+'</div>').join('');
      }).catch(()=>{document.getElementById('pricing-list').textContent='Unicorn offline.';});
    </script>
  <p style="margin-top:48px;opacity:.6;font-size:.85em">Auto-generated by Zeus Autonomous Core. Page is wired to live unicorn APIs.</p>
</main>
<script src="/zac-bridge.js"></script>
</body>
</html>
