name: Deploy UNICORN_FINAL (Hetzner)

on:
  push:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/**'
      - '.github/workflows/hetzner-deploy.yml'
  workflow_dispatch:

concurrency:
  group: unicorn-final-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate UNICORN_FINAL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UNICORN_FINAL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'UNICORN_FINAL/.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: CI=1 npm run lint

      - name: Test
        run: CI=1 npm test

      - name: Forward-only preflight
        run: CI=1 npm run preflight:forward

  deploy-hetzner:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: validate
    # if eliminat temporar pentru validare YAML completă
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Hetzner API credential
        run: |
          if [ -n "${{ secrets.HETZNER_API_KEY }}" ]; then
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_KEY }}" >> "$GITHUB_ENV"
          else
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Backup unicorn site on Hetzner (pre-deploy)
        run: |
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} '
            set -e
            cd "${{ secrets.HETZNER_DEPLOY_PATH }}"
            if [ -f scripts/create-backup.sh ]; then
              bash scripts/create-backup.sh "$(pwd)"
            else
              echo "Backup script not found! Skipping backup."
            fi
          '


      - name: Sync code to Hetzner
        id: sync_hetzner
        run: |
          RELEASE_PATH="/var/www/unicorn/releases/${{ github.sha }}-${{ github.run_id }}/UNICORN_FINAL"
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} \
            "mkdir -p '$RELEASE_PATH'"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='logs' \
            --exclude='*.local' \
            -e "ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no" \
            ./UNICORN_FINAL/ \
            ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }}:$RELEASE_PATH/
          echo "RELEASE_PATH=$RELEASE_PATH" >> "$GITHUB_ENV"

      - name: Forward-only atomic promote on Hetzner
        id: restart_hetzner
        run: |
          RELEASE_PATH="/var/www/unicorn/releases/${{ github.sha }}-${{ github.run_id }}/UNICORN_FINAL"
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} '
            set -e
            cd "'"$RELEASE_PATH"'"
            for key in HETZNER_API_KEY HETZNER_API_TOKEN PUBLIC_APP_URL SITE_DOMAIN \
                       BTC_WALLET_ADDRESS OWNER_BTC_ADDRESS OWNER_NAME OWNER_EMAIL ADMIN_EMAIL \
                       DR_AUTOPILOT_ENABLED DR_BACKEND DR_LOCAL_DIR DR_RETENTION_DAYS; do
              [ -f .env ] && sed -i "/^${key}=/d" .env || true
            done
            printf "%s\n" "HETZNER_API_KEY=${HETZNER_API_VALUE}" >> .env
            printf "%s\n" "HETZNER_API_TOKEN=${HETZNER_API_VALUE}" >> .env
            printf "PUBLIC_APP_URL=https://zeusai.pro\nSITE_DOMAIN=zeusai.pro\n" >> .env
            printf "BTC_WALLET_ADDRESS=bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e\n" >> .env
            printf "OWNER_BTC_ADDRESS=bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e\n" >> .env
            printf "OWNER_NAME=Vladoi Ionut\nOWNER_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
            printf "ADMIN_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
            # Disaster Recovery: zero-cost local backups (until revenue justifies S3)
            printf "DR_AUTOPILOT_ENABLED=1\n" >> .env
            printf "DR_BACKEND=local\n" >> .env
            printf "DR_LOCAL_DIR=/root/unicorn-backups\n" >> .env
            printf "DR_RETENTION_DAYS=14\n" >> .env
            chmod +x scripts/*.sh scripts/*.js 2>/dev/null || true
            GITHUB_SHA="${{ github.sha }}" PUBLIC_URL="https://zeusai.pro" bash scripts/deploy-atomic-forward.sh "'"$RELEASE_PATH"'" "/var/www/unicorn/UNICORN_FINAL"
          '


      - name: Sync nginx config to Hetzner (atomic + nginx -t guard)
        id: sync_nginx
        continue-on-error: true
        run: |
          # Copy the canonical config to a staging path on the server, validate
          # with `nginx -t`, then atomically swap into sites-available and
          # reload. Never breaks live nginx — if validation fails we abort.
          scp -P ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no \
            ./UNICORN_FINAL/scripts/nginx-unicorn.conf \
            ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }}:/tmp/nginx-unicorn.conf.staging
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} '
              set -e
              SITE_AVAIL=/etc/nginx/sites-available/unicorn
              SITE_ENABLED=/etc/nginx/sites-enabled/unicorn
              # Backup current config (timestamped) before any swap
              if [ -f "$SITE_AVAIL" ]; then
                sudo cp "$SITE_AVAIL" "${SITE_AVAIL}.bak.$(date -u +%Y%m%dT%H%M%SZ)"
              fi
              # Stage the new config in-place and validate
              sudo mv /tmp/nginx-unicorn.conf.staging "${SITE_AVAIL}.new"
              sudo cp "${SITE_AVAIL}.new" "$SITE_AVAIL"
              # Make sure the symlink is enabled
              if [ ! -L "$SITE_ENABLED" ]; then
                sudo ln -sf "$SITE_AVAIL" "$SITE_ENABLED"
              fi
              # Validate full nginx config (includes default deny rules from nginx.conf)
              if sudo nginx -t; then
                sudo systemctl reload nginx
                echo "[nginx] reloaded OK"
              else
                echo "[nginx] VALIDATION FAILED — restoring last backup"
                LAST_BAK=$(ls -1t ${SITE_AVAIL}.bak.* 2>/dev/null | head -1)
                if [ -n "$LAST_BAK" ]; then
                  sudo cp "$LAST_BAK" "$SITE_AVAIL"
                  sudo nginx -t && sudo systemctl reload nginx || true
                fi
                exit 1
              fi
              sudo rm -f "${SITE_AVAIL}.new"
            '

      - name: Healthcheck unicorn site (forward-only, no rollback)
        run: |
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} \
            'cd /var/www/unicorn/UNICORN_FINAL && BASE_URL=http://127.0.0.1:3000 PUBLIC_URL=https://zeusai.pro bash scripts/smoke-forward-only.sh'
          echo "Healthcheck unicorn OK. Forward-only deploy reușit."

      - name: Smoke tests unicorn (fail closed, no rollback)
        run: |
          echo "[UNICORN] Rulez smoke-forward-only.sh pe server..."
          ssh -p ${{ secrets.HETZNER_DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.HETZNER_DEPLOY_USER }}@${{ secrets.HETZNER_HOST }} \
            'cd /var/www/unicorn/UNICORN_FINAL && BASE_URL=http://127.0.0.1:3000 PUBLIC_URL=https://zeusai.pro bash scripts/smoke-forward-only.sh'
          echo "[UNICORN] Smoke tests OK. Deploy complet fără rollback/downgrade."

      # Fallback și fail steps eliminate temporar pentru validare YAML completă. Pot fi reintroduse după testare.

  # Jobul deploy-hetzner-webhook a fost eliminat temporar pentru validare YAML completă. Poate fi reintrodus după testare.
