# Unicorn maintenance snippet — never-502 fallback
# Included from every zeusai.pro server block (HTTP + HTTPS) by
# scripts/nginx-patch-maintenance.py. When BOTH unicorn-site:3001 and
# unicorn-backend:3000 are down, nginx normally returns a bare 502
# Bad Gateway. With this snippet active, nginx instead serves a friendly,
# auto-refreshing static HTML page from /var/www/maintenance/index.html
# (installed by scripts/install-maintenance-page.sh). nginx itself stays up
# even when every Node worker has crashed, so the user never sees the brown
# default 502 screen again.
#
# The static page is small (~3KB) and contains a meta-refresh that retries
# every 15s so visitors recover automatically the moment the upstream
# clusters come back. Safe to include inside any server { ... } block; the
# named location is `internal` so it cannot be hit directly.

# Map 5xx upstream failures to our static page. We INCLUDE 500 too because
# PM2 can occasionally leave a half-booted worker that returns 500 from
# uncaughtException paths before its own handler is mounted.
error_page 500 502 503 504 = @zeus_maintenance;

location @zeus_maintenance {
    internal;
    root /var/www/maintenance;
    # Always serve the same page no matter what URI 5xx'd.
    try_files /index.html =503;
    default_type "text/html; charset=utf-8";
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Retry-After "30" always;
    add_header X-Zeus-Maintenance "1" always;
}
