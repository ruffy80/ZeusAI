# nginx-unicorn.conf — OPTIMIZED: Zero Downtime + HTTP/2 + HSTS + Hardening
# Unicorn AI — Nginx config completa (multi-subdomain, rate limiting, security)
# Suporta: zeusai.pro, www.zeusai.pro, api.zeusai.pro, orchestrator.zeusai.pro, *.zeusai.pro
# Copiaza in /etc/nginx/sites-available/unicorn si activeaza cu:
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   nginx -t && systemctl reload nginx
# SSL este configurat automat de certbot --nginx.
# HTTP/2 este activat automat pe blocurile HTTPS adaugate de certbot.

# ── Upstream backend cu health check pasiv (Zero Downtime) ───────────────────
upstream unicorn_backend {
    server 127.0.0.1:3000;
    keepalive 64;                       # conexiuni persistente catre backend
}

# Mapeaza header-ul Connection pentru WebSocket vs HTTP obisnuit
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Microcaching pentru răspunsuri API dinamice (reduce latenta 10-100x) ─────
proxy_cache_path /var/cache/nginx/unicorn
    levels=1:2
    keys_zone=unicorn_api_cache:10m
    max_size=500m
    inactive=10m
    use_temp_path=off;

# Rate limiting zones — îmbunătățite
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=ai:10m      rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Default server: IP-based requests (health checks from CI, load balancers) ──
# Handles requests that don't match any server_name (e.g. http://SERVER_IP/health)
# Returns 200 for /health and /api/health; proxies everything else to backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health check endpoint — returns 200 directly (no redirect) for monitoring
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    location = /api/health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # All other IP-based requests → redirect to main domain
    location / {
        return 301 https://zeusai.pro$request_uri;
    }
}

# ── Wildcard catch-all: orice *.zeusai.pro necunoscut → redirect spre main ────
# Aceasta trebuie sa fie dupa default_server (subdomeniile explicite au prioritate)
server {
    listen 80;
    listen [::]:80;
    server_name *.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    return 301 https://zeusai.pro$request_uri;
}

# ── Redirect HTTP → HTTPS: zeusai.pro + www ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zeusai.pro www.zeusai.pro;

    # Permite certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Tot traficul HTTP → HTTPS (301 permanent)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── zeusai.pro + www — HTTPS (HTTP/2) ─────────────────────────────────────────
# NOTA: certbot --nginx va adauga/actualiza blocul SSL (listen 443 ssl).
# Parametrii HTTP/2 si SSL de mai jos sunt pre-configurati si vor fi activati
# automat dupa prima rulare certbot.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zeusai.pro www.zeusai.pro;

    # SSL — certbot va popula aceste valori:
    # ssl_certificate     /etc/letsencrypt/live/zeusai.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/zeusai.pro/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL Hardening (TLS 1.2/1.3 only) ──────────────────────────────────
    ssl_protocols         TLSv1.2 TLSv1.3;
    ssl_ciphers           ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache     shared:SSL:20m;
    ssl_session_timeout   1d;
    ssl_session_tickets   off;
    ssl_stapling          on;
    ssl_stapling_verify   on;

    # ── Compresie gzip optimizată ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/opentype application/font-woff
        application/font-woff2;
    gzip_min_length 256;
    gzip_disable "MSIE [1-6]\.";

    # ── Limitare conexiuni ─────────────────────────────────────────────────
    limit_conn conn_limit 100;

    # ── Security headers complete ──────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Robots-Tag              "index, follow"              always;

    # ── Proxy comun ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries   2;
    proxy_next_upstream_timeout 10s;

    # ── Buffers optimizate ─────────────────────────────────────────────────
    proxy_buffer_size       8k;
    proxy_buffers           16 8k;
    proxy_busy_buffers_size 32k;
    proxy_temp_file_write_size 64k;

    # ── SSE (Server-Sent Events) ───────────────────────────────────────────
    location /stream {
        proxy_pass         http://unicorn_backend;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;
        chunked_transfer_encoding on;
    }

    # ── Health check (fara rate limiting, fara cache) ──────────────────────
    location = /health {
        proxy_pass         http://unicorn_backend;
        proxy_cache        off;
        add_header         Cache-Control "no-store" always;
        access_log         off;
    }

    location = /api/health {
        proxy_pass         http://unicorn_backend;
        proxy_cache        off;
        add_header         Cache-Control "no-store" always;
        access_log         off;
    }

    # ── Auth endpoints – rate limiting strict ──────────────────────────────
    location ~ ^/api/auth/ {
        limit_req  zone=auth burst=15 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_cache        off;
    }

    # ── AI endpoints — rate limiting dedicat ───────────────────────────────
    location ~ ^/api/(chat|ai|multi-router)/ {
        limit_req  zone=ai burst=10 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_cache        off;
    }

    # ── API endpoints cu microcaching (1 secundă) ──────────────────────────
    location ~ ^/api/(?!auth|chat|ai|multi-router|stream) {
        limit_req  zone=api burst=30 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        # Microcaching: 1s TTL reduce burst-urile de cereri identice
        proxy_cache         unicorn_api_cache;
        proxy_cache_valid   200 1s;
        proxy_cache_valid   404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock    on;
        add_header          X-Cache-Status $upstream_cache_status always;
    }

    # ── Static assets — cache agresiv ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        proxy_pass         http://unicorn_backend;
        add_header         Cache-Control     "public, max-age=31536000, immutable";
        add_header         X-Content-Type-Options "nosniff" always;
        expires            1y;
        proxy_cache        unicorn_api_cache;
        proxy_cache_valid  200 24h;
        proxy_cache_use_stale error timeout updating;
        access_log         off;
    }

    # ── Default: proxy catre backend ──────────────────────────────────────
    location / {
        limit_req  zone=general burst=30 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── api.zeusai.pro — subdomain dedicat pentru API ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.zeusai.pro;

    # SSL — certbot va popula aceste valori
    ssl_protocols         TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache     shared:SSL:10m;
    ssl_session_timeout   1d;
    ssl_session_tickets   off;
    ssl_stapling          on;
    ssl_stapling_verify   on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json application/javascript text/plain;
    gzip_min_length 256;

    limit_conn conn_limit 100;

    add_header X-Content-Type-Options    "nosniff"    always;
    add_header X-Frame-Options           "DENY"        always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Request-ID              $request_id   always;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    # Health check fara cache/logging
    location = /api/health {
        proxy_pass         http://unicorn_backend;
        proxy_cache        off;
        add_header         Cache-Control "no-store" always;
        access_log         off;
    }

    # Auth – rate limiting strict
    location ~ ^/api/auth/ {
        limit_req  zone=auth burst=15 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_cache        off;
    }

    # AI endpoints — rate limiting dedicat, timeout extins
    location ~ ^/api/(chat|ai|multi-router)/ {
        limit_req  zone=ai burst=10 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_cache        off;
    }

    # Toate celelalte requesturi API
    location / {
        limit_req  zone=api burst=30 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── orchestrator.zeusai.pro — subdomain pentru orchestrator ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name orchestrator.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name orchestrator.zeusai.pro;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    limit_conn conn_limit 30;

    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;

    location / {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass         http://unicorn_backend;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
# Nota: certbot --nginx va adauga automat blocurile server pentru HTTPS (port 443)
# cu ssl_certificate si ssl_certificate_key dupa prima rulare cu succes.
