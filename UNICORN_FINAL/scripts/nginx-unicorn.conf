# nginx-unicorn.conf
# Configurare Nginx pentru Unicorn AI – proxy invers catre portul 3000
# Copiaza in /etc/nginx/sites-available/unicorn si activeaza cu:
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   nginx -t && systemctl reload nginx
# SSL este configurat automat de certbot (--nginx).

# Mapeaza header-ul Connection pentru WebSocket vs HTTP obisnuit
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP → HTTPS (certbot va adauga blocul HTTPS la prima rulare)
server {
    listen 80;
    listen [::]:80;
    server_name zeusai.pro www.zeusai.pro api.zeusai.pro orchestrator.zeusai.pro;

    # Permite certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Compresie gzip pentru raspunsuri text/JSON
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Limita conexiuni simultane per IP
    limit_conn conn_limit 50;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # SSE (Server-Sent Events) – dezactiveaza buffering-ul si extinde timeout-ul
    location /stream {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;
        chunked_transfer_encoding on;
    }

    # Auth endpoints – stricter rate limiting
    location ~ ^/api/auth/ {
        limit_req  zone=auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # API endpoints – moderate rate limiting
    location ~ ^/api/ {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Static assets caching (React build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_valid  200 7d;
        add_header         Cache-Control     "public, max-age=604800, immutable";
        expires            7d;
    }

    # API si orice alta ruta – proxy catre Node pe portul 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Suport WebSocket: trimitere header Upgrade doar cand clientul il solicita
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        # Buffer settings for better performance
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }
}
# Nota: certbot --nginx va adauga automat blocul server pentru HTTPS (port 443)
# cu ssl_certificate si ssl_certificate_key dupa prima rulare cu succes.
