# nginx-unicorn.conf — OPTIMIZED: Zero Downtime + HTTP/2 + HSTS + Hardening
# Unicorn AI — Nginx config completa (multi-subdomain, rate limiting, security)
# Suporta: zeusai.pro, www.zeusai.pro, api.zeusai.pro, orchestrator.zeusai.pro, *.zeusai.pro
# Copiaza in /etc/nginx/sites-available/unicorn si activeaza cu:
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   nginx -t && systemctl reload nginx
# SSL este configurat automat de certbot --nginx.
# HTTP/2 este activat automat pe blocurile HTTPS adaugate de certbot.

# ── Upstream backend cu health check pasiv (Zero Downtime) ───────────────────
upstream unicorn_backend {
    server 127.0.0.1:3000;
    keepalive 64;                       # conexiuni persistente catre backend
}

# Mapeaza header-ul Connection pentru WebSocket vs HTTP obisnuit
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Microcaching pentru răspunsuri API dinamice (reduce latenta 10-100x) ─────
proxy_cache_path /var/cache/nginx/unicorn
    levels=1:2
    keys_zone=unicorn_api_cache:10m
    max_size=500m
    inactive=10m
    use_temp_path=off;

# Rate limiting zones — îmbunătățite
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=ai:10m      rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Default server: IP-based requests (health checks from CI, load balancers) ──
# Handles requests that don't match any server_name (e.g. http://SERVER_IP/health)
# Returns 200 for /health and /api/health; proxies everything else to backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health check endpoint — returns 200 directly (no redirect) for monitoring
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    location = /api/health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # All other IP-based requests → redirect to main domain
    location / {
        return 301 https://zeusai.pro$request_uri;
    }
}

# ── Wildcard catch-all: orice *.zeusai.pro necunoscut → redirect spre main ────
# Aceasta trebuie sa fie dupa default_server (subdomeniile explicite au prioritate)
server {
    listen 80;
    listen [::]:80;
    server_name *.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    return 301 https://zeusai.pro$request_uri;
}

# ── Redirect HTTP → HTTPS: zeusai.pro + www ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zeusai.pro www.zeusai.pro;

    # Permite certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Tot traficul HTTP → HTTPS (301 permanent)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) — certbot --nginx adaugă automat blocurile server SSL ──────────
# După rularea certbot, aceasta fișier va fi modificat să includă blocuri:
#   server { listen 443 ssl; server_name zeusai.pro ...; ssl_certificate ...; ... }
#   server { listen 443 ssl; server_name api.zeusai.pro ...; ... }
#   server { listen 443 ssl; server_name orchestrator.zeusai.pro ...; ... }
# NU adăuga listen 443 ssl fără ssl_certificate — nginx refuză să pornească!

# ── api.zeusai.pro — subdomain dedicat pentru API ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / { return 301 https://$host$request_uri; }
}

# ── orchestrator.zeusai.pro — subdomain pentru orchestrator ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name orchestrator.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / { return 301 https://$host$request_uri; }
}

# Nota: certbot --nginx va adauga automat blocurile server pentru HTTPS (port 443)
# cu ssl_certificate si ssl_certificate_key dupa prima rulare cu succes.
