# nginx-unicorn.conf — OPTIMIZED: Zero Downtime + HTTP/2 + HSTS + Hardening
# Unicorn AI — Nginx config completa (multi-subdomain, rate limiting, security)
# Suporta: zeusai.pro, www.zeusai.pro, api.zeusai.pro, orchestrator.zeusai.pro, *.zeusai.pro
# Copiaza in /etc/nginx/sites-available/unicorn si activeaza cu:
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   nginx -t && systemctl reload nginx
# SSL este configurat automat de certbot --nginx.
# HTTP/2 este activat automat pe blocurile HTTPS adaugate de certbot.

# ── Upstream backend cu health check pasiv (Zero Downtime) ───────────────────
upstream unicorn_backend {
    server 127.0.0.1:3000;
    keepalive 64;                       # conexiuni persistente catre backend
}

# ── Upstream site (unicorn-site, PM2 cluster on port 3001) ───────────────────
# SSR layer (src/site/v2/shell.js, template.js) — JSON-LD, hreflang, preload
# headers, polish-pack assets. Backed by unicorn_backend as fallback (backup)
# so a site outage degrades to the backend's getSiteHtml() instead of 502.
# Public traffic for `/`, `/stream`, static assets is routed here while every
# `/api/*` and `/internal/*` stays on unicorn_backend (single source of truth
# for SQLite, ledgers, orchestrators).
upstream unicorn_site {
    server 127.0.0.1:3001       max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3000 backup;       # graceful fallback when site is down
    keepalive 32;
}

# Mapeaza header-ul Connection pentru WebSocket vs HTTP obisnuit
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Microcaching pentru răspunsuri API dinamice (reduce latenta 10-100x) ─────
proxy_cache_path /var/cache/nginx/unicorn
    levels=1:2
    keys_zone=unicorn_api_cache:10m
    max_size=500m
    inactive=10m
    use_temp_path=off;

# Rate limiting zones — îmbunătățite
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=ai:10m      rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Default server: IP-based requests (health checks from CI, load balancers) ──
# Handles requests that don't match any server_name (e.g. http://SERVER_IP/health)
# Returns 200 for /health and /api/health; proxies everything else to backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health check endpoint — returns 200 directly (no redirect) for monitoring
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    location = /api/health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # All other IP-based requests → proxy to backend
    # (redirect to HTTPS zeusai.pro would fail if SSL cert not yet obtained)
    location / {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── Wildcard catch-all: orice *.zeusai.pro necunoscut → redirect spre main ────
# Aceasta trebuie sa fie dupa default_server (subdomeniile explicite au prioritate)
server {
    listen 80;
    listen [::]:80;
    server_name *.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    return 301 https://zeusai.pro$request_uri;
}

# ── zeusai.pro + www: proxy direct la backend (HTTP funcțional fără SSL) ──────
# Certbot --nginx va adăuga automat blocul return 301 https://...
# după ce certificatul SSL este emis. Până atunci site-ul este accesibil pe HTTP.
server {
    listen 80;
    listen [::]:80;
    server_name zeusai.pro www.zeusai.pro;

    # Permite certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location = /health {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /sitemap.xml {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # ── Backend (source of truth) — APIs, internal endpoints, .well-known ────
    # Everything that touches SQLite, ledgers, orchestrators, audit logs MUST
    # stay on unicorn_backend (singleton fork-mode). The site cluster only
    # serves SSR HTML/SSE and proxies APIs through itself when needed.
    location /api/ {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /internal/ {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /.well-known/ {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /.well-known/unicorn-integrity.json {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /stream {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /snapshot {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # ── Static assets served by unicorn-site (SSR layer) ─────────────────────
    # Cache-Control headers come from the upstream (immutable for hashed assets,
    # no-store for HTML). Nginx microcache helps for the unhashed entry points.
    location /assets/ {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location /icons/ {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /manifest.json {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /sw.js {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location / {
        proxy_pass         http://unicorn_site;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_next_upstream  error timeout http_502 http_503 http_504;
        proxy_cache           unicorn_api_cache;
        proxy_cache_valid     200 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_bypass    $http_cache_control;
        add_header            X-Cache-Status $upstream_cache_status;
    }
}

# ── HTTPS (port 443) — certbot --nginx adaugă automat blocurile server SSL ──────────
# După rularea certbot, aceasta fișier va fi modificat să includă blocuri:
#   server { listen 443 ssl; server_name zeusai.pro ...; ssl_certificate ...; ... }
#   server { listen 443 ssl; server_name api.zeusai.pro ...; ... }
#   server { listen 443 ssl; server_name orchestrator.zeusai.pro ...; ... }
# NU adăuga listen 443 ssl fără ssl_certificate — nginx refuză să pornească!

# ── api.zeusai.pro — subdomain dedicat pentru API ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── orchestrator.zeusai.pro — subdomain pentru orchestrator ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name orchestrator.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        proxy_pass         http://unicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# Nota: certbot --nginx va adauga automat blocurile server pentru HTTPS (port 443)
# cu ssl_certificate si ssl_certificate_key dupa prima rulare cu succes.
