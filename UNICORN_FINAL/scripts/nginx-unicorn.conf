# nginx-unicorn.conf
# Unicorn AI — Nginx config completa (multi-subdomain, rate limiting, security)
# Suporta: zeusai.pro, www.zeusai.pro, api.zeusai.pro, orchestrator.zeusai.pro, *.zeusai.pro
# Copiaza in /etc/nginx/sites-available/unicorn si activeaza cu:
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   nginx -t && systemctl reload nginx
# SSL este configurat automat de certbot --nginx.

# Mapeaza header-ul Connection pentru WebSocket vs HTTP obisnuit
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Default server: IP-based requests (health checks from CI, load balancers) ──
# Handles requests that don't match any server_name (e.g. http://SERVER_IP/health)
# Returns 200 for /health and /api/health; proxies everything else to backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health check endpoint — returns 200 directly (no redirect) for monitoring
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    location = /api/health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # All other IP-based requests → redirect to main domain
    location / {
        return 301 https://zeusai.pro$request_uri;
    }
}

# ── Wildcard catch-all: orice *.zeusai.pro necunoscut → redirect spre main ────
# Aceasta trebuie sa fie dupa default_server (subdomeniile explicite au prioritate)
server {
    listen 80;
    listen [::]:80;
    server_name *.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    return 301 https://zeusai.pro$request_uri;
}

# ── Redirect HTTP → HTTPS: zeusai.pro + www ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zeusai.pro www.zeusai.pro;

    # Permite certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Compresie gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    limit_conn conn_limit 50;

    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # SSE
    location /stream {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;
        chunked_transfer_encoding on;
    }

    # Auth endpoints – rate limiting strict
    location ~ ^/api/auth/ {
        limit_req  zone=auth burst=15 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # API endpoints
    location ~ ^/api/ {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control     "public, max-age=604800, immutable";
        expires            7d;
    }

    # Default: proxy catre backend
    location / {
        limit_req  zone=general burst=30 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }
}

# ── api.zeusai.pro — subdomain dedicat pentru API ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain;
    gzip_min_length 256;

    limit_conn conn_limit 100;

    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "DENY"        always;

    # Auth – rate limiting strict
    location ~ ^/api/auth/ {
        limit_req  zone=auth burst=15 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Toate requesturile API
    location / {
        limit_req  zone=api burst=30 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── orchestrator.zeusai.pro — subdomain pentru orchestrator ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name orchestrator.zeusai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    limit_conn conn_limit 30;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;

    location / {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
# Nota: certbot --nginx va adauga automat blocurile server pentru HTTPS (port 443)
# cu ssl_certificate si ssl_certificate_key dupa prima rulare cu succes.
