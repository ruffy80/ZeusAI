# nginx-minimal-http.conf — Config HTTP-only sigur (fără SSL)
# Utilizat ca fallback atunci când certificatul SSL nu există sau nginx-unicorn.conf
# nu poate fi încărcat (listen 443 ssl fără ssl_certificate cauzează eroare nginx).
#
# Pași după instalarea acestui config:
#   1. nginx -t && systemctl reload nginx   ← nginx pornit pe port 80
#   2. certbot --nginx -d zeusai.pro ...    ← certbot emite cert și adaugă bloc 443 ssl
#   3. nginx -t && systemctl reload nginx   ← HTTPS activ
#
# Copiază în /etc/nginx/sites-available/unicorn:
#   cp nginx-minimal-http.conf /etc/nginx/sites-available/unicorn
#   ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge pentru certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health check endpoints (fără redirect, folosit de CI/monitoring)
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
        access_log off;
    }

    location = /api/health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
        access_log off;
    }

    # SSE (Server-Sent Events)
    location /stream {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Tot traficul → backend Node.js pe portul 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
