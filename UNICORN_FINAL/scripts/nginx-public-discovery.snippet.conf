# Unicorn public-discovery snippet (inline serve, no upstream dependency)
# Included from /etc/nginx/sites-available/unicorn (managed by deploy step
# `Patch nginx public-discovery`) inside the active server blocks for
# zeusai.pro / www.zeusai.pro.
#
# These endpoints are served INLINE because:
#   1. The deployed nginx config does not declare an `unicorn_site` upstream
#      (previous proxy version failed nginx -t with "host not found").
#   2. The payloads are small/static and identical to backend/modules/polish-pack.
#   3. The `^~` / `=` modifiers guarantee priority over any default
#      `location ~ /\.` deny regex that was returning bare 403 for the
#      /.well-known/* and /humans.txt paths.

# ── ACME challenge passthrough (must stay file-based for certbot) ─────────
location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
}

# ── /.well-known/security.txt (RFC 9116) ──────────────────────────────────
location = /.well-known/security.txt {
    default_type "text/plain; charset=utf-8";
    add_header X-Polish-Pack "nginx-inline" always;
    add_header Cache-Control "public, max-age=3600" always;
    return 200 "Contact: mailto:vladoi_ionut@yahoo.com\nContact: https://zeusai.pro/security\nExpires: 2027-12-31T00:00:00.000Z\nPreferred-Languages: en, ro\nCanonical: https://zeusai.pro/.well-known/security.txt\nPolicy: https://zeusai.pro/security\nAcknowledgments: https://zeusai.pro/trust\n# Responsible disclosure: 90-day coordinated disclosure window.\n# We sign all advisories with Ed25519 (see /.well-known/did.json).\n";
}

location = /security.txt {
    default_type "text/plain; charset=utf-8";
    add_header X-Polish-Pack "nginx-inline" always;
    add_header Cache-Control "public, max-age=3600" always;
    return 200 "Contact: mailto:vladoi_ionut@yahoo.com\nContact: https://zeusai.pro/security\nExpires: 2027-12-31T00:00:00.000Z\nPreferred-Languages: en, ro\nCanonical: https://zeusai.pro/.well-known/security.txt\nPolicy: https://zeusai.pro/security\nAcknowledgments: https://zeusai.pro/trust\n# Responsible disclosure: 90-day coordinated disclosure window.\n# We sign all advisories with Ed25519 (see /.well-known/did.json).\n";
}

# ── /humans.txt ───────────────────────────────────────────────────────────
location = /humans.txt {
    default_type "text/plain; charset=utf-8";
    add_header X-Polish-Pack "nginx-inline" always;
    add_header Cache-Control "public, max-age=3600" always;
    return 200 "/* TEAM */\n  Owner & Architect: Vladoi Ionut\n  Contact: vladoi_ionut@yahoo.com\n  Site: https://zeusai.pro\n\n/* THANKS */\n  To every autonomous agent that bought, audited, or improved ZeusAI.\n\n/* SITE */\n  Built on: Node.js, plain HTTP, Express\n  Standards: RFC 9116, W3C Trace Context, RFC 6962, CycloneDX 1.5\n  Doctrine: sovereignty, signed outcomes, additive evolution.\n";
}

# ── /.well-known/agents.json (AI agent discovery) ─────────────────────────
location = /.well-known/agents.json {
    default_type "application/json; charset=utf-8";
    add_header X-Polish-Pack "nginx-inline" always;
    add_header Cache-Control "public, max-age=300" always;
    return 200 '{"version":"1.0","name":"ZeusAI Unicorn Platform","owner":"Vladoi Ionut","contact":"vladoi_ionut@yahoo.com","site":"https://zeusai.pro","endpoints":{"api":"https://zeusai.pro/api","health":"https://zeusai.pro/health","catalog":"https://zeusai.pro/api/catalog","openapi":"https://zeusai.pro/openapi.json","did":"https://zeusai.pro/.well-known/did.json","integrity":"https://zeusai.pro/.well-known/unicorn-integrity.json","security":"https://zeusai.pro/.well-known/security.txt"},"capabilities":["autonomous-commerce","viral-engine","payment-orchestration","carbon-accounting","quantum-security","signed-receipts"],"discovery":["/.well-known/did.json","/.well-known/ai-attestation","/.well-known/unicorn-integrity.json","/agents.json","/openapi.json"]}';
}
