# Unicorn public-discovery snippet
# Included from /etc/nginx/sites-available/unicorn (managed by deploy step
# `Patch nginx public-discovery`) inside both the :80 and :443 server blocks
# for zeusai.pro / www.zeusai.pro.
#
# Why a snippet instead of editing the whole file: certbot --nginx wrote
# server-block additions (listen 443 ssl, ssl_certificate, ...) directly into
# /etc/nginx/sites-available/unicorn and server-doctor.sh refuses to overwrite
# that file when SSL is active (it would break HTTPS until cert is reinstalled).
# This snippet is therefore the safe, idempotent way to ship public-discovery
# routes without disturbing the certbot edits.
#
# Routes /.well-known/* and a few public top-level files to the unicorn_site
# upstream (where polish-pack and the SSR layer live). The `^~` modifier
# guarantees this prefix wins over any default `location ~ /\.` deny regex
# in /etc/nginx/nginx.conf — that hardening rule is what was returning the
# bare 403 with content-length:162 for /.well-known/security.txt and friends.

location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
}

location ^~ /.well-known/ {
    proxy_pass         http://unicorn_site;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;
}

location = /humans.txt {
    proxy_pass         http://unicorn_site;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
