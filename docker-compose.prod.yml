# docker-compose.prod.yml — ZeusAI / Unicorn PRODUCTION Stack
# Servicii: unicorn-app, nginx, certbot, prometheus, grafana
# Utilizare:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ── Aplicatia principala ──────────────────────────────────────────────────
  unicorn-app:
    image: ghcr.io/${GITHUB_REPOSITORY:-ruffy80/zeusai}:${IMAGE_TAG:-latest}
    container_name: unicorn-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /var/www/unicorn/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - unicorn-data:/app/data
      - unicorn-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.zeusai.service=backend"
      - "com.zeusai.version=${IMAGE_TAG:-latest}"

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: unicorn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/unicorn/scripts/nginx-unicorn.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      unicorn-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *default-logging
    labels:
      - "com.zeusai.service=nginx"

  # ── Certbot (SSL auto-renewal) ────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: unicorn-certbot
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet --webroot -w /var/www/certbot; done"
    logging: *default-logging
    labels:
      - "com.zeusai.service=certbot"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: unicorn-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - /var/www/unicorn/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    logging: *default-logging
    labels:
      - "com.zeusai.service=prometheus"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: unicorn-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-unicorn_grafana_2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${SITE_DOMAIN:-zeusai.pro}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    logging: *default-logging
    labels:
      - "com.zeusai.service=grafana"

volumes:
  unicorn-data:
    driver: local
  unicorn-logs:
    driver: local
  certbot-certs:
    driver: local
  certbot-webroot:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  default:
    name: unicorn-network
    driver: bridge
