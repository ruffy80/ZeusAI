global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'zeusai-unicorn'

rule_files: []

scrape_configs:
  - job_name: 'unicorn-app'
    static_configs:
      - targets: ['unicorn-app:3000']
    metrics_path: '/metrics'
    scrape_timeout: 10s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    scrape_timeout: 5s
