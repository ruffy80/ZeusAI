# ============================================================
# KARPENTER NodePool — Cost-Optimised Node Provisioning
# Prefers Spot instances, consolidates when underutilised.
# On-demand fallback when Spot is unavailable.
# ============================================================
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: unicorn-cost-optimized
  labels:
    app: unicorn
spec:
  template:
    metadata:
      labels:
        unicorn-managed: "true"
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64", "arm64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]   # compute/memory/general purpose
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: unicorn-default
      taints: []
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
    # Do not disrupt nodes running profit-positive experiment pods
    budgets:
      - nodes: "10%"
  limits:
    cpu: 200
    memory: 400Gi
---
# ============================================================
# EC2NodeClass — instance configuration
# ============================================================
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: unicorn-default
spec:
  amiFamily: AL2
  role: "KarpenterNodeRole"   # IAM role attached to nodes
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "unicorn-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "unicorn-cluster"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
