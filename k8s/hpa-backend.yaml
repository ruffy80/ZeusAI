# ============================================================
# HORIZONTAL POD AUTOSCALER — unicorn-backend
# Scales on both CPU utilization AND custom p99 latency metric.
# scaleDown is stabilized (300s) to protect running experiments.
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unicorn-backend-hpa
  namespace: production
  labels:
    app: unicorn
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unicorn-backend
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

    # Custom metric: p99 latency from Prometheus (requires prometheus-adapter)
    - type: Pods
      pods:
        metric:
          name: http_request_duration_ms_p99
        target:
          type: AverageValue
          averageValue: 300m   # 300ms target

  behavior:
    scaleDown:
      # Stabilize for 5 minutes before scaling down (protects active experiments)
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
