version: '3.8'

services:
  unicorn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unicorn-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - unicorn-data:/app/data
      - unicorn-generated:/app/generated
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: unicorn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./UNICORN_FINAL/scripts/nginx-unicorn.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - unicorn

  certbot:
    image: certbot/certbot:latest
    container_name: unicorn-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"

volumes:
  unicorn-data:
  unicorn-generated:
  certbot-certs:
  certbot-webroot:
