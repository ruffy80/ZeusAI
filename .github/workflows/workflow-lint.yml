name: 🧹 Workflow Lint (deprecated actions guard)

# Fails the PR/push when any workflow file under .github/workflows/
# references a deprecated major version of GitHub-maintained actions
# whose Node 20 runtime is sunset by GitHub. Adding a new entry here
# makes the protection permanent — the only way to reintroduce a
# deprecated `@v4` (or older) for these actions is to update this guard.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/workflow-lint/**'
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.github/workflow-lint/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Deny deprecated actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🚫 Block deprecated actions/checkout and actions/setup-node majors
        shell: bash
        run: |
          set -uo pipefail
          # Pattern denylist: GitHub-owned actions whose @v[1-4] majors run on
          # the deprecated Node 20 runtime. Bump these as GitHub publishes
          # newer majors that drop deprecated runtimes.
          PATTERNS=(
            'actions/checkout@v[1-4]([^0-9]|$)'
            'actions/setup-node@v[1-4]([^0-9]|$)'
            'actions/cache@v[1-3]([^0-9]|$)'
            'actions/upload-artifact@v[1-3]([^0-9]|$)'
            'actions/download-artifact@v[1-3]([^0-9]|$)'
            'actions/github-script@v[1-6]([^0-9]|$)'
          )
          FAIL=0
          for pat in "${PATTERNS[@]}"; do
            HITS=$(grep -RInE "$pat" .github/workflows || true)
            if [ -n "$HITS" ]; then
              echo "::error::Deprecated action reference found (pattern: $pat)"
              echo "$HITS"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Deprecated GitHub Actions runtimes (Node 20) are not allowed."
            echo "Bump the offending actions to their current major (e.g. @v5)."
            exit 1
          fi
          echo "✅ No deprecated GitHub Actions references found."
