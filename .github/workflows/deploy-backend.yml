name: Deploy Backend to Hetzner

on:
  workflow_dispatch:

permissions: write-all

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            UNICORN_FINAL/package-lock.json
            UNICORN_FINAL/client/package-lock.json

      - name: Install + lint + test
        working-directory: UNICORN_FINAL
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run lint
          npm test

      - name: Build frontend
        working-directory: UNICORN_FINAL/client
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Guard: skip entire deploy if required SSH secrets are not configured
      - name: Validate SSH secrets
        id: ssh_guard
        run: |
          HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$HOST" ] || [ -z "$KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  HETZNER_HOST / HETZNER_SSH_PRIVATE_KEY not configured – skipping Hetzner deploy."
            echo "    Run the 'Setup Secrets + Trigger Deploy' workflow to configure them."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        if: steps.ssh_guard.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          if ! [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then DEPLOY_PORT="22"; fi
          ssh-keyscan -t ed25519,rsa -p "$DEPLOY_PORT" \
            "${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Hetzner
        if: steps.ssh_guard.outputs.ready == 'true'
        continue-on-error: true
        run: |
          DEPLOY_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          DEPLOY_USER="${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}"
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          if ! [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then DEPLOY_PORT="22"; fi
          DEPLOY_PATH="${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}"
          DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"

          ssh -i ~/.ssh/deploy_key \
              -p "$DEPLOY_PORT" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              "$DEPLOY_USER@$DEPLOY_HOST" << ENDSSH
            set -e
            cd "$DEPLOY_PATH" || { echo "❌ Deploy path not found: $DEPLOY_PATH"; exit 1; }

            rollback_on_error() {
              echo "⛑️  Deploy failed. Rolling back..."
              if [ -x scripts/rollback-last-backup.sh ]; then
                bash scripts/rollback-last-backup.sh "$DEPLOY_PATH" || true
              fi
              pm2 startOrRestart ecosystem.config.js || true
              pm2 save || true
            }
            trap rollback_on_error ERR

            [ -x scripts/create-backup.sh ] && bash scripts/create-backup.sh "$DEPLOY_PATH" || true
            git config --global --add safe.directory "$DEPLOY_PATH" 2>/dev/null || true
            git fetch --all && git reset --hard origin/main || git pull origin main
            npm install --legacy-peer-deps --no-audit --no-fund
            if [ -d UNICORN_FINAL ]; then
              npm install --prefix UNICORN_FINAL --legacy-peer-deps --no-audit --no-fund
            fi
            if [ -d UNICORN_FINAL/client ]; then
              cd UNICORN_FINAL/client
              npm install --legacy-peer-deps --no-audit --no-fund
              npm run build
              cd ../..
            elif [ -d client ]; then
              cd client
              npm install --legacy-peer-deps --no-audit --no-fund
              npm run build
              cd ..
            fi
            if [ -d UNICORN_FINAL ]; then
              npm --prefix UNICORN_FINAL run lint
              npm --prefix UNICORN_FINAL test
            else
              npm run lint
              npm test
            fi
            pm2 startOrRestart ecosystem.config.js
            pm2 save

            echo "🛠️  Running server auto-repair (nginx/firewall/ssl)…"
            if [ -f scripts/fix-server.sh ]; then
              chmod +x scripts/fix-server.sh || true
              bash scripts/fix-server.sh "$DEPLOY_PATH" "$DOMAIN" || true
            else
              echo "⚠️  scripts/fix-server.sh missing — skipping extended repair"
            fi
            trap - ERR
            echo "✅ Deploy complete"
            curl -sf http://localhost:3000/api/health && echo "✅ Backend healthy" || echo "⚠️  Backend starting..."
            curl -sf http://localhost:3000/api/quantum-integrity/status && echo "🛡️ Quantum Integrity healthy" || echo "⚠️ Quantum Integrity: check manually"
            curl -kfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health" >/dev/null 2>&1 && echo "🔒 HTTPS local check: OK" || echo "⚠️  HTTPS local check: FAILED"
          ENDSSH
