name: 🔎 Audit AI API keys (live HTTP probe)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe every provider
        env:
          # long + short name variants
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ALT:          ${{ secrets.OPENAI }}
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ALT:        ${{ secrets.DEEPSEEK }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GEMINI_ALT:          ${{ secrets.GEMINI }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_ALT:         ${{ secrets.MISTRAL }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ALT:       ${{ secrets.ANTHROPIC }}
          CLAUDE_API_KEY:      ${{ secrets.CLAUDE_API_KEY }}
          COHERE_API_KEY:      ${{ secrets.COHERE_API_KEY }}
          COHERE_ALT:          ${{ secrets.COHERE }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_ALT:            ${{ secrets.GROQ }}
          XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
          XAI_ALT:             ${{ secrets.XAI }}
          GROK_API_KEY:        ${{ secrets.GROK_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_ALT:      ${{ secrets.OPENROUTER }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          HF_API_KEY:          ${{ secrets.HF_API_KEY }}
          HF_ALT:              ${{ secrets.HF }}
          PERPLEXITY_API_KEY:  ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_ALT:      ${{ secrets.PERPLEXITY }}
          TOGETHER_API_KEY:    ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_ALT:        ${{ secrets.TOGETHER }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          FIREWORKS_ALT:       ${{ secrets.FIREWORKS }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}
          SAMBANOVA_ALT:       ${{ secrets.SAMBANOVA }}
          NVIDIA_NIM_API_KEY:  ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_NIM_ALT:      ${{ secrets.NVIDIA_NIM }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set +e
          pick() { # $1=label $2=primary $3=fallback
            local L=$1 V="$2" F="$3"
            # placeholder filter — explicit list (NO globs with *)
            is_placeholder() {
              case "$1" in
                ''|skip|changeme|todo|placeholder) return 0 ;;
                your_*_here) return 0 ;;
              esac
              # "xxx" (3+ x), too-short (<10 chars) are rejected
              [ ${#1} -lt 10 ] && return 0
              return 1
            }
            if is_placeholder "$V"; then V="$F"; fi
            if is_placeholder "$V"; then V=""; fi
            echo "$V"
          }
          probe_bearer() { # name url key
            local name=$1 url=$2 key=$3
            if [ -z "$key" ]; then printf '%-14s  %-7s  %s\n' "$name" "NO_KEY" "—"; return; fi
            local code=$(curl -sS -o /tmp/r -w '%{http_code}' --max-time 15 "$url" -H "Authorization: Bearer $key")
            local len=${#key}
            local ok="❌"; [ "$code" = "200" ] && ok="✅"
            printf '%-14s  %s HTTP=%-3s len=%-4s\n' "$name" "$ok" "$code" "$len"
          }
          probe_google() { # name url?key=... pattern
            local name=$1 base=$2 key=$3
            if [ -z "$key" ]; then printf '%-14s  %-7s  %s\n' "$name" "NO_KEY" "—"; return; fi
            local code=$(curl -sS -o /tmp/r -w '%{http_code}' --max-time 15 "$base?key=$key")
            local len=${#key}
            local ok="❌"; [ "$code" = "200" ] && ok="✅"
            printf '%-14s  %s HTTP=%-3s len=%-4s\n' "$name" "$ok" "$code" "$len"
          }
          probe_anthropic() {
            local name=$1 key=$2
            if [ -z "$key" ]; then printf '%-14s  %-7s\n' "$name" "NO_KEY"; return; fi
            local code=$(curl -sS -o /tmp/r -w '%{http_code}' --max-time 15 \
              https://api.anthropic.com/v1/messages \
              -H "x-api-key: $key" -H 'anthropic-version: 2023-06-01' \
              -H 'content-type: application/json' \
              -d '{"model":"claude-3-haiku-20240307","max_tokens":1,"messages":[{"role":"user","content":"hi"}]}')
            local len=${#key}; local ok="❌"; [ "$code" = "200" ] && ok="✅"
            printf '%-14s  %s HTTP=%-3s len=%-4s\n' "$name" "$ok" "$code" "$len"
          }
          echo "==================  AI KEY AUDIT  =================="
          printf '%-14s  %-19s\n' PROVIDER 'STATUS'
          echo "----------------------------------------------------"
          probe_bearer OpenAI     https://api.openai.com/v1/models        "$(pick openai      "$OPENAI_API_KEY"       "$OPENAI_ALT")"
          probe_bearer DeepSeek   https://api.deepseek.com/v1/models      "$(pick deepseek    "$DEEPSEEK_API_KEY"     "$DEEPSEEK_ALT")"
          probe_google Gemini     https://generativelanguage.googleapis.com/v1beta/models "$(pick gemini    "$GEMINI_API_KEY"  "$GEMINI_ALT")"
          probe_bearer Mistral    https://api.mistral.ai/v1/models        "$(pick mistral     "$MISTRAL_API_KEY"      "$MISTRAL_ALT")"
          probe_anthropic Anthropic                                       "$(pick anthropic   "$ANTHROPIC_API_KEY"    "$CLAUDE_API_KEY" )"
          # Cohere uses Bearer on /v1/models
          probe_bearer Cohere     https://api.cohere.ai/v1/models         "$(pick cohere      "$COHERE_API_KEY"       "$COHERE_ALT")"
          probe_bearer Groq       https://api.groq.com/openai/v1/models   "$(pick groq        "$GROQ_API_KEY"         "$GROQ_ALT")"
          probe_bearer xAI        https://api.x.ai/v1/models              "$(pick xai         "$XAI_API_KEY"          "$GROK_API_KEY")"
          probe_bearer OpenRouter https://openrouter.ai/api/v1/models     "$(pick openrouter  "$OPENROUTER_API_KEY"   "$OPENROUTER_ALT")"
          probe_bearer HuggingFace https://huggingface.co/api/whoami-v2   "$(pick hf          "$HUGGINGFACE_API_KEY"  "$HF_API_KEY")"
          probe_bearer Perplexity https://api.perplexity.ai/chat/completions "$(pick perp     "$PERPLEXITY_API_KEY"   "$PERPLEXITY_ALT")"
          probe_bearer Together   https://api.together.xyz/v1/models      "$(pick together    "$TOGETHER_API_KEY"     "$TOGETHER_ALT")"
          probe_bearer Fireworks  https://api.fireworks.ai/inference/v1/models "$(pick fw    "$FIREWORKS_API_KEY"    "$FIREWORKS_ALT")"
          probe_bearer SambaNova  https://api.sambanova.ai/v1/models      "$(pick sn          "$SAMBANOVA_API_KEY"    "$SAMBANOVA_ALT")"
          probe_bearer NvidiaNIM  https://integrate.api.nvidia.com/v1/models "$(pick nv      "$NVIDIA_NIM_API_KEY"   "$NVIDIA_API_KEY")"
          echo "===================================================="
