name: 🔐 Setup GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      smtp_pass:
        description: 'Yahoo App Password pentru SMTP (opțional)'
        required: false
        default: ''
      paypal_client_id:
        description: 'PayPal Client ID (opțional)'
        required: false
        default: ''
      paypal_client_secret:
        description: 'PayPal Client Secret (opțional)'
        required: false
        default: ''
      telegram_bot_token:
        description: 'Telegram Bot Token (opțional)'
        required: false
        default: ''

jobs:
  setup-secrets:
    name: Push all secrets to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install libsodium for encryption
        working-directory: UNICORN_FINAL
        run: npm install --no-save libsodium-wrappers

      - name: 🔐 Push all secrets to GitHub
        working-directory: UNICORN_FINAL
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # ── SMTP ──────────────────────────────────────────────────────────
          SMTP_PASS:    ${{ github.event.inputs.smtp_pass || secrets.SMTP_PASS }}
          # ── PayPal ────────────────────────────────────────────────────────
          PAYPAL_CLIENT_ID:     ${{ github.event.inputs.paypal_client_id     || secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ github.event.inputs.paypal_client_secret || secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID:    ${{ secrets.PAYPAL_WEBHOOK_ID }}
          # ── Telegram ──────────────────────────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ github.event.inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN }}
          # ── Hetzner ───────────────────────────────────────────────────────
          HETZNER_API_KEY:         ${{ secrets.HETZNER_API_KEY }}
          HETZNER_API_TOKEN:       ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          # ── AI providers ──────────────────────────────────────────────────
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:      ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY:          ${{ secrets.HF_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          PERPLEXITY_API_KEY:  ${{ secrets.PERPLEXITY_API_KEY }}
          TOGETHER_API_KEY:    ${{ secrets.TOGETHER_API_KEY }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_NIM_API_KEY:  ${{ secrets.NVIDIA_NIM_API_KEY }}
          # ── Admin (reuse existing so they don't rotate) ───────────────────
          ADMIN_MASTER_PASSWORD: ${{ secrets.ADMIN_MASTER_PASSWORD }}
          ADMIN_2FA_CODE:        ${{ secrets.ADMIN_2FA_CODE }}
        run: node scripts/setup-github-secrets.js

      - name: 🚀 Trigger deploy
        if: success()
        run: |
          echo "✅ Secrets actualizate. Declanșăm deploy-ul..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ruffy80/ZeusAI/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}' && echo "✅ Deploy declanșat." || echo "⚠️  Deploy trigger opțional a eșuat."
