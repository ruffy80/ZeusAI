name: 🩺 Diagnose & Repair (Hetzner)

# Manual-only workflow that SSHes to the live Hetzner host, prints a full
# diagnostic report (PM2, ports, nginx), self-heals the canonical stack (PM2 restart,
# nginx reload, pm2 save) and runs the canonical smoke tests.
#
# This workflow is purely additive and does NOT modify any code or config on
# the server. It only touches PM2/nginx process state to recover from a
# stuck/down service. Safe to run any time.

on:
  workflow_dispatch:
    inputs:
      do_repair:
        description: 'Run self-heal actions (pm2 restart, nginx reload, pm2 save). If false, only diagnose.'
        type: boolean
        default: true

concurrency:
  group: zeusai-diagnose-repair
  cancel-in-progress: false

jobs:
  diagnose-and-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bootstrap SSH access
        env:
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          HETZNER_HOST:            ${{ secrets.HETZNER_HOST }}
        run: |
          chmod +x UNICORN_FINAL/scripts/ensure-ssh-access.sh
          bash UNICORN_FINAL/scripts/ensure-ssh-access.sh

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Add Hetzner host to known_hosts
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Diagnostic report
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          echo "::group::PM2 list"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" 'pm2 list || echo "[pm2] not available"' || true
          echo "::endgroup::"

          echo "::group::Listening ports (3000 / 80 / 443)"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" "ss -tlnp 2>/dev/null | grep -E ':3000|:80|:443' || echo '[ss] no matches'" || true
          echo "::endgroup::"

          echo "::group::Nginx config test"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" 'nginx -t 2>&1 || echo "[nginx] -t failed"' || true
          echo "::endgroup::"

          echo "::group::PM2 last 80 log lines (canonical apps)"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" 'pm2 logs unicorn-backend unicorn-site autoscaler --lines 80 --nostream 2>&1 || echo "[pm2 logs] not available"' || true
          echo "::endgroup::"

          echo "::group::Backend-direct probes (127.0.0.1:3000)"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" bash -s <<'SSHEOF' || true
            for ep in /health /api/health /api/services /api/btc/rate /api/module-registry; do
              code=$(curl -sS -o /dev/null -m 5 -w '%{http_code}' "http://127.0.0.1:3000${ep}" || echo "000")
              printf '  %-22s -> %s\n' "$ep" "$code"
            done
          SSHEOF
          echo "::endgroup::"

      - name: Self-heal (PM2 restart + nginx reload + pm2 save)
        if: ${{ inputs.do_repair == true }}
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=20 -o ServerAliveCountMax=12 root@"$HETZNER_HOST" bash -s <<'SSHEOF'
            set +e
            echo '[heal] PM2 restart canonical stack from /var/www/unicorn/UNICORN_FINAL'
            cd /var/www/unicorn/UNICORN_FINAL 2>/dev/null || { echo '[heal] canonical path missing'; exit 1; }
            echo '[heal] hard reset PM2 daemon/dump (avoid stale launching entries and pm2_env crash)'
            timeout 15s pm2 stop all 2>/dev/null || true
            timeout 15s pm2 delete all 2>/dev/null || true
            timeout 10s pm2 kill 2>/dev/null || true
            rm -f /root/.pm2/dump.pm2 /root/.pm2/dump.pm2.bak 2>/dev/null || true
            for PORT in 3000 3001; do
              PIDS=$(ss -tlnp 2>/dev/null | awk -v p=":$PORT" '$4 ~ p {print $0}' | sed -n 's/.*pid=\([0-9][0-9]*\).*/\1/p' | sort -u)
              for PID in $PIDS; do
                [ -n "$PID" ] || continue
                echo "[heal] killing stale listener pid=$PID on port $PORT"
                kill "$PID" 2>/dev/null || true
                sleep 1
                kill -9 "$PID" 2>/dev/null || true
              done
            done
            export SITE_INSTANCES="${SITE_INSTANCES:-1}"
            export UNICORN_INSTANCES="${UNICORN_INSTANCES:-1}"
            export UNICORN_GUARDIAN=0
            timeout 90s pm2 start ecosystem.config.js --only unicorn-backend,unicorn-site,autoscaler --update-env 2>&1 \
              || echo '[heal] pm2 start failed (no ecosystem.config.js?)'

            if ! curl -fsS --max-time 3 http://127.0.0.1:3000/health >/dev/null 2>&1; then
              echo '[heal] PM2 backend unhealthy — emergency minimal API fallback'
              mkdir -p logs
              set -a
              [ -f .env ] && . ./.env 2>/dev/null || true
              set +a
              cat > /tmp/zeus-rescue-api.js <<'NODE'
              'use strict';
              const http = require('http');
              const btcAddress = process.env.BTC_WALLET_ADDRESS || process.env.OWNER_BTC_ADDRESS || 'bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e';
              const btcUsd = Number(process.env.RESCUE_BTC_USD || 77000);
              const services = [
                { id: 'adaptive-ai', name: 'Adaptive AI Automation', priceUsd: 499, currency: 'USD', btcAddress },
                { id: 'ai-workforce', name: 'AI Workforce Suite', priceUsd: 1499, currency: 'USD', btcAddress },
                { id: 'enterprise-growth', name: 'Enterprise Growth Engine', priceUsd: 4999, currency: 'USD', btcAddress },
              ].map((service) => ({ ...service, priceBTC: Number((service.priceUsd / btcUsd).toFixed(8)) }));
              function send(res, status, payload) {
                const body = JSON.stringify(payload);
                res.writeHead(status, {
                  'content-type': 'application/json; charset=utf-8',
                  'cache-control': 'no-store',
                  'access-control-allow-origin': '*',
                });
                res.end(body);
              }
              http.createServer((req, res) => {
                const url = new URL(req.url, 'http://127.0.0.1:3000');
                if (url.pathname === '/health' || url.pathname === '/api/health') {
                  return send(res, 200, { ok: true, status: 'healthy', service: 'zeus-rescue-api', mode: 'rescue', ts: new Date().toISOString() });
                }
                if (url.pathname === '/api/pricing/all') {
                  return send(res, 200, { ok: true, generatedAt: new Date().toISOString(), btcUsd, btcAddress, services, pricing: services });
                }
                if (url.pathname === '/api/services' || url.pathname === '/api/services/list') {
                  return send(res, 200, { ok: true, services });
                }
                if (url.pathname === '/api/btc/rate' || url.pathname === '/api/payment/btc-rate') {
                  return send(res, 200, { ok: true, btcUsd, usdPerBtc: btcUsd, rate: btcUsd, source: 'rescue-fallback', ts: new Date().toISOString() });
                }
                if (url.pathname === '/api/modules' || url.pathname === '/api/module-registry') {
                  return send(res, 200, { ok: true, modules: [], mode: 'rescue' });
                }
                return send(res, 404, { ok: false, error: 'rescue_endpoint_not_found', path: url.pathname });
              }).listen(3000, '127.0.0.1', () => console.log('[rescue-api] listening on 127.0.0.1:3000'));
              NODE
              nohup env BTC_WALLET_ADDRESS="${BTC_WALLET_ADDRESS:-}" OWNER_BTC_ADDRESS="${OWNER_BTC_ADDRESS:-}" \
                node /tmp/zeus-rescue-api.js > logs/rescue-backend.log 2>&1 &
              BACKEND_RESCUE_PID=$!
              echo "[heal] rescue backend pid=$BACKEND_RESCUE_PID"
            fi

            if ! curl -fsS --max-time 3 http://127.0.0.1:3001/health >/dev/null 2>&1; then
              echo '[heal] PM2 site unhealthy — emergency direct-node fallback'
              nohup env NODE_ENV=production PORT=3001 BIND_HOST=127.0.0.1 BACKEND_API_URL=http://127.0.0.1:3000 SITE_LEGACY_BASELINE_MODE=1 \
                DISABLE_SELF_MUTATION=1 WATCHDOG_DISABLED=1 \
                node src/index.js > logs/rescue-site.log 2>&1 &
              SITE_RESCUE_PID=$!
              echo "[heal] rescue site pid=$SITE_RESCUE_PID"
            fi

            echo '[heal] nginx -t && systemctl reload nginx'
            if nginx -t 2>&1; then
              systemctl reload nginx 2>&1 || systemctl restart nginx 2>&1 || echo '[heal] nginx reload failed'
            else
              echo '[heal] nginx config invalid — skipping reload'
            fi

            echo '[heal] pm2 save'
            timeout 20s pm2 save --force 2>&1 || echo '[heal] pm2 save failed'

            echo '[heal] waiting 30s for backend/site warmup...'
            sleep 30
            curl -fsS --max-time 5 http://127.0.0.1:3000/health || true
            curl -fsS --max-time 5 http://127.0.0.1:3001/health || true
            timeout 20s pm2 list || true
          SSHEOF

      - name: Smoke tests (backend-direct, then nginx)
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          chmod +x UNICORN_FINAL/scripts/smoke-forward-only.sh

          echo "::group::Smoke (backend-direct via SSH on 127.0.0.1:3000)"
          ssh -o StrictHostKeyChecking=no root@"$HETZNER_HOST" 'cd /var/www/unicorn/UNICORN_FINAL && BASE_URL=http://127.0.0.1:3000 SKIP_PUBLIC=1 REQUIRE_PM2=1 bash scripts/smoke-forward-only.sh' \
            && echo "[backend-direct] PASS" \
            || echo "[backend-direct] FAIL"
          echo "::endgroup::"

          echo "::group::Smoke (public via nginx)"
          BASE_URL="http://$HETZNER_HOST" PUBLIC_URL="https://zeusai.pro" \
            bash UNICORN_FINAL/scripts/smoke-forward-only.sh \
            && echo "[public] PASS" \
            || echo "[public] FAIL"
          echo "::endgroup::"

      - name: Final summary
        if: always()
        run: |
          echo "Diagnostic & repair pass complete."
          echo "If smoke still failing: inspect the 'Diagnostic report' group above for PM2/nginx/log details."
