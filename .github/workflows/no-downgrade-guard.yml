name: 🛡️ No-Downgrade Guard

# Refuses any push/PR-merge to main that:
#   1. Is NOT a strict descendant of the pinned baseline SHA
#      (.github/baselines/live.sha), or
#   2. Deletes critical UNICORN_FINAL paths without the
#      `[upgrade-approved]` trailer in the commit message.
#
# Pin file: .github/baselines/live.sha (one line, full SHA).
# Doc:      LIVE_BASELINE.md
#
# This is the contractual protection that makes the live site
# upgrade-only — see LIVE_BASELINE.md for the full rationale.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: no-downgrade-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ⬇️ Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📌 Read pinned baseline SHA
        id: baseline
        run: |
          set -euo pipefail
          SHA="$(tr -d '[:space:]' < .github/baselines/live.sha)"
          if [ -z "$SHA" ] || [ "${#SHA}" -lt 40 ]; then
            echo "::error::.github/baselines/live.sha is missing or not a full 40-char SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Pinned baseline SHA: $SHA"

      - name: 🧬 Verify baseline SHA exists in repo
        run: |
          set -euo pipefail
          BASELINE="${{ steps.baseline.outputs.sha }}"
          if ! git cat-file -e "${BASELINE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=0 origin "+${BASELINE}:refs/baseline/live" || true
          fi
          git cat-file -e "${BASELINE}^{commit}"

      - name: 🚦 HEAD must be descendant of pinned baseline
        env:
          BASELINE: ${{ steps.baseline.outputs.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "HEAD = $HEAD_SHA"
          echo "BASE = $BASELINE"
          if [ "$HEAD_SHA" = "$BASELINE" ]; then
            echo "✅ HEAD == baseline (re-deploy of pinned snapshot)"
            exit 0
          fi
          if git merge-base --is-ancestor "$BASELINE" "$HEAD_SHA"; then
            echo "✅ HEAD is a descendant of pinned baseline"
          else
            echo "::error::HEAD ($HEAD_SHA) is NOT a descendant of pinned live baseline ($BASELINE)."
            echo "::error::This would be a downgrade. Refused by no-downgrade-guard."
            echo "::error::See LIVE_BASELINE.md for how to advance the baseline."
            exit 1
          fi

      - name: 🛑 Critical-path deletion guard
        env:
          BASELINE: ${{ steps.baseline.outputs.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          # Fast-pass when the bumping commit itself moved the baseline forward.
          # Use the merge-commit body when present, otherwise the head-commit body.
          MSG="$(git log -1 --format=%B "$HEAD_SHA" || true)"
          if printf '%s' "$MSG" | grep -qiF '[upgrade-approved]'; then
            echo "✅ commit message carries [upgrade-approved] — guard bypassed for this push"
            exit 0
          fi

          # Compare HEAD tree vs baseline tree, but only count files that
          # *existed at baseline* and are now deleted or shrunk significantly.
          DELETED="$(git diff --diff-filter=D --name-only "$BASELINE" "$HEAD_SHA" -- \
            'UNICORN_FINAL/src/**' \
            'UNICORN_FINAL/backend/**' \
            'UNICORN_FINAL/scripts/**' \
            'UNICORN_FINAL/package.json' \
            'UNICORN_FINAL/ecosystem.config.js' \
            '.github/workflows/deploy.yml' \
            '.github/workflows/no-downgrade-guard.yml' \
            '.github/baselines/live.sha' \
            'LIVE_BASELINE.md' \
            || true)"

          if [ -n "$DELETED" ]; then
            echo "::error::These critical files existed at baseline $BASELINE and are deleted at HEAD:"
            printf '::error::  %s\n' $DELETED
            echo "::error::Add [upgrade-approved] to the commit message after a verified green deploy"
            echo "::error::and a corresponding baseline bump in .github/baselines/live.sha"
            exit 1
          fi
          echo "✅ no critical-path deletions vs baseline"

      - name: 🤖 AutoInnovation guard (block unreviewed bot merges)
        env:
          BASELINE: ${{ steps.baseline.outputs.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          # Walk every commit between baseline and HEAD. If any commit
          # subject begins with `[AutoInnovation]` (the marker used by
          # the external auto-merge bot — see commits 813129577f, 271e71b1,
          # e5371a40, etc.), the merge is only allowed when the commit
          # body carries the `[innovation-approved]` trailer set by a
          # human reviewer.
          #
          # This guard cannot un-do an already-pushed merge, but it makes
          # CI red on any unreviewed AutoInnovation push, which combined
          # with the deploy.yml pre-flight prevents the change from ever
          # reaching production at zeusai.pro.

          UNAPPROVED=""
          while IFS= read -r SHA; do
            [ -z "$SHA" ] && continue
            SUBJECT="$(git log -1 --format=%s "$SHA")"
            BODY="$(git log -1 --format=%B "$SHA")"
            case "$SUBJECT" in
              \[AutoInnovation\]*|*\[AutoInnovation\]*)
                if printf '%s' "$BODY" | grep -qiF '[innovation-approved]'; then
                  echo "✅ approved AutoInnovation commit: $SHA — $SUBJECT"
                else
                  UNAPPROVED="${UNAPPROVED}${SHA} ${SUBJECT}"$'\n'
                fi
                ;;
            esac
          done < <(git rev-list "${BASELINE}..${HEAD_SHA}" 2>/dev/null || true)

          if [ -n "$UNAPPROVED" ]; then
            echo "::error::AutoInnovation commits without [innovation-approved] trailer detected:"
            printf '%s' "$UNAPPROVED" | while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              echo "::error::  $LINE"
            done
            echo "::error::"
            echo "::error::These commits originate from the auto-innovation bot and have NOT"
            echo "::error::been reviewed by a human. Per the no-downgrade contract, they are"
            echo "::error::refused. To allow a specific AutoInnovation change, amend its"
            echo "::error::commit message to include the [innovation-approved] trailer after"
            echo "::error::manual review. See LIVE_BASELINE.md."
            exit 1
          fi
          echo "✅ no unreviewed AutoInnovation commits since baseline"

      - name: ✅ Guard passed
        run: echo "🛡️  No downgrade detected. Forward-only history confirmed."
