name: 🦄 Unicorn Auto-Deploy Advanced

on:
  push:
    branches:
      - main

concurrency:
  group: unicorn-auto-deploy-advanced
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 Build, Test & Deploy → Hetzner
    runs-on: ubuntu-latest

    env:
      SERVER_IP:   ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
      SERVER_USER: ${{ secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
      SERVER_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
      DOMAIN:      ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            UNICORN_FINAL/package-lock.json
            UNICORN_FINAL/client/package-lock.json

      # ── 3. Dependency caches ───────────────────────────────────────────────
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: UNICORN_FINAL/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('UNICORN_FINAL/package-lock.json', 'UNICORN_FINAL/package.json') }}
          restore-keys: backend-${{ runner.os }}-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: UNICORN_FINAL/client/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('UNICORN_FINAL/client/package-lock.json', 'UNICORN_FINAL/client/package.json') }}
          restore-keys: frontend-${{ runner.os }}-

      # ── 4. Pre-build checks (non-blocking) ────────────────────────────────
      - name: Pre-build lint + tests
        working-directory: UNICORN_FINAL
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run lint  || echo "⚠️  Lint failed (non-blocking)"
          npm test      || echo "⚠️  Tests failed (non-blocking)"

      - name: Build frontend
        working-directory: UNICORN_FINAL/client
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build || echo "⚠️  Frontend build failed (non-blocking)"

      # ── 5. SSH setup ───────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️  No SSH key secret found – skipping SSH deploy"
            exit 0
          fi
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -p "${SERVER_PORT}" "${SERVER_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── 6. Deploy with rollback ────────────────────────────────────────────
      - name: Deploy to Hetzner with rollback
        run: |
          if [ ! -f ~/.ssh/deploy_key ]; then
            echo "ℹ️  SSH key not present – skipping deploy"
            exit 0
          fi

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -p "${SERVER_PORT}" \
              "${SERVER_USER}@${SERVER_IP}" \
              "set -e
               REPO_DIR='${DEPLOY_PATH}'
               APP_DIR=\$([ -d \"\$REPO_DIR/UNICORN_FINAL\" ] && echo \"\$REPO_DIR/UNICORN_FINAL\" || echo \"\$REPO_DIR\")
               BRANCH='main'

               echo '=== [1] Salvez versiunea curentă pentru rollback'
               cd \"\$REPO_DIR\" || { echo '❌ Deploy path not found'; exit 1; }
               if [ -d .git ]; then
                 CURRENT_COMMIT=\$(git rev-parse HEAD 2>/dev/null || echo 'none')
               else
                 CURRENT_COMMIT='none'
               fi
               echo \"Current commit: \$CURRENT_COMMIT\"
               echo \"App directory: \$APP_DIR\"

               echo '=== [2] Pull din GitHub'
               git fetch origin
               git reset --hard origin/\$BRANCH
               git clean -fd

               echo '=== [3] Backend – npm install + build'
               cd \"\$APP_DIR\" || { echo '❌ App dir not found: \$APP_DIR'; exit 1; }
               npm install --legacy-peer-deps --no-audit --no-fund
               if [ -f build.sh ]; then
                 bash build.sh
               fi

               echo '=== [4] Frontend – npm install + build'
               if [ -d client ] && [ -f client/package.json ]; then
                 cd client
                 npm install --legacy-peer-deps --no-audit --no-fund
                 CI=false npm run build || echo '⚠️  Frontend build failed (non-blocking)'
                 cd \"\$APP_DIR\"
               fi

               cd \"\$APP_DIR\"
               echo '=== [5] PM2 – restart / start backend'
               if command -v pm2 >/dev/null 2>&1; then
                 if [ -f ecosystem.config.js ]; then
                   pm2 startOrRestart ecosystem.config.js
                 elif pm2 list | grep -q 'unicorn'; then
                   pm2 restart unicorn
                 else
                   pm2 start backend/index.js --name unicorn
                 fi
                 pm2 save
               else
                 echo '⚠️  pm2 not found – skipping process restart'
               fi

               echo '=== [6] Nginx – test + reload'
               if command -v nginx >/dev/null 2>&1; then
                 sudo nginx -t && sudo systemctl reload nginx
               else
                 echo '⚠️  nginx not found – skipping reload'
               fi

               echo '=== [7] Health checks + rollback dacă e nevoie'
               sleep 5
               if ! curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
                 echo '❌ Backend health check FAILED – încerc rollback...'
                 if [ \"\$CURRENT_COMMIT\" != 'none' ]; then
                   cd \"\$REPO_DIR\"
                   git reset --hard \"\$CURRENT_COMMIT\"
                   git clean -fd
                   cd \"\$APP_DIR\"
                   npm install --legacy-peer-deps --no-audit --no-fund
                   if command -v pm2 >/dev/null 2>&1; then
                     pm2 startOrRestart ecosystem.config.js 2>/dev/null || \
                       pm2 restart unicorn 2>/dev/null || \
                       pm2 start backend/index.js --name unicorn
                     pm2 save
                   fi
                   if [ -d client ] && [ -f client/package.json ]; then
                     cd client
                     npm install --legacy-peer-deps --no-audit --no-fund
                     CI=false npm run build || true
                     cd \"\$APP_DIR\"
                   fi
                   if command -v nginx >/dev/null 2>&1; then
                     sudo nginx -t && sudo systemctl reload nginx
                   fi
                 fi
                 exit 1
               fi

               if ! curl -fsSI https://${DOMAIN} >/dev/null 2>&1; then
                 echo '⚠️  HTTPS health check FAILED – verifică SSL / Nginx manual.'
               fi

               echo '=== Deploy Unicorn FINALIZAT cu succes.'"

      # ── 7. Webhook notification ────────────────────────────────────────────
      - name: Notify via webhook
        if: always()
        run: |
          STATUS="SUCCESS"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="FAILURE"
          fi

          WEBHOOK="${{ secrets.DEPLOY_WEBHOOK_URL || secrets.HETZNER_WEBHOOK_URL || secrets.WEBHOOK_URL }}"
          if [ -n "$WEBHOOK" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"🦄 Unicorn deploy: $STATUS pe ${DOMAIN} (commit ${{ github.sha }})\"}" \
              "$WEBHOOK" || echo "⚠️  Webhook notification failed (non-blocking)"
          fi
