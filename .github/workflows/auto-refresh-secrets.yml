name: 🔄 Auto-Refresh Secrets (Schedule)

# ─────────────────────────────────────────────────────────────────────────────
# Reîmprospătează automat toate secretele GitHub Actions la fiecare 12 ore.
# Setează toate valorile statice cunoscute (HETZNER_HOST etc.)
# și regenerează secretele de securitate (JWT_SECRET, ADMIN_SECRET etc.) dacă
# lipsesc. Secretele opționale (API keys) sunt transmise prin dacă există deja.
#
# NU are nevoie de intervenție manuală.
# Rulează și pe workflow_dispatch pentru refresh imediat la cerere.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # La fiecare 12 ore (00:00 și 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: auto-refresh-secrets
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  refresh:
    name: 🔐 Refresh All Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install libsodium-wrappers
        working-directory: UNICORN_FINAL
        run: npm install --no-save libsodium-wrappers

      - name: 🌐 Configure DNS records (auto)
        working-directory: UNICORN_FINAL
        continue-on-error: true
        env:
          SITE_DOMAIN:         ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
          HETZNER_DNS_API_KEY: ${{ secrets.HETZNER_DNS_API_KEY || secrets.HETZNER_API_KEY }}
          HETZNER_HOST:        ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
          CF_TOKEN:            ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:          ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/setup-dns.js

      - name: 🔐 Push all known secrets to GitHub Actions
        id: push_secrets
        working-directory: UNICORN_FINAL
        continue-on-error: true
        env:
          # Necesită GH_PAT (Personal Access Token cu scope repo).
          # Dacă lipsește, secretele statice nu vor fi scrise dar workflow-ul continuă.
          GITHUB_TOKEN:            ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # Admin (refolosit dacă există; generat la prima rulare)
          ADMIN_MASTER_PASSWORD:   ${{ secrets.ADMIN_MASTER_PASSWORD }}
          ADMIN_2FA_CODE:          ${{ secrets.ADMIN_2FA_CODE }}
          # Platforme
          HETZNER_API_KEY:         ${{ secrets.HETZNER_API_KEY }}
          HETZNER_API_TOKEN:       ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY:         ${{ secrets.SSH_PRIVATE_KEY || secrets.HETZNER_SSH_PRIVATE_KEY }}
          HETZNER_WEBHOOK_URL:     ${{ secrets.HETZNER_WEBHOOK_URL }}
          GH_WEBHOOK_URL:          ${{ secrets.GH_WEBHOOK_URL }}
          WEBHOOK_URL:             ${{ secrets.WEBHOOK_URL }}
          # DNS / Cloudflare
          HETZNER_DNS_API_KEY:     ${{ secrets.HETZNER_DNS_API_KEY }}
          CF_TOKEN:                ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:              ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
          # AI Providers
          OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:         ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:          ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:             ${{ secrets.XAI_API_KEY }}
          # Stripe
          STRIPE_SECRET_KEY:               ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:          ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:           ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER_MONTHLY:    ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_YEARLY:     ${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY:        ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY:         ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          STRIPE_PRICE_ENTERPRISE_MONTHLY: ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
          STRIPE_PRICE_ENTERPRISE_YEARLY:  ${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}
          # PayPal
          PAYPAL_CLIENT_ID:     ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID:    ${{ secrets.PAYPAL_WEBHOOK_ID }}
          # Email
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # Domain
          SITE_DOMAIN:    ${{ secrets.SITE_DOMAIN }}
          UNICORN_DOMAIN: ${{ secrets.UNICORN_DOMAIN }}
          # Vault / config secrets
          VAULT_MASTER_SECRET:  ${{ secrets.VAULT_MASTER_SECRET }}
          VAULT_EMERGENCY_CODE: ${{ secrets.VAULT_EMERGENCY_CODE }}
          MASTER_CONFIG_SECRET: ${{ secrets.MASTER_CONFIG_SECRET }}
          # DNS
          SAV_API_TOKEN: ${{ secrets.SAV_API_TOKEN }}
          # Social / marketing APIs
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          X_BEARER_TOKEN:              ${{ secrets.X_BEARER_TOKEN }}
          X_ACCESS_TOKEN:              ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:             ${{ secrets.X_ACCESS_SECRET }}
          YOUTUBE_API_KEY:             ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_OAUTH_CLIENT_ID:     ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          PINTEREST_TOKEN:             ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_BOARD_ID:          ${{ secrets.PINTEREST_BOARD_ID }}
          PRODUCTHUNT_API_KEY:         ${{ secrets.PRODUCTHUNT_API_KEY }}
          PRODUCTHUNT_API_SECRET:      ${{ secrets.PRODUCTHUNT_API_SECRET }}
          PRODUCTHUNT_DEVELOPER_TOKEN: ${{ secrets.PRODUCTHUNT_DEVELOPER_TOKEN }}
          META_API_KEY:                ${{ secrets.META_API_KEY }}
          GOOGLE_API_KEY:              ${{ secrets.GOOGLE_API_KEY }}
          MICROSOFT_API_KEY:           ${{ secrets.MICROSOFT_API_KEY }}
          AMAZON_API_KEY:              ${{ secrets.AMAZON_API_KEY }}
          APPLE_API_KEY:               ${{ secrets.APPLE_API_KEY }}
          # Crypto wallets
          ETH_WALLET_ADDRESS:  ${{ secrets.ETH_WALLET_ADDRESS }}
          USDC_WALLET_ADDRESS: ${{ secrets.USDC_WALLET_ADDRESS }}
          # Crypto exchanges
          BINANCE_API_KEY:  ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET:   ${{ secrets.BINANCE_SECRET }}
          COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
          COINBASE_SECRET:  ${{ secrets.COINBASE_SECRET }}
          KRAKEN_API_KEY:   ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_SECRET:    ${{ secrets.KRAKEN_SECRET }}
          BYBIT_API_KEY:    ${{ secrets.BYBIT_API_KEY }}
          BYBIT_SECRET:     ${{ secrets.BYBIT_SECRET }}
          OKX_API_KEY:      ${{ secrets.OKX_API_KEY }}
          OKX_SECRET:       ${{ secrets.OKX_SECRET }}
          OKX_PASSWORD:     ${{ secrets.OKX_PASSWORD }}
        run: node scripts/setup-github-secrets.js

      - name: Write job summary
        if: always()
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:    ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
        run: |
          echo "## 🔄 Auto-Refresh Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secrets push | ${{ steps.push_secrets.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.push_secrets.outcome }}" = "success" ]; then
            echo "✅ **Toate secretele statice au fost reîmprospătate automat.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ **Refresh parțial** – GH_PAT poate lipsește (secretele statice nu au fost scrise). Secretele de pe server (.env via create-env.sh) sunt actualizate la fiecare deploy." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🤖 Status Chei AI Providers" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          check_key() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ] && [[ "$val" != *"your_"* ]] && [ ${#val} -gt 10 ]; then
              echo "| $name | ✅ Configurat |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | ❌ **LIPSĂ** — adaugă în GitHub → Settings → Secrets → Actions |" >> "$GITHUB_STEP_SUMMARY"
            fi
          }
          check_key "OpenAI"    "$OPENAI_API_KEY"
          check_key "DeepSeek"  "$DEEPSEEK_API_KEY"
          check_key "Anthropic" "$ANTHROPIC_API_KEY"
          check_key "Gemini"    "$GEMINI_API_KEY"
          check_key "Mistral"   "$MISTRAL_API_KEY"
          check_key "Cohere"    "$COHERE_API_KEY"
          check_key "xAI Grok"  "$XAI_API_KEY"
