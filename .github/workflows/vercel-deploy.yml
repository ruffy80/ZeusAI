name: 🦄 Deploy ZeusAI (GitHub → Hetzner)

on:
  push:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/**'
      - '.github/workflows/vercel-deploy.yml'
      - '.github/workflows/setup-secrets-and-deploy.yml'
      - '.github/workflows/autonomous.yml'
      - '.github/workflows/unicorn-keepalive.yml'
  # ── Validate PRs targeting main (lint + test only, no deploy) ─────────────
  pull_request:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/**'
      - '.github/workflows/vercel-deploy.yml'
      - '.github/workflows/autonomous.yml'
      - '.github/workflows/unicorn-keepalive.yml'
  # ── Keep-alive: re-verify and redeploy every 6 hours ──────────────────────
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without code changes'
        required: false
        default: 'false'

env:
  SITE_DOMAIN_DEFAULT: zeusai.pro

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-validate-{0}', github.event.pull_request.number) || 'zeusai-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 0: Auto-Refresh GitHub Secrets (rulează pe orice push/schedule, nu pe PR)
  # Apelează setup-github-secrets.js cu toate secretele disponibile.
  # continue-on-error: true — eșecul NU blochează deploy-ul.
  # ──────────────────────────────────────────────────────────────────────
  refresh-secrets:
    name: 🔐 Auto-Refresh Secrets
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    continue-on-error: true
    defaults:
      run:
        working-directory: UNICORN_FINAL
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install libsodium-wrappers
        run: npm install --no-save libsodium-wrappers

      - name: Push all known secrets to GitHub Actions
        continue-on-error: true
        env:
          GITHUB_TOKEN:            ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ADMIN_MASTER_PASSWORD:   ${{ secrets.ADMIN_MASTER_PASSWORD }}
          ADMIN_2FA_CODE:          ${{ secrets.ADMIN_2FA_CODE }}
          VERCEL_TOKEN:            ${{ secrets.VERCEL_TOKEN }}
          HETZNER_API_KEY:         ${{ secrets.HETZNER_API_KEY }}
          HETZNER_API_TOKEN:       ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY:         ${{ secrets.SSH_PRIVATE_KEY || secrets.HETZNER_SSH_PRIVATE_KEY }}
          HETZNER_WEBHOOK_URL:     ${{ secrets.HETZNER_WEBHOOK_URL }}
          GH_WEBHOOK_URL:          ${{ secrets.GH_WEBHOOK_URL }}
          WEBHOOK_URL:             ${{ secrets.WEBHOOK_URL }}
          HETZNER_DNS_API_KEY:     ${{ secrets.HETZNER_DNS_API_KEY }}
          CF_TOKEN:                ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:              ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
          OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:         ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:          ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:             ${{ secrets.XAI_API_KEY }}
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:  ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER_MONTHLY:    ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_YEARLY:     ${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY:        ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY:         ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          STRIPE_PRICE_ENTERPRISE_MONTHLY: ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
          STRIPE_PRICE_ENTERPRISE_YEARLY:  ${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}
          PAYPAL_CLIENT_ID:        ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET:    ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID:       ${{ secrets.PAYPAL_WEBHOOK_ID }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
          SITE_DOMAIN:             ${{ secrets.SITE_DOMAIN }}
          UNICORN_DOMAIN:          ${{ secrets.UNICORN_DOMAIN }}
        run: node scripts/setup-github-secrets.js

  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Validate (lint + test)
  # ──────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate UNICORN_FINAL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UNICORN_FINAL
    outputs:
      lint_ok: ${{ steps.lint.outcome }}
      test_ok: ${{ steps.test.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: UNICORN_FINAL/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        id: lint
        run: CI=1 npm run lint

      - name: Test
        id: test
        run: CI=1 npm test

      - name: Build frontend (client)
        id: frontend_build
        run: |
          if [ -d client ] && [ -f client/package.json ]; then
            npm --prefix client install --no-audit --no-fund
            CI=false npm --prefix client run build
            echo "✅ Frontend build succeeded"
          else
            echo "ℹ️  No client/ directory found – skipping frontend build."
          fi

      - name: Innovation report (pre-deploy snapshot)
        run: npm run innovation:report || true

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Vercel deploy — DISABLED (platform runs exclusively on GitHub + Hetzner)
  # ──────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: 🚫 Deploy → Vercel (disabled — Hetzner only)
    runs-on: ubuntu-latest
    needs: validate
    # Vercel deployment is permanently disabled — the platform runs exclusively
    # on GitHub Actions + Hetzner. This stub job is kept so downstream jobs
    # (deploy-summary, smoke-tests) that reference `needs: deploy-vercel` continue
    # to resolve without needing YAML surgery.
    if: false
    defaults:
      run:
        working-directory: UNICORN_FINAL
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Vercel credentials
        id: vercel_guard
        run: |
          # Check if secrets exist (not empty string)
          # VERCEL_ORG_ID and VERCEL_PROJECT_ID have known defaults embedded in the codebase.
          # Only VERCEL_TOKEN is a true authentication secret that cannot be defaulted.
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Missing VERCEL_TOKEN secret. Skipping Vercel deploy job."
            exit 0
          fi
          # Validate token with Vercel API to avoid noisy failures in later steps
          if ! curl -fsS -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" https://api.vercel.com/v2/user >/dev/null; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  VERCEL_TOKEN is invalid. Skipping Vercel deploy job."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "✅ Vercel credentials validated"

      - name: Setup Node 22
        if: steps.vercel_guard.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Vercel CLI
        if: steps.vercel_guard.outputs.ready == 'true'
        run: npm i -g vercel@latest

      - name: Resolve & link Vercel project (auto-sync zeusai project ID)
        if: steps.vercel_guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
          VERCEL_PROJECT_ID_SECRET: ${{ secrets.VERCEL_PROJECT_ID || 'prj_YNIHsyltyZUV7HQA3VyQhhGDvKD3' }}
        run: |
          # Query Vercel API for the 'zeusai' project to get the authoritative project ID
          TEAM_PARAM=""
          [ -n "$VERCEL_ORG_ID" ] && TEAM_PARAM="?teamId=${VERCEL_ORG_ID}"
          RESOLVED_ID=$(curl -fsS \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/zeusai${TEAM_PARAM}" \
            2>/dev/null \
            | jq -r '.id // empty' 2>/dev/null || echo "")
          if [ -n "$RESOLVED_ID" ]; then
            echo "✅ Resolved zeusai Vercel project ID: ${RESOLVED_ID}"
            PROJECT_ID="$RESOLVED_ID"
          else
            # Fallback: try old project name 'zeusai-rust' (legacy project slug)
            echo "ℹ️  zeusai project not found – trying legacy name zeusai-rust..."
            RESOLVED_ID=$(curl -fsS \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v9/projects/zeusai-rust${TEAM_PARAM}" \
              2>/dev/null \
              | jq -r '.id // empty' 2>/dev/null || echo "")
            if [ -n "$RESOLVED_ID" ]; then
              echo "✅ Resolved legacy zeusai-rust project ID: ${RESOLVED_ID}"
              PROJECT_ID="$RESOLVED_ID"
            else
              echo "ℹ️  Could not resolve project from Vercel API – falling back to VERCEL_PROJECT_ID secret"
              PROJECT_ID="$VERCEL_PROJECT_ID_SECRET"
            fi
          fi
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${PROJECT_ID}"
          }
          EOF
          echo "RESOLVED_VERCEL_PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "🔗 Linked to Vercel project: ${PROJECT_ID}"

      - name: Rename Vercel project to 'zeusai' (fix zeusai-rust.vercel.app URL)
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
          VERCEL_PROJECT_ID: ${{ env.RESOLVED_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || 'prj_YNIHsyltyZUV7HQA3VyQhhGDvKD3' }}
        run: |
          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="?teamId=${VERCEL_TEAM_ID}"
          # Get current project name
          CURRENT_NAME=$(curl -fsS \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}${TEAM_PARAM}" \
            2>/dev/null | jq -r '.name // empty' 2>/dev/null || echo "")
          echo "Current Vercel project name: '${CURRENT_NAME}'"
          if [ "$CURRENT_NAME" = "zeusai" ]; then
            echo "✅ Project already named 'zeusai' – no rename needed"
          elif [ -n "$CURRENT_NAME" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}${TEAM_PARAM}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name":"zeusai"}')
            if [ "$HTTP" = "200" ]; then
              echo "✅ Vercel project renamed from '${CURRENT_NAME}' to 'zeusai' – URL will be zeusai.vercel.app"
            else
              echo "⚠️  Could not rename project (HTTP ${HTTP}) – project may already have the name or a conflict exists"
            fi
          else
            echo "⚠️  Could not determine current project name – skipping rename"
          fi

      - name: Pull Vercel environment
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build
        if: steps.vercel_guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CI: "false"
        run: vercel build --prod

      - name: Deploy to Vercel Production
        if: steps.vercel_guard.outputs.ready == 'true'
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod 2>&1) || DEPLOY_EXIT=$?
          # Gracefully handle the free-plan 100-deployments/day rate limit.
          # The existing production deployment continues to serve traffic normally.
          if echo "$DEPLOY_OUTPUT" | grep -q 'api-deployments-free-per-day'; then
            echo "⚠️  Vercel daily deployment limit reached (100/day on free plan)."
            echo "   The current production deployment remains active and serving traffic."
            echo "   Skipping – will retry on next push."
            exit 0
          fi
          if [ "${DEPLOY_EXIT:-0}" -ne 0 ]; then
            echo "❌ Vercel deploy failed: $DEPLOY_OUTPUT"
            exit 1
          fi
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Vercel deploy: $URL"

      - name: Ensure Vercel custom domains (optional)
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ env.RESOLVED_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || 'prj_YNIHsyltyZUV7HQA3VyQhhGDvKD3' }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
          UNICORN_DOMAIN: ${{ secrets.UNICORN_DOMAIN || 'www.zeusai.pro' }}
        run: |
          attach_domain () {
            local domain="$1"
            [ -z "$domain" ] && return 0
            echo "🌐 Ensuring domain: $domain"
            curl --silent --show-error --fail \
              -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/domains?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${domain}\"}" \
              || echo "ℹ️  Could not attach domain now (may already exist or DNS verification pending): ${domain}"
          }

          attach_domain "$SITE_DOMAIN"
          attach_domain "$UNICORN_DOMAIN"

      - name: Alias production deploy → zeusai.pro
        if: steps.vercel_guard.outputs.ready == 'true' && steps.deploy.outputs.deploy_url != ''
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
        run: |
          # Set zeusai.pro as production alias so it points to the latest deployment
          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="--scope ${VERCEL_TEAM_ID}"
          echo "🔗 Aliasing ${DEPLOY_URL} → ${SITE_DOMAIN}"
          vercel alias set "${DEPLOY_URL}" "${SITE_DOMAIN}" ${TEAM_PARAM} --token "${VERCEL_TOKEN}" \
            && echo "✅ zeusai.pro now points to ${DEPLOY_URL}" \
            || echo "ℹ️  Alias command failed (DNS may not be verified yet; domain is still attached as target)"
          # Also alias www. subdomain
          WWW_DOMAIN="www.${SITE_DOMAIN}"
          vercel alias set "${DEPLOY_URL}" "${WWW_DOMAIN}" ${TEAM_PARAM} --token "${VERCEL_TOKEN}" \
            && echo "✅ ${WWW_DOMAIN} aliased" \
            || echo "ℹ️  www alias pending DNS verification"

      - name: Update GitHub repo homepage → https://zeusai.pro
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          echo "🏠 Setting GitHub repo homepage to https://zeusai.pro..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH "https://api.github.com/repos/ruffy80/ZeusAI" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d '{"homepage":"https://zeusai.pro","description":"ZeusAI – Autonomous AI Business Platform"}')
          if [ "$HTTP" = "200" ]; then
            echo "✅ GitHub repo homepage updated to https://zeusai.pro (was zeusai-rust.vercel.app)"
          else
            echo "ℹ️  Could not update repo homepage (HTTP ${HTTP}) – GH_PAT may need repo scope"
          fi

      - name: Disable Vercel Password Protection
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ env.RESOLVED_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || 'prj_YNIHsyltyZUV7HQA3VyQhhGDvKD3' }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
        run: |
          echo "🔓 Disabling Vercel Password Protection..."
          curl --silent --show-error \
            -X PATCH "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"passwordProtection": null, "ssoProtection": null}' \
            && echo "✅ Password protection disabled" \
            || echo "ℹ️  Could not disable password protection (may already be off)"

      - name: Set BACKEND_API_URL in Vercel environment (proxy /api/* to Hetzner)
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ env.RESOLVED_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || 'prj_YNIHsyltyZUV7HQA3VyQhhGDvKD3' }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
        run: |
          if [ -z "$HETZNER_HOST" ]; then
            echo "ℹ️  HETZNER_HOST not set — skipping BACKEND_API_URL configuration"
            exit 0
          fi
          BACKEND_URL="http://${HETZNER_HOST}"
          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="?teamId=${VERCEL_TEAM_ID}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env${TEAM_PARAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"BACKEND_API_URL\",\"value\":\"${BACKEND_URL}\",\"type\":\"plain\",\"target\":[\"production\"],\"upsert\":true}")
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ BACKEND_API_URL set to ${BACKEND_URL} (Vercel proxies /api/* to Hetzner)"
          else
            echo "⚠️  Could not set BACKEND_API_URL (HTTP ${HTTP}) — site will load but API calls may fail"
          fi

      - name: Smoke test Vercel URL
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        run: |
          sleep 10
          URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -n "$URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            echo "Vercel /health → HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Vercel /health OK" || echo "⚠️  Could not verify (may need warmup)"
            STATUS_ROOT=$(curl -s -o /dev/null -w "%{http_code}" "$URL/" || echo "000")
            echo "Vercel / → HTTP $STATUS_ROOT"
            [ "$STATUS_ROOT" = "200" ] && echo "✅ Vercel / OK" || echo "⚠️  Root path not serving (frontend may be broken)"
          fi

      - name: Smoke test production Vercel domain
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        run: |
          PROD_URL="${{ env.VERCEL_PROD_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
          echo "Production $PROD_URL/health → HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Production domain OK" || echo "ℹ️  Production domain not yet reachable (DNS propagation may be pending)"
          STATUS_ROOT=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/" || echo "000")
          echo "Production $PROD_URL/ → HTTP $STATUS_ROOT"
          [ "$STATUS_ROOT" = "200" ] && echo "✅ Production root OK" || echo "⚠️  Production root not serving"

      - name: Delete old unicorn-final Vercel project (cleanup)
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID || 'team_wes3fQvKjdfOMKXe7f4fFQoL' }}
        run: |
          echo "🗑️  Looking up and removing old 'unicorn-final' Vercel project..."
          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="?teamId=${VERCEL_TEAM_ID}"
          # Find project ID by name
          OLD_PROJECT_ID=$(curl -fsS \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/unicorn-final${TEAM_PARAM}" \
            2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -z "$OLD_PROJECT_ID" ]; then
            echo "ℹ️  Project 'unicorn-final' not found or already deleted – nothing to do."
          else
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v9/projects/${OLD_PROJECT_ID}${TEAM_PARAM}")
            if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
              echo "✅ Vercel project 'unicorn-final' (${OLD_PROJECT_ID}) deleted successfully."
            else
              echo "⚠️  Could not delete 'unicorn-final' (HTTP ${HTTP}). It may have already been removed."
            fi
          fi

  # ──────────────────────────────────────────────────────────────────────
  # JOB: Configure DNS records for zeusai.pro (idempotent, non-blocking)
  # ──────────────────────────────────────────────────────────────────────
  setup-dns:
    name: 🌐 Configure DNS → zeusai.pro
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: UNICORN_FINAL
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Configure DNS records (Hetzner DNS → Cloudflare fallback)
        continue-on-error: true
        id: dns_auto
        env:
          SITE_DOMAIN:           ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
          HETZNER_DNS_API_KEY:   ${{ secrets.HETZNER_DNS_API_KEY || secrets.HETZNER_API_KEY }}
          HETZNER_HOST:          ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
          CF_TOKEN:              ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:            ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/setup-dns.js

      - name: DNS status check + instructions
        if: always()
        env:
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
        run: |
          DOMAIN="${SITE_DOMAIN:-zeusai.pro}"
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "  DNS STATUS CHECK for $DOMAIN"
          echo "════════════════════════════════════════════════════════════"
          RESOLVED=$(dig +short "$DOMAIN" A 2>/dev/null | head -1 || echo "")
          HETZNER_IP="${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}"
          if [ "$RESOLVED" = "$HETZNER_IP" ]; then
            echo "✅ DNS OK: $DOMAIN → $RESOLVED (Hetzner)"
          elif [ -n "$RESOLVED" ]; then
            echo "⚠️  DNS MISMATCH: $DOMAIN → $RESOLVED (expected $HETZNER_IP for Hetzner)"
            echo "  Configurează la provider-ul DNS:"
            echo "    A     @    $HETZNER_IP   TTL 300"
            echo "    A     www  $HETZNER_IP   TTL 300"
          else
            echo "❌ DNS: $DOMAIN nu se rezolvă - adaugă records DNS manual:"
            echo "    A     @    $HETZNER_IP   TTL 300"
            echo "    A     www  $HETZNER_IP   TTL 300"
          fi
          echo "════════════════════════════════════════════════════════════"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Hetzner via SSH (runs backend/index.js)
  # ──────────────────────────────────────────────────────────────────────
  deploy-hetzner:
    name: 🖥️ Deploy → Hetzner (SSH)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Hetzner target and channels
        run: |
          echo "DEPLOY_HOST=${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}" >> "$GITHUB_ENV"
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          # Ensure DEPLOY_PORT is numeric
          if ! [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then
            DEPLOY_PORT="22"
          fi
          echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          echo "DEPLOY_PATH=${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" >> "$GITHUB_ENV"
          echo "WEBHOOK_URL=${{ secrets.HETZNER_WEBHOOK_URL || secrets.GH_WEBHOOK_URL || secrets.WEBHOOK_URL }}" >> "$GITHUB_ENV"

      - name: Validate Hetzner SSH prerequisites
        id: hetzner_guard
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_PATH}" ]; then
            echo "ssh_ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Missing SSH host/user/path. SSH deploy disabled."
          else
            echo "ssh_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Hetzner API credential
        run: |
          if [ -n "${{ secrets.HETZNER_API_KEY }}" ]; then
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_KEY }}" >> "$GITHUB_ENV"
          else
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH agent
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write SSH key to file (use fallback if primary key not available)
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️  No SSH key found. SSH deploy will fail."
            exit 1
          fi
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Test SSH connection (continue on error)
          ssh-keyscan -t ed25519,rsa -p ${DEPLOY_PORT:-22} ${DEPLOY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key configured"

      - name: Open Hetzner Cloud Firewall ports 80/443
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_KEY || secrets.HETZNER_API_TOKEN }}
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
        run: |
          if [ -z "$HETZNER_API_TOKEN" ]; then
            echo "ℹ️  HETZNER_API_KEY not set — skipping cloud firewall rule update"
            exit 0
          fi
          # Replace fragile Python with jq for robustness
          if ! command -v jq >/dev/null 2>&1; then
            apt-get install -y jq -qq 2>/dev/null || true
          fi
          SERVER_RESP=$(curl -sf -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            "https://api.hetzner.cloud/v1/servers" 2>/dev/null || echo "{}")
          SERVER_ID=$(echo "$SERVER_RESP" | jq -r \
            --arg ip "$DEPLOY_HOST" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .id' 2>/dev/null | head -1 || echo "")
          if [ -z "$SERVER_ID" ]; then
            echo "ℹ️  Could not find Hetzner server with IP ${DEPLOY_HOST} — skipping cloud firewall update"
            exit 0
          fi
          echo "Found server ID: $SERVER_ID"
          # Find firewall attached to the server
          FW_RESP=$(curl -sf -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            "https://api.hetzner.cloud/v1/firewalls" 2>/dev/null || echo "{}")
          FW_ID=$(echo "$FW_RESP" | jq -r \
            --argjson sid "$SERVER_ID" \
            '.firewalls[] | select(.applied_to[]?.server.id == $sid) | .id' 2>/dev/null | head -1 || echo "")
          if [ -z "$FW_ID" ]; then
            echo "ℹ️  No cloud firewall found for server ${SERVER_ID} — skipping"
            exit 0
          fi
          echo "Found firewall ID: $FW_ID"
          # Get current rules and ensure HTTP/HTTPS inbound rules exist
          FW_DETAIL=$(curl -sf -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            "https://api.hetzner.cloud/v1/firewalls/${FW_ID}" 2>/dev/null || echo "{}")
          RULES=$(echo "$FW_DETAIL" | jq '
            .firewall.rules as $existing |
            ($existing | map(select(.direction == "in" and (.port == "80" or .port == "443"))) | length) as $has_web |
            if $has_web >= 2 then $existing
            else
              $existing +
              (if ($existing | map(select(.direction=="in" and .port=="80")) | length) == 0
               then [{"direction":"in","protocol":"tcp","port":"80","source_ips":["0.0.0.0/0","::/0"]}]
               else [] end) +
              (if ($existing | map(select(.direction=="in" and .port=="443")) | length) == 0
               then [{"direction":"in","protocol":"tcp","port":"443","source_ips":["0.0.0.0/0","::/0"]}]
               else [] end)
            end' 2>/dev/null || echo "null")
          if [ "$RULES" = "null" ] || [ -z "$RULES" ]; then
            echo "ℹ️  Could not determine firewall rules — skipping update"
            exit 0
          fi
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "https://api.hetzner.cloud/v1/firewalls/${FW_ID}/actions/set_rules" \
            -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"rules\": ${RULES}}" 2>/dev/null || echo "000")
          echo "Hetzner Cloud Firewall update → HTTP $HTTP"
          [ "$HTTP" = "201" ] && echo "✅ Cloud firewall ports 80/443 opened" || echo "ℹ️  Firewall update returned $HTTP (may already be open or unchanged)"

      - name: Sync UNICORN_FINAL to Hetzner
        id: sync_hetzner
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          echo "Deploying UNICORN_FINAL to Hetzner..."
          DEST='${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}'
          tar -C ./UNICORN_FINAL \
              --exclude='.git' --exclude='node_modules' --exclude='.next' \
              --exclude='logs' --exclude='*.local' --exclude='.env' \
              -czf - . | \
            ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}" \
              "DEST='${DEST}'; mkdir -p \"\$DEST\" && chmod -R u+w \"\$DEST\" 2>/dev/null || true && cd \"\$DEST\" && tar --overwrite --no-same-permissions --no-same-owner -xzf -"

      - name: Install deps + restart backend on Hetzner
        id: restart_hetzner
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          echo "DEBUG SSH: Connecting to $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o BatchMode=yes \
            "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}" << ENDSSH
            set -e
            cd "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}"

            # ── Allow git to operate in the deploy directory (rsync owner may differ) ──
            git config --global --add safe.directory "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" 2>/dev/null || true

            # ── Ensure Node.js exists on host ───────────────────────────
            if ! command -v node >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y curl ca-certificates gnupg
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              chmod a+r /etc/apt/keyrings/nodesource.gpg
              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
              apt-get update -y
              apt-get install -y nodejs
            fi

            # ── Ensure PM2 is installed globally ─────────────────────────
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "📦 Installing PM2 globally..."
              npm install -g pm2
            fi

            # ── Update .env via create-env.sh (upsert, nu suprascrie totul) ──
            # Toate secretele critice sunt transmise explicit din GitHub Secrets
            if [ -f scripts/create-env.sh ]; then
              chmod +x scripts/create-env.sh
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ADMIN_SECRET="${{ secrets.ADMIN_SECRET }}" \
              ADMIN_MASTER_PASSWORD="${{ secrets.ADMIN_MASTER_PASSWORD }}" \
              ADMIN_2FA_CODE="${{ secrets.ADMIN_2FA_CODE }}" \
              WEBHOOK_SECRET="${{ secrets.WEBHOOK_SECRET || secrets.HETZNER_WEBHOOK_SECRET }}" \
              HETZNER_WEBHOOK_SECRET="${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
              ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              MISTRAL_API_KEY="${{ secrets.MISTRAL_API_KEY }}" \
              COHERE_API_KEY="${{ secrets.COHERE_API_KEY }}" \
              XAI_API_KEY="${{ secrets.XAI_API_KEY }}" \
              STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
              STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              STRIPE_PRICE_STARTER_MONTHLY="${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}" \
              STRIPE_PRICE_STARTER_YEARLY="${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}" \
              STRIPE_PRICE_PRO_MONTHLY="${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}" \
              STRIPE_PRICE_PRO_YEARLY="${{ secrets.STRIPE_PRICE_PRO_YEARLY }}" \
              STRIPE_PRICE_ENTERPRISE_MONTHLY="${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}" \
              STRIPE_PRICE_ENTERPRISE_YEARLY="${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}" \
              PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
              PAYPAL_CLIENT_SECRET="${{ secrets.PAYPAL_CLIENT_SECRET }}" \
              PAYPAL_WEBHOOK_ID="${{ secrets.PAYPAL_WEBHOOK_ID }}" \
              SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              SMTP_USER="${{ secrets.SMTP_USER }}" \
              SMTP_HOST="${{ secrets.SMTP_HOST || 'smtp.mail.yahoo.com' }}" \
              SMTP_PORT="${{ secrets.SMTP_PORT || '587' }}" \
              VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}" \
              GITHUB_TOKEN="${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}" \
              HETZNER_API_KEY="${HETZNER_API_VALUE}" \
              HETZNER_API_TOKEN="${HETZNER_API_VALUE}" \
              PUBLIC_APP_URL="https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}" \
              SITE_DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}" \
              CORS_ORIGINS="https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }},https://www.${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}" \
              BTC_WALLET_ADDRESS="${{ secrets.BTC_WALLET_ADDRESS || 'bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e' }}" \
              OWNER_EMAIL="${{ secrets.SMTP_USER || 'vladoi_ionut@yahoo.com' }}" \
              ADMIN_EMAIL="${{ secrets.SMTP_USER || 'vladoi_ionut@yahoo.com' }}" \
              bash scripts/create-env.sh "${{ secrets.HETZNER_DEPLOY_PATH || '/root/unicorn-final' }}" || true
            else
              # Fallback: upsert manual pentru cheile critice
              for key in HETZNER_API_KEY HETZNER_API_TOKEN PUBLIC_APP_URL SITE_DOMAIN \
                         JWT_SECRET ADMIN_SECRET ADMIN_MASTER_PASSWORD ADMIN_2FA_CODE \
                         WEBHOOK_SECRET HETZNER_WEBHOOK_SECRET \
                         OPENAI_API_KEY DEEPSEEK_API_KEY ANTHROPIC_API_KEY GEMINI_API_KEY \
                         STRIPE_SECRET_KEY STRIPE_PUBLISHABLE_KEY SMTP_PASS \
                         BTC_WALLET_ADDRESS OWNER_BTC_ADDRESS OWNER_EMAIL OWNER_NAME \
                         ADMIN_EMAIL SMTP_HOST SMTP_PORT SMTP_USER; do
                [ -f .env ] && sed -i "/^${key}=/d" .env || true
              done
              printf "JWT_SECRET=%s\nADMIN_SECRET=%s\n" \
                "${{ secrets.JWT_SECRET }}" "${{ secrets.ADMIN_SECRET }}" >> .env
              printf "ADMIN_MASTER_PASSWORD=%s\nADMIN_2FA_CODE=%s\n" \
                "${{ secrets.ADMIN_MASTER_PASSWORD }}" "${{ secrets.ADMIN_2FA_CODE }}" >> .env
              printf "WEBHOOK_SECRET=%s\nHETZNER_WEBHOOK_SECRET=%s\n" \
                "${{ secrets.WEBHOOK_SECRET }}" "${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}" >> .env
              printf "OPENAI_API_KEY=%s\nDEEPSEEK_API_KEY=%s\nANTHROPIC_API_KEY=%s\n" \
                "${{ secrets.OPENAI_API_KEY }}" "${{ secrets.DEEPSEEK_API_KEY }}" "${{ secrets.ANTHROPIC_API_KEY }}" >> .env
              printf "GEMINI_API_KEY=%s\nMISTRAL_API_KEY=%s\nCOHERE_API_KEY=%s\nXAI_API_KEY=%s\n" \
                "${{ secrets.GEMINI_API_KEY }}" "${{ secrets.MISTRAL_API_KEY }}" "${{ secrets.COHERE_API_KEY }}" "${{ secrets.XAI_API_KEY }}" >> .env
              printf "STRIPE_SECRET_KEY=%s\nSTRIPE_PUBLISHABLE_KEY=%s\nSTRIPE_WEBHOOK_SECRET=%s\n" \
                "${{ secrets.STRIPE_SECRET_KEY }}" "${{ secrets.STRIPE_PUBLISHABLE_KEY }}" "${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env
              printf "STRIPE_PRICE_STARTER_MONTHLY=%s\nSTRIPE_PRICE_STARTER_YEARLY=%s\n" \
                "${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}" "${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}" >> .env
              printf "STRIPE_PRICE_PRO_MONTHLY=%s\nSTRIPE_PRICE_PRO_YEARLY=%s\n" \
                "${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}" "${{ secrets.STRIPE_PRICE_PRO_YEARLY }}" >> .env
              printf "STRIPE_PRICE_ENTERPRISE_MONTHLY=%s\nSTRIPE_PRICE_ENTERPRISE_YEARLY=%s\n" \
                "${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}" "${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}" >> .env
              printf "PAYPAL_CLIENT_ID=%s\nPAYPAL_CLIENT_SECRET=%s\nPAYPAL_WEBHOOK_ID=%s\n" \
                "${{ secrets.PAYPAL_CLIENT_ID }}" "${{ secrets.PAYPAL_CLIENT_SECRET }}" "${{ secrets.PAYPAL_WEBHOOK_ID }}" >> .env
              printf "HETZNER_API_KEY=%s\nHETZNER_API_TOKEN=%s\n" \
                "${HETZNER_API_VALUE}" "${HETZNER_API_VALUE}" >> .env
              printf "PUBLIC_APP_URL=https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}\nSITE_DOMAIN=${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}\n" >> .env
              printf "DOMAIN=${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}\n" >> .env
              printf "CORS_ORIGINS=https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }},https://www.${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}\n" >> .env
              printf "BTC_WALLET_ADDRESS=${{ secrets.BTC_WALLET_ADDRESS || 'bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e' }}\n" >> .env
              printf "OWNER_NAME=Vladoi Ionut\nOWNER_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
              printf "ADMIN_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
              printf "GITHUB_REPO_OWNER=ruffy80\nGITHUB_REPO_NAME=ZeusAI\nGITHUB_BRANCH=main\n" >> .env
              printf "HETZNER_BACKEND_URL=http://127.0.0.1:3000\n" >> .env
              printf "VERCEL_HEALTH_URL=https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}/health\n" >> .env
              printf "SMTP_HOST=${{ secrets.SMTP_HOST || 'smtp.mail.yahoo.com' }}\nSMTP_PORT=${{ secrets.SMTP_PORT || '587' }}\n" >> .env
              printf "SMTP_USER=${{ secrets.SMTP_USER }}\nSMTP_PASS=${{ secrets.SMTP_PASS }}\n" >> .env
            fi

            # ── Verify source integrity: re-fetch any JS file with SyntaxError ──
            REPO_RAW="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/UNICORN_FINAL"
            if [ -d "backend/modules" ]; then
              shopt -s nullglob
              for jsfile in backend/modules/*.js src/index.js backend/index.js; do
                if [ -f "$jsfile" ] && ! node --check "$jsfile" 2>/dev/null; then
                  echo "⚠️  SyntaxError in $jsfile — re-fetching from GitHub..."
                  curl -sfL "${REPO_RAW}/${jsfile}" -o "$jsfile" && \
                    echo "✅ Re-fetched $jsfile" || echo "⚠️  Failed to re-fetch $jsfile"
                fi
              done
              shopt -u nullglob
            fi

            # ── Stop PM2 before npm install to prevent ENOTEMPTY file locks ──
            if command -v pm2 >/dev/null 2>&1; then
              pm2 stop unicorn 2>/dev/null || pm2 stop all 2>/dev/null || true
            fi

            # ── Install dependencies (with retry on ENOTEMPTY) ───────────
            npm install --legacy-peer-deps --no-audit --no-fund || {
              echo "⚠️  npm install failed, cleaning and retrying..."
              npm cache clean --force 2>/dev/null || true
              rm -rf node_modules 2>/dev/null || true
              npm install --legacy-peer-deps --no-audit --no-fund
            }

            # ── Rebuild native modules for current Node.js version ────────
            npm rebuild better-sqlite3 --no-fund 2>/dev/null || true

            # ── Build React frontend ──────────────────────────────────────
            if [ -d "client" ]; then
              echo "🎨 Building frontend..."
              cd client
              npm install --legacy-peer-deps --no-audit --no-fund || {
                echo "⚠️  client npm install failed, cleaning and retrying..."
                npm cache clean --force 2>/dev/null || true
                rm -rf node_modules 2>/dev/null || true
                npm install --legacy-peer-deps --no-audit --no-fund
              }
              CI=false npm run build
              cd ..
              echo "✅ Frontend built"
            fi

            # ── Open firewall for HTTP/HTTPS (Nginx) ─────────────────────
            if command -v ufw >/dev/null 2>&1; then
              ufw allow 22/tcp  2>/dev/null || true
              ufw default deny incoming 2>/dev/null || true
              ufw default allow outgoing 2>/dev/null || true
              ufw allow 80/tcp  2>/dev/null || true
              ufw allow 443/tcp 2>/dev/null || true
              ufw deny  3000/tcp 2>/dev/null || true
              ufw --force enable 2>/dev/null || true
              echo "✅ Firewall: ports 22/80/443 open; port 3000 blocked from outside"
            fi
            # Also open via iptables in case ufw is not available
            iptables -I INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
            iptables -I INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true
            ip6tables -I INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
            ip6tables -I INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true

            # ── Install and configure Nginx ───────────────────────────────
            DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
            CERT_EMAIL="${{ secrets.OWNER_EMAIL || 'vladoi_ionut@yahoo.com' }}"
            if ! command -v nginx >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y nginx
            fi
            if [ -f scripts/nginx-unicorn.conf ]; then
              # Fix 1: Only deploy HTTP-only config if no SSL cert exists yet.
              # If certbot has already configured HTTPS, preserve the nginx config it wrote
              # (overwriting it would strip the SSL server block and break HTTPS on every deploy).
              if [ ! -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
                cp scripts/nginx-unicorn.conf /etc/nginx/sites-available/unicorn
                echo "ℹ️  No SSL cert found — deploying HTTP-only nginx config"
              else
                echo "ℹ️  SSL cert exists — preserving existing nginx HTTPS config (not overwriting)"
              fi
              ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
              rm -f /etc/nginx/sites-enabled/default
              # Safe reload: test first; if test fails, log and force-restart with fallback conf
              if nginx -t 2>&1; then
                systemctl reload nginx 2>/dev/null || systemctl restart nginx 2>/dev/null || true
                echo "✅ Nginx configured and reloaded"
              else
                echo "⚠️  nginx -t failed — attempting force-restart with current conf"
                systemctl restart nginx 2>/dev/null || true
                echo "ℹ️  Nginx restart attempted (check logs: journalctl -u nginx -n 30)"
              fi
              # Ensure nginx is enabled on boot and actually running
              systemctl enable nginx 2>/dev/null || true
              systemctl is-active --quiet nginx && echo "✅ Nginx is running" || \
                { systemctl start nginx 2>/dev/null || true; echo "ℹ️  nginx start attempted"; }
            fi

            # ── Install certbot + obtain/renew SSL cert ───────────────────
            if [ -n "$DOMAIN" ]; then
              if ! command -v certbot >/dev/null 2>&1; then
                apt-get install -y certbot python3-certbot-nginx 2>/dev/null || snap install --classic certbot 2>/dev/null || true
              fi
              if command -v certbot >/dev/null 2>&1; then
                # Verify DNS resolves to this server before attempting cert.
                # Running certbot when DNS points elsewhere burns Let's Encrypt rate-limit quota.
                resolve_ipv4() {
                  getent ahostsv4 "$1" 2>/dev/null | awk 'NR==1{print $1}'
                }
                SERVER_IP=$(curl -4 -fsS --max-time 5 https://ifconfig.me 2>/dev/null || hostname -I | awk '{print $1}')
                DOMAIN_IP=$(resolve_ipv4 "$DOMAIN")
                WWW_DOMAIN_IP=$(resolve_ipv4 "www.$DOMAIN")
                API_DOMAIN_IP=$(resolve_ipv4 "api.$DOMAIN")
                ORCH_DOMAIN_IP=$(resolve_ipv4 "orchestrator.$DOMAIN")
                echo "  Server IP: ${SERVER_IP}"
                echo "  Domain IPs: @ → ${DOMAIN_IP:-'(unresolved)'}  www → ${WWW_DOMAIN_IP:-'(unresolved)'}  api → ${API_DOMAIN_IP:-'(unresolved)'}  orchestrator → ${ORCH_DOMAIN_IP:-'(unresolved)'}"

                if [ -n "$DOMAIN_IP" ] && [ "$DOMAIN_IP" = "$SERVER_IP" ]; then
                  # Build certbot -d flags for every subdomain that resolves to this server
                  CERT_DOMAINS="-d $DOMAIN"
                  [ -n "$WWW_DOMAIN_IP" ]  && [ "$WWW_DOMAIN_IP"  = "$SERVER_IP" ] && CERT_DOMAINS="$CERT_DOMAINS -d www.$DOMAIN"
                  [ -n "$API_DOMAIN_IP" ]  && [ "$API_DOMAIN_IP"  = "$SERVER_IP" ] && CERT_DOMAINS="$CERT_DOMAINS -d api.$DOMAIN"
                  [ -n "$ORCH_DOMAIN_IP" ] && [ "$ORCH_DOMAIN_IP" = "$SERVER_IP" ] && CERT_DOMAINS="$CERT_DOMAINS -d orchestrator.$DOMAIN"
                  echo "  Requesting SSL for: $CERT_DOMAINS"

                  # Run certbot without 2>/dev/null so failures are visible in CI logs.
                  if eval certbot --nginx $CERT_DOMAINS \
                      --non-interactive --agree-tos --email "$CERT_EMAIL" \
                      --redirect --keep-until-expiring; then
                    echo "✅ SSL certificate configured for $CERT_DOMAINS"
                  else
                    echo "⚠️  certbot failed — check certbot output above for details"
                    certbot renew --nginx 2>/dev/null || true
                    echo "ℹ️  certbot renewal attempted for $DOMAIN"
                  fi
                else
                  echo "⚠️  DNS mismatch: $DOMAIN → ${DOMAIN_IP:-'(unresolved)'}, server IP: $SERVER_IP"
                  echo "    Skipping certbot to avoid Let's Encrypt rate-limit burn."
                  echo "    Fix DNS to point $DOMAIN → $SERVER_IP, then redeploy."
                fi
                # Only reload if config test passes after certbot modifications
                if nginx -t 2>/dev/null; then
                  systemctl reload nginx 2>/dev/null || true
                  echo "✅ Nginx reloaded after certbot"
                else
                  echo "⚠️  nginx -t failed after certbot — keeping existing nginx config"
                fi

                # Verify HTTPS locally via nginx using the public hostname.
                if curl -kfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health" >/dev/null 2>&1; then
                  echo "✅ HTTPS verified locally for $DOMAIN"
                else
                  echo "⚠️  HTTPS still unavailable locally for $DOMAIN after certbot attempt"
                fi
              fi
            fi

            # ── Verify nginx is listening on port 80 ──────────────────────
            sleep 2
            if curl -sf --max-time 5 http://localhost/api/health >/dev/null 2>&1 || \
               curl -sf --max-time 5 http://localhost:80/ >/dev/null 2>&1; then
              echo "✅ Nginx port 80 verified accessible"
            else
              echo "⚠️  Nginx port 80 not responding — attempting nginx restart"
              nginx -t 2>&1 || true
              systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || true
              sleep 3
              curl -sf --max-time 5 http://localhost:80/ >/dev/null 2>&1 && \
                echo "✅ Nginx recovered on port 80" || \
                echo "❌ Nginx still not on port 80 — check: journalctl -u nginx -n 50"
            fi

            # ── Backup current deploy snapshot (keep last 5) ─────────────
            mkdir -p scripts
            if [ -f scripts/create-backup.sh ]; then
              bash scripts/create-backup.sh "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" || true
            fi

            # ── Run innovation sprint + report ────────────────────────────
            npm run innovation:sprint  || true
            npm run innovation:report  || true

            # ── Restart backend process (safe / low-downtime) ─────────────
            if command -v pm2 >/dev/null 2>&1; then
              mkdir -p logs
              if pm2 describe unicorn >/dev/null 2>&1; then
                pm2 restart unicorn
              else
                pm2 start ecosystem.config.js --only unicorn
              fi
              pm2 describe unicorn-health-guardian >/dev/null 2>&1 && pm2 restart unicorn-health-guardian || true
              pm2 save
              # Register PM2 in systemd so it starts on reboot
              pm2 startup systemd 2>/dev/null | grep "^sudo" | head -1 | bash 2>/dev/null || true
              pm2 save
              echo "✅ PM2 unicorn process healthy"
            elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q "^unicorn\.service"; then
              systemctl restart unicorn && echo "✅ Restarted via systemctl"
            else
              pkill -f "node backend/index.js" || true
              sleep 1
              mkdir -p logs
              nohup node backend/index.js > logs/backend.log 2>&1 &
              echo "✅ Restarted via nohup"
            fi

            # ── Ensure nginx is enabled to start on reboot ────────────────
            if command -v nginx >/dev/null 2>&1; then
              systemctl enable nginx 2>/dev/null || true
              echo "✅ Nginx enabled for auto-start on reboot"
            fi

            # ── Setup systemd for permanent auto-boot (idempotent) ────────
            if command -v systemctl >/dev/null 2>&1; then
              bash scripts/setup-systemd.sh "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" || true
              echo "✅ Systemd auto-boot configured"
            fi
          ENDSSH

      - name: Health check Hetzner backend
        id: hetzner_health
        continue-on-error: true
        if: steps.restart_hetzner.outcome == 'success'
        run: |
          # Wait for backend to start up after PM2 restart (retry up to 90s)
          HEALTH='{"status":"unreachable"}'
          for attempt in 1 2 3 4 5 6; do
            sleep 15
            HEALTH=$(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}" \
              "curl -sS http://localhost:3000/api/health 2>/dev/null || curl -sS http://localhost:80/api/health 2>/dev/null || echo '{\"status\":\"unreachable\"}'")
            echo "Hetzner health (attempt $attempt): $HEALTH"
            echo "$HEALTH" | grep -q '"status":"ok"' && break || true
          done
          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "✅ Backend healthy"
          else
            echo "⚠️  Backend not yet ready — collecting diagnostics..."
            ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}" \
              "pm2 list 2>/dev/null || true; echo '--- last 30 log lines ---'; pm2 logs unicorn --lines 30 --nostream 2>/dev/null || tail -30 '${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}/logs/pm2-error.log' 2>/dev/null || true" || true
          fi

      - name: Fallback — trigger Hetzner webhook (if SSH failed)
        id: webhook_fallback
        if: ${{ steps.hetzner_guard.outputs.ssh_ready != 'true' || steps.sync_hetzner.outcome != 'success' || steps.restart_hetzner.outcome != 'success' }}
        continue-on-error: true
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "ℹ️  No HETZNER_WEBHOOK_URL configured. Skipping webhook fallback."
            exit 0
          fi
          if [[ "${WEBHOOK_URL}" != http://* && "${WEBHOOK_URL}" != https://* ]]; then
            echo "ℹ️  Webhook URL is invalid: ${WEBHOOK_URL}"
            exit 0
          fi
          TARGET_URL="${WEBHOOK_URL%/}"
          case "${TARGET_URL}" in
            */deploy) ;;
            *) TARGET_URL="${TARGET_URL}/deploy" ;;
          esac
          SECRET="${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}"
          curl --fail --show-error --silent \
            -X POST "${TARGET_URL}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${SECRET}" \
            -d '{"source":"github-actions","action":"deploy-fallback","ref":"${{ github.sha }}"}' \
            || echo "⚠️  Hetzner fallback webhook endpoint not reachable right now."

      - name: Fail if both SSH and webhook failed
        if: ${{ (steps.sync_hetzner.outcome != 'success' || steps.restart_hetzner.outcome != 'success') && steps.webhook_fallback.outcome != 'success' }}
        run: |
          echo "❌ Hetzner deploy failed: SSH failed and no webhook configured."
          exit 1

  # ──────────────────────────────────────────────────────────────────────
  # JOB 4: Webhook-only deploy (when no SSH key is set, only webhook)
  # ──────────────────────────────────────────────────────────────────────
  deploy-hetzner-webhook:
    name: 🔔 Deploy → Hetzner (Webhook only)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Trigger Hetzner webhook
        continue-on-error: true
        run: |
          URL='${{ secrets.HETZNER_WEBHOOK_URL || secrets.GH_WEBHOOK_URL || secrets.WEBHOOK_URL }}'
          if [ -z "${URL}" ]; then
            echo "ℹ️  No HETZNER_WEBHOOK_URL configured. Skipping webhook-only deploy."
            exit 0
          fi
          if [[ "${URL}" != http://* && "${URL}" != https://* ]]; then
            echo "ℹ️  Webhook URL is invalid: ${URL}"
            exit 0
          fi
          TARGET_URL="${URL%/}"
          case "${TARGET_URL}" in
            */deploy) ;;
            *) TARGET_URL="${TARGET_URL}/deploy" ;;
          esac
          SECRET="${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}"
          curl --fail --show-error --silent \
            -X POST "${TARGET_URL}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${SECRET}" \
            -d '{"source":"github-actions","action":"deploy","ref":"${{ github.sha }}"}' \
            || echo "⚠️  Hetzner webhook endpoint not reachable right now."

  # ──────────────────────────────────────────────────────────────────────
  # JOB 5: Deploy summary
  # ──────────────────────────────────────────────────────────────────────
  deploy-summary:
    name: 📊 Deploy Summary
    runs-on: ubuntu-latest
    needs: [validate, deploy-vercel, deploy-hetzner]
    if: always()
    steps:
      - name: Print summary
        env:
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
        run: |
          echo "## 🦄 ZeusAI Deploy Summary (GitHub → Hetzner)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target    | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate  | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hetzner   | ${{ needs.deploy-hetzner.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\` by **${{ github.actor }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          SITE_DOMAIN="${SITE_DOMAIN:-zeusai.pro}"
          # Check if domain resolves to Hetzner (the only valid deployment target)
          RESOLVED=$(dig +short "$SITE_DOMAIN" A 2>/dev/null | head -1 || echo "")
          HETZNER_IP="${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}"
          if [ "$RESOLVED" = "$HETZNER_IP" ]; then
            echo "✅ **DNS OK** – $SITE_DOMAIN → $RESOLVED (Hetzner)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ DNS NEFUNCȚIONAL – Acțiune necesară!" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$SITE_DOMAIN ${RESOLVED:+→ $RESOLVED (GREȘIT)} ${RESOLVED:-nu se rezolvă}." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Adaugă aceste DNS records la provider-ul tău (GoDaddy/Namecheap/etc):**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "Type   Name   Value           TTL" >> "$GITHUB_STEP_SUMMARY"
            echo "A      @      $HETZNER_IP     300" >> "$GITHUB_STEP_SUMMARY"
            echo "A      www    $HETZNER_IP     300" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Sau setează în GitHub Secrets: \`HETZNER_DNS_API_KEY\` / \`CF_TOKEN\` + \`CF_ZONE_ID\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ──────────────────────────────────────────────────────────────────────
  # JOB 6: Smoke tests after deploy + HTTPS health check with auto-restart
  # ──────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: 🧪 Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-hetzner]
    if: always()
    steps:
      - name: Check Hetzner health
        run: |
          HETZNER_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}"
          ALL_OK=true

          if [ -z "$HETZNER_HOST" ]; then
            echo "ℹ️  Hetzner not configured – skipping smoke test."
          else
            # Prefer Nginx port 80 (proxied to backend:3000); port 3000 is firewall-restricted
            HETZNER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://${HETZNER_HOST}/api/health" || echo "000")
            if [ "$HETZNER_STATUS" = "000" ] || [ "$HETZNER_STATUS" = "000000" ]; then
              HETZNER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://${HETZNER_HOST}:3000/api/health" || echo "000")
            fi
            echo "Hetzner /api/health: $HETZNER_STATUS"
            if [ "$HETZNER_STATUS" != "200" ]; then
              echo "⚠️  Hetzner smoke test: expected 200, got $HETZNER_STATUS"
              ALL_OK=false
            else
              echo "✅ Hetzner smoke test passed"
            fi
          fi

          if [ "$ALL_OK" = "true" ]; then
            echo "✅ All configured smoke tests passed"
          else
            echo "⚠️  Some smoke tests reported non-200 responses (see above)"
          fi

          # ── Production domain check ──────────────────────────────────
          PROD_DOMAIN="${{ secrets.SITE_DOMAIN || env.SITE_DOMAIN_DEFAULT }}"
          PROD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${PROD_DOMAIN}/health" || echo "000")
          echo "Production https://${PROD_DOMAIN}/health: $PROD_STATUS"
          [ "$PROD_STATUS" = "200" ] && echo "✅ https://${PROD_DOMAIN} is live" || echo "ℹ️  Production domain not yet reachable (DNS/SSL may still be propagating)"

      - name: Quantum Integrity Shield check
        continue-on-error: true
        run: |
          HETZNER_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}"

          QIS_STATUS=""
          # Check Hetzner (port 80 via Nginx, fallback to 3000)
          if [ -n "$HETZNER_HOST" ]; then
            QIS_STATUS=$(curl -s --max-time 15 "http://${HETZNER_HOST}/api/quantum-integrity/status" || \
                         curl -s --max-time 15 "http://${HETZNER_HOST}:3000/api/quantum-integrity/status" || echo "")
          fi

          if [ -z "$QIS_STATUS" ]; then
            echo "ℹ️  Quantum Integrity Shield endpoint not reachable — skipping check."
            exit 0
          fi

          echo "Quantum Integrity Shield response: $QIS_STATUS"
          INTEGRITY=$(echo "$QIS_STATUS" | grep -o '"integrity":"[^"]*"' | cut -d'"' -f4 || echo "unknown")
          echo "Integrity status: $INTEGRITY"
          case "$INTEGRITY" in
            intact)     echo "✅ Quantum Integrity Shield: sistem intact" ;;
            pending)    echo "ℹ️  Quantum Integrity Shield: scan în curs / scan in progress" ;;
            degraded)   echo "⚠️  Quantum Integrity Shield: degraded — verificați /api/quantum-integrity/history" ;;
            compromised) echo "❌ Quantum Integrity Shield: COMPROMIS — acțiune imediată necesară!" ;;
            *)          echo "ℹ️  Quantum Integrity Shield: status necunoscut ($INTEGRITY)" ;;
          esac

      # ── HTTPS health check + automatic service restart ────────────────
      - name: Setup SSH for HTTPS check
        id: ssh_setup_smoke
        continue-on-error: true
        run: |
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          DEPLOY_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}"
          if [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "ssh_ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  SSH credentials not available – skipping HTTPS auto-restart."
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "ssh_ready=true" >> "$GITHUB_OUTPUT"

      - name: HTTPS health check – restart service if site is down
        if: steps.ssh_setup_smoke.outputs.ssh_ready == 'true'
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          # SITE_DOMAIN is preferred; falls back to IP-based HTTPS
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || secrets.UNICORN_DOMAIN }}
        run: |
          # Determine probe URLs:
          # - With SITE_DOMAIN → try HTTPS first, fall back to HTTP (nginx may lack SSL cert)
          # - Without SITE_DOMAIN → use HTTP via Nginx port 80 (proxied to backend:3000)
          if [ -n "$SITE_DOMAIN" ]; then
            PROBE_URL="https://${SITE_DOMAIN}/api/health"
            FALLBACK_URL="http://${DEPLOY_HOST}/api/health"
          else
            PROBE_URL="http://${DEPLOY_HOST}/api/health"
            FALLBACK_URL="http://${DEPLOY_HOST}:3000/api/health"
            echo "ℹ️  SITE_DOMAIN not set — probing HTTP via Nginx port 80"
          fi

          echo "🔍 Probing: $PROBE_URL"
          HTTPS_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 15 "$PROBE_URL" || echo "000")
          echo "Status: $HTTPS_STATUS"

          # If HTTPS probe fails with no connection (000), try HTTP fallback to check real backend health
          if [ "$HTTPS_STATUS" = "000" ] && [ -n "$FALLBACK_URL" ]; then
            FALLBACK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$FALLBACK_URL" || echo "000")
            echo "ℹ️  HTTPS unreachable (SSL/DNS), HTTP fallback → $FALLBACK_STATUS"
            [ "$FALLBACK_STATUS" = "200" ] && HTTPS_STATUS="200"
          fi

          if [ "$HTTPS_STATUS" = "200" ]; then
            echo "✅ Site is responding correctly."
          else
            echo "⚠️  Site not responding (HTTP $HTTPS_STATUS). Attempting service restart via SSH…"
            ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no -o BatchMode=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "DEPLOY_PATH='${DEPLOY_PATH}'; \
               # 1. Restart Nginx first (most common cause of ERR_CONNECTION_REFUSED)
               if command -v nginx >/dev/null 2>&1; then \
                 nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || true; \
                 echo 'Nginx restart attempted'; \
               fi; \
               # 2. Restart PM2 backend process safely (no delete-all)
               cd \"\$DEPLOY_PATH\" 2>/dev/null || true; \
               if command -v pm2 >/dev/null 2>&1; then if pm2 describe unicorn >/dev/null 2>&1; then pm2 restart unicorn; else pm2 start ecosystem.config.js --only unicorn; fi; pm2 save && echo 'Restarted unicorn via PM2'; \
               elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^unicorn\\.service'; then systemctl restart unicorn && echo 'Restarted via systemctl'; \
               else pkill -f 'node backend/index.js' || true; sleep 1; mkdir -p logs; nohup node backend/index.js > logs/backend.log 2>&1 & echo 'Restarted via nohup'; fi"

            # Wait for service to come back up with a retry loop (max 60s)
            echo "Waiting for service to recover…"
            STATUS_RETRY="000"
            for i in 1 2 3 4; do
              sleep 15
              STATUS_RETRY=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "$PROBE_URL" || echo "000")
              if [ "$STATUS_RETRY" = "000" ] && [ -n "$FALLBACK_URL" ]; then
                FB=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$FALLBACK_URL" || echo "000")
                [ "$FB" = "200" ] && STATUS_RETRY="200"
              fi
              echo "  attempt $i → HTTP $STATUS_RETRY"
              [ "$STATUS_RETRY" = "200" ] && break
            done
            echo "Status after restart: $STATUS_RETRY"
            if [ "$STATUS_RETRY" = "200" ]; then
              echo "✅ Site recovered after service restart."
            else
              echo "⚠️  Site still not responding after restart (HTTP $STATUS_RETRY). Will retry on next keepalive cycle."
            fi
          fi

