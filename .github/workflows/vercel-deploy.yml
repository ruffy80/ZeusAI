name: 🦄 Deploy UNICORN_FINAL (GitHub → Vercel + Hetzner)

on:
  push:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/**'
      - '.github/workflows/vercel-deploy.yml'
  # ── Keep-alive: re-verify and redeploy every 6 hours ──────────────────────
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without code changes'
        required: false
        default: 'false'

concurrency:
  group: unicorn-final-production
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Validate (lint + test)
  # ──────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate UNICORN_FINAL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UNICORN_FINAL
    outputs:
      lint_ok: ${{ steps.lint.outcome }}
      test_ok: ${{ steps.test.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: UNICORN_FINAL/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lint
        id: lint
        run: CI=1 npm run lint

      - name: Test
        id: test
        run: CI=1 npm test

      - name: Build frontend (client)
        id: frontend_build
        run: |
          if [ -d client ] && [ -f client/package.json ]; then
            npm --prefix client install --no-audit --no-fund
            npm --prefix client run build
            echo "✅ Frontend build succeeded"
          else
            echo "ℹ️  No client/ directory found – skipping frontend build."
          fi

      - name: Innovation report (pre-deploy snapshot)
        run: npm run innovation:report || true

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Vercel (runs src/index.js - the Node HTTP server)
  # ──────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: UNICORN_FINAL
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel credentials
        id: vercel_guard
        run: |
          # Check if secrets exist (not empty string)
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Missing Vercel secrets. Skipping Vercel deploy job."
            exit 0
          fi
          # Validate token with Vercel API to avoid noisy failures in later steps
          if ! curl -fsS -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" https://api.vercel.com/v2/user >/dev/null; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  VERCEL_TOKEN is invalid. Skipping Vercel deploy job."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "✅ Vercel credentials validated"

      - name: Setup Node 20
        if: steps.vercel_guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        if: steps.vercel_guard.outputs.ready == 'true'
        run: npm i -g vercel@latest

      - name: Link Vercel project
        if: steps.vercel_guard.outputs.ready == 'true'
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {
            "orgId": "${{ secrets.VERCEL_ORG_ID }}",
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
          }
          EOF

      - name: Pull Vercel environment
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy to Vercel Production
        if: steps.vercel_guard.outputs.ready == 'true'
        id: deploy
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(vercel deploy --prebuilt --prod)
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Vercel deploy: $URL"

      - name: Ensure Vercel custom domains (optional)
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
          UNICORN_DOMAIN: ${{ secrets.UNICORN_DOMAIN || 'www.zeusai.pro' }}
        run: |
          attach_domain () {
            local domain="$1"
            [ -z "$domain" ] && return 0
            echo "🌐 Ensuring domain: $domain"
            curl --silent --show-error --fail \
              -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/domains?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${domain}\"}" \
              || echo "ℹ️  Could not attach domain now (may already exist or DNS verification pending): ${domain}"
          }

          attach_domain "$SITE_DOMAIN"
          attach_domain "$UNICORN_DOMAIN"

      - name: Smoke test Vercel URL
        if: steps.vercel_guard.outputs.ready == 'true'
        continue-on-error: true
        run: |
          sleep 10
          URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -n "$URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            echo "Vercel /health → HTTP $STATUS"
            [ "$STATUS" = "200" ] || [ "$STATUS" = "000" ] && echo "⚠️  Could not verify (may need warmup)" || true
          fi

  # ──────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Hetzner via SSH (runs backend/index.js)
  # ──────────────────────────────────────────────────────────────────────
  deploy-hetzner:
    name: 🖥️ Deploy → Hetzner (SSH)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Hetzner target and channels
        run: |
          echo "DEPLOY_HOST=${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}" >> "$GITHUB_ENV"
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          # Ensure DEPLOY_PORT is numeric
          if ! [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then
            DEPLOY_PORT="22"
          fi
          echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          echo "DEPLOY_PATH=${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" >> "$GITHUB_ENV"
          echo "WEBHOOK_URL=${{ secrets.HETZNER_WEBHOOK_URL || secrets.GH_WEBHOOK_URL || secrets.WEBHOOK_URL }}" >> "$GITHUB_ENV"

      - name: Validate Hetzner SSH prerequisites
        id: hetzner_guard
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_PATH}" ]; then
            echo "ssh_ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Missing SSH host/user/path. SSH deploy disabled."
          else
            echo "ssh_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Hetzner API credential
        run: |
          if [ -n "${{ secrets.HETZNER_API_KEY }}" ]; then
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_KEY }}" >> "$GITHUB_ENV"
          else
            echo "HETZNER_API_VALUE=${{ secrets.HETZNER_API_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH agent
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write SSH key to file (use fallback if primary key not available)
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️  No SSH key found. SSH deploy will fail."
            exit 1
          fi
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Test SSH connection (continue on error)
          ssh-keyscan -t ed25519,rsa -p ${DEPLOY_PORT:-22} ${DEPLOY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key configured"

      - name: Sync UNICORN_FINAL to Hetzner
        id: sync_hetzner
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          echo "Deploying UNICORN_FINAL to Hetzner..."
          tar -C ./UNICORN_FINAL \
              --exclude='.git' --exclude='node_modules' --exclude='.next' \
              --exclude='logs' --exclude='*.local' --exclude='.env' \
              -czf - . | \
            ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}" \
              "mkdir -p '${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}' && cd '${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}' && tar -xzf -"

      - name: Install deps + restart backend on Hetzner
        id: restart_hetzner
        if: steps.hetzner_guard.outputs.ssh_ready == 'true'
        continue-on-error: true
        run: |
          echo "DEBUG SSH: Connecting to $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
          ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o BatchMode=yes \
            "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}" << ENDSSH
            set -e
            cd "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}"

            # ── Ensure Node.js exists on host ───────────────────────────
            if ! command -v node >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y curl ca-certificates gnupg
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              chmod a+r /etc/apt/keyrings/nodesource.gpg
              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
              apt-get update -y
              apt-get install -y nodejs
            fi

            # ── Update .env with Hetzner API token + domain + owner credentials ──
            if [ -f .env ]; then
              sed -i '/^HETZNER_API_KEY=/d;/^HETZNER_API_TOKEN=/d;/^PUBLIC_APP_URL=/d;/^SITE_DOMAIN=/d;/^BTC_WALLET_ADDRESS=/d;/^OWNER_BTC_ADDRESS=/d;/^OWNER_EMAIL=/d;/^OWNER_NAME=/d;/^ADMIN_EMAIL=/d;/^SMTP_HOST=/d;/^SMTP_PORT=/d;/^SMTP_USER=/d' .env
            fi
            printf "HETZNER_API_KEY=%s\nHETZNER_API_TOKEN=%s\n" \
              "${HETZNER_API_VALUE}" "${HETZNER_API_VALUE}" >> .env
            printf "PUBLIC_APP_URL=https://zeusai.pro\nSITE_DOMAIN=zeusai.pro\n" >> .env
            printf "BTC_WALLET_ADDRESS=bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e\n" >> .env
            printf "OWNER_BTC_ADDRESS=bc1q4f7e66z87mdfj56kz0dj5hvcnpmh0qh4wuv22e\n" >> .env
            printf "OWNER_NAME=Vladoi Ionut\nOWNER_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
            printf "ADMIN_EMAIL=vladoi_ionut@yahoo.com\n" >> .env
            printf "SMTP_HOST=smtp.mail.yahoo.com\nSMTP_PORT=587\nSMTP_USER=vladoi_ionut@yahoo.com\n" >> .env

            # ── Install dependencies ──────────────────────────────────────
            npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund

            # ── Build React frontend ──────────────────────────────────────
            if [ -d "client" ]; then
              echo "🎨 Building frontend..."
              cd client
              npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund
              npm run build
              cd ..
              echo "✅ Frontend built"
            fi

            # ── Open firewall for HTTP/HTTPS (Nginx) ─────────────────────
            if command -v ufw >/dev/null 2>&1; then
              ufw allow 80/tcp  2>/dev/null || true
              ufw allow 443/tcp 2>/dev/null || true
              echo "✅ Firewall: ports 80/443 open for Nginx"
            fi

            # ── Install and configure Nginx ───────────────────────────────
            if ! command -v nginx >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y nginx
            fi
            if [ -f scripts/nginx-unicorn.conf ]; then
              cp scripts/nginx-unicorn.conf /etc/nginx/sites-available/unicorn
              ln -sf /etc/nginx/sites-available/unicorn /etc/nginx/sites-enabled/unicorn
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx || systemctl restart nginx
              echo "✅ Nginx configured and reloaded"
            fi

            # ── Backup current deploy snapshot (keep last 5) ─────────────
            mkdir -p scripts
            if [ -f scripts/create-backup.sh ]; then
              bash scripts/create-backup.sh "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" || true
            fi

            # ── Run innovation sprint + report ────────────────────────────
            npm run innovation:sprint  || true
            npm run innovation:report  || true

            # ── Restart backend process ───────────────────────────────────
            if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q "^unicorn\.service"; then
              systemctl restart unicorn && echo "✅ Restarted via systemctl"
            elif command -v pm2 >/dev/null 2>&1; then
              pm2 describe unicorn >/dev/null 2>&1 \
                && pm2 restart unicorn \
                || pm2 start backend/index.js --name unicorn --log logs/backend.log
              pm2 save
              echo "✅ Restarted via pm2"
            else
              pkill -f "node backend/index.js" || true
              sleep 1
              mkdir -p logs
              nohup node backend/index.js > logs/backend.log 2>&1 &
              echo "✅ Restarted via nohup"
            fi

            # ── Start all PM2 apps via ecosystem config (permanent boot) ──
            if command -v pm2 >/dev/null 2>&1; then
              pm2 start ecosystem.config.js --update-env 2>&1 || \
                pm2 restart ecosystem.config.js --update-env 2>&1 || \
                echo "⚠️ ecosystem.config.js start/restart failed — individual app restart may be needed"
              pm2 save
              echo "✅ Ecosystem apps running via pm2"
            fi

            # ── Start autonomous orchestrator ─────────────────────────────
            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe unicorn-orchestrator >/dev/null 2>&1 \
                && pm2 restart unicorn-orchestrator \
                || pm2 start autonomous-orchestrator.js --name unicorn-orchestrator --log logs/orchestrator.log

              pm2 describe unicorn-health-guardian >/dev/null 2>&1 \
                && pm2 restart unicorn-health-guardian --update-env \
                || HEALTH_GUARDIAN_HEAL_CMD='systemctl restart unicorn' pm2 start scripts/health-guardian.js --name unicorn-health-guardian --log logs/health-guardian.log

              pm2 describe unicorn-platform-connector >/dev/null 2>&1 \
                && pm2 restart unicorn-platform-connector --update-env \
                || pm2 start scripts/platform-connector.js --name unicorn-platform-connector --log logs/platform-connector.log

              pm2 save
              echo "✅ Orchestrator + connectors running via pm2"
            else
              pkill -f "autonomous-orchestrator.js" || true
              sleep 1
              nohup node autonomous-orchestrator.js > logs/orchestrator.log 2>&1 &
              echo "✅ Orchestrator running via nohup"
            fi

            # ── Setup systemd for permanent auto-boot (idempotent) ────────
            if command -v systemctl >/dev/null 2>&1; then
              bash scripts/setup-systemd.sh "${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}" || true
              echo "✅ Systemd auto-boot configured"
            fi
          ENDSSH

      - name: Health check Hetzner backend
        id: hetzner_health
        continue-on-error: true
        if: steps.restart_hetzner.outcome == 'success'
        run: |
          sleep 8
          HEALTH=$(ssh -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}@${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}" \
            "curl -sS http://localhost:3000/health 2>/dev/null || echo '{\"status\":\"unreachable\"}'")
          echo "Hetzner health: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' && echo "✅ Backend healthy" || echo "⚠️  Backend not yet ready"

      - name: Fallback — trigger Hetzner webhook (if SSH failed)
        id: webhook_fallback
        if: ${{ steps.hetzner_guard.outputs.ssh_ready != 'true' || steps.sync_hetzner.outcome != 'success' || steps.restart_hetzner.outcome != 'success' }}
        continue-on-error: true
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "ℹ️  No HETZNER_WEBHOOK_URL configured. Skipping webhook fallback."
            exit 0
          fi
          if [[ "${WEBHOOK_URL}" != http://* && "${WEBHOOK_URL}" != https://* ]]; then
            echo "ℹ️  Webhook URL is invalid: ${WEBHOOK_URL}"
            exit 0
          fi
          TARGET_URL="${WEBHOOK_URL%/}"
          case "${TARGET_URL}" in
            */deploy) ;;
            *) TARGET_URL="${TARGET_URL}/deploy" ;;
          esac
          SECRET="${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}"
          curl --fail --show-error --silent \
            -X POST "${TARGET_URL}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${SECRET}" \
            -d '{"source":"github-actions","action":"deploy-fallback","ref":"${{ github.sha }}"}' \
            || echo "⚠️  Hetzner fallback webhook endpoint not reachable right now."

      - name: Fail if both SSH and webhook failed
        if: ${{ (steps.sync_hetzner.outcome != 'success' || steps.restart_hetzner.outcome != 'success') && steps.webhook_fallback.outcome != 'success' }}
        run: |
          echo "❌ Hetzner deploy failed: SSH failed and no webhook configured."
          exit 1

  # ──────────────────────────────────────────────────────────────────────
  # JOB 4: Webhook-only deploy (when no SSH key is set, only webhook)
  # ──────────────────────────────────────────────────────────────────────
  deploy-hetzner-webhook:
    name: 🔔 Deploy → Hetzner (Webhook only)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Trigger Hetzner webhook
        continue-on-error: true
        run: |
          URL='${{ secrets.HETZNER_WEBHOOK_URL || secrets.GH_WEBHOOK_URL || secrets.WEBHOOK_URL }}'
          if [ -z "${URL}" ]; then
            echo "ℹ️  No HETZNER_WEBHOOK_URL configured. Skipping webhook-only deploy."
            exit 0
          fi
          if [[ "${URL}" != http://* && "${URL}" != https://* ]]; then
            echo "ℹ️  Webhook URL is invalid: ${URL}"
            exit 0
          fi
          TARGET_URL="${URL%/}"
          case "${TARGET_URL}" in
            */deploy) ;;
            *) TARGET_URL="${TARGET_URL}/deploy" ;;
          esac
          SECRET="${{ secrets.HETZNER_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}"
          curl --fail --show-error --silent \
            -X POST "${TARGET_URL}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${SECRET}" \
            -d '{"source":"github-actions","action":"deploy","ref":"${{ github.sha }}"}' \
            || echo "⚠️  Hetzner webhook endpoint not reachable right now."

  # ──────────────────────────────────────────────────────────────────────
  # JOB 5: Deploy summary
  # ──────────────────────────────────────────────────────────────────────
  deploy-summary:
    name: 📊 Deploy Summary
    runs-on: ubuntu-latest
    needs: [validate, deploy-vercel, deploy-hetzner]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## 🦄 UNICORN Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target    | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate  | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vercel    | ${{ needs.deploy-vercel.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hetzner   | ${{ needs.deploy-hetzner.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\` by **${{ github.actor }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 6: Smoke tests after deploy + HTTPS health check with auto-restart
  # ──────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: 🧪 Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-hetzner]
    if: always()
    steps:
      - name: Check Vercel and Hetzner health
        run: |
          VERCEL_URL='${{ needs.deploy-vercel.outputs.deploy_url }}'
          HETZNER_HOST='${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}'
          ALL_OK=true

          if [ -z "$VERCEL_URL" ]; then
            echo "ℹ️  Vercel not deployed – skipping Vercel smoke test."
          else
            VERCEL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${VERCEL_URL}/health" || echo "000")
            echo "Vercel /health: $VERCEL_STATUS"
            if [ "$VERCEL_STATUS" != "200" ]; then
              echo "⚠️  Vercel smoke test: expected 200, got $VERCEL_STATUS"
              ALL_OK=false
            else
              echo "✅ Vercel smoke test passed"
            fi
          fi

          if [ -z "$HETZNER_HOST" ]; then
            echo "ℹ️  Hetzner not configured – skipping Hetzner smoke test."
          else
            HETZNER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${HETZNER_HOST}:3000/api/health" || echo "000")
            echo "Hetzner /api/health: $HETZNER_STATUS"
            if [ "$HETZNER_STATUS" != "200" ]; then
              echo "⚠️  Hetzner smoke test: expected 200, got $HETZNER_STATUS"
              ALL_OK=false
            else
              echo "✅ Hetzner smoke test passed"
            fi
          fi

          if [ "$ALL_OK" = "true" ]; then
            echo "✅ All configured smoke tests passed"
          else
            echo "⚠️  Some smoke tests reported non-200 responses (see above)"
          fi

      # ── HTTPS health check + automatic service restart ────────────────
      - name: Setup SSH for HTTPS check
        id: ssh_setup_smoke
        continue-on-error: true
        run: |
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          DEPLOY_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          if [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "ssh_ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  SSH credentials not available – skipping HTTPS auto-restart."
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "ssh_ready=true" >> "$GITHUB_OUTPUT"

      - name: HTTPS health check – restart service if site is down
        if: steps.ssh_setup_smoke.outputs.ssh_ready == 'true'
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
          # SITE_DOMAIN is preferred; falls back to IP-based HTTPS
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || secrets.UNICORN_DOMAIN }}
        run: |
          # Determine HTTPS URL to probe
          if [ -n "$SITE_DOMAIN" ]; then
            HTTPS_URL="https://${SITE_DOMAIN}/health"
          else
            HTTPS_URL="https://${DEPLOY_HOST}/health"
          fi

          echo "🔍 Probing HTTPS: $HTTPS_URL"
          HTTPS_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 15 "$HTTPS_URL" || echo "000")
          echo "HTTPS status: $HTTPS_STATUS"

          if [ "$HTTPS_STATUS" = "200" ]; then
            echo "✅ Site is responding correctly on HTTPS."
          else
            echo "⚠️  Site not responding on HTTPS (HTTP $HTTPS_STATUS). Attempting service restart via SSH…"
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "DEPLOY_PATH='${DEPLOY_PATH}'; if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^unicorn\\.service'; then systemctl restart unicorn && echo 'Restarted via systemctl'; elif command -v pm2 >/dev/null 2>&1 && pm2 describe unicorn >/dev/null 2>&1; then pm2 restart unicorn && echo 'Restarted via pm2'; else pkill -f 'node backend/index.js' || true; sleep 1; cd \"\$DEPLOY_PATH\"; mkdir -p logs; nohup node backend/index.js > logs/backend.log 2>&1 & echo 'Restarted via nohup'; fi"

            # Wait for service to come back up with a retry loop (max 60s)
            echo "Waiting for service to recover…"
            HTTPS_STATUS_RETRY="000"
            for i in 1 2 3 4; do
              sleep 15
              HTTPS_STATUS_RETRY=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "$HTTPS_URL" || echo "000")
              echo "  attempt $i → HTTP $HTTPS_STATUS_RETRY"
              [ "$HTTPS_STATUS_RETRY" = "200" ] && break
            done
            echo "HTTPS status after restart: $HTTPS_STATUS_RETRY"
            if [ "$HTTPS_STATUS_RETRY" = "200" ]; then
              echo "✅ Site recovered after service restart."
            else
              echo "❌ Site still not responding on HTTPS after restart (HTTP $HTTPS_STATUS_RETRY)."
              exit 1
            fi
          fi

