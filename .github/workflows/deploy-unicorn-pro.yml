name: Deploy Unicorn PRO

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy → Hetzner PRO
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
      DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}

      - name: Add Hetzner host to known_hosts
        run: |
          ssh-keyscan -t ed25519,rsa -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='logs' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:/var/www/unicorn/"

      - name: Install & Restart on server
        run: |
          ssh -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd /var/www/unicorn/UNICORN_FINAL
            npm install --production --no-audit --no-fund
            npm run build || true
            pm2 startOrRestart ecosystem.config.js --only unicorn
            pm2 save
          "

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "https://$DEPLOY_HOST/api/health" 2>/dev/null || \
            curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "http://$DEPLOY_HOST:3000/api/health" 2>/dev/null || \
            echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Health check returned $STATUS — deploy succeeded but app may need a moment to warm up."
          else
            echo "✅ Deploy successful — app is healthy."
          fi
