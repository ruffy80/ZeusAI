name: 🔐 Setup Secrets + Trigger Deploy

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy after secrets are set'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      site_domain:
        description: 'Primary domain (e.g. zeusai.pro) – overrides the hardcoded default'
        required: false
        default: ''
        type: string
      unicorn_domain:
        description: 'WWW / secondary domain (e.g. www.zeusai.pro) – overrides the hardcoded default'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  setup-secrets:
    name: 🔐 Push Secrets → GitHub + Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with write token for version bump)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install libsodium-wrappers
        working-directory: UNICORN_FINAL
        run: npm install --no-save libsodium-wrappers

      - name: Push known secrets to GitHub Actions
        id: push_secrets
        working-directory: UNICORN_FINAL
        # continue even if GH_PAT is missing — deploy trigger still runs below
        continue-on-error: true
        env:
          # GH_PAT must be a Personal Access Token with `repo` scope stored as a repository secret.
          # GITHUB_TOKEN (the auto-generated workflow token) cannot write repository secrets.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # Pass through any already-set optional secrets so the script can re-register them
          VERCEL_TOKEN:            ${{ secrets.VERCEL_TOKEN }}
          HETZNER_API_KEY:         ${{ secrets.HETZNER_API_KEY }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          # Allow runtime overrides for domain secrets
          SITE_DOMAIN:    ${{ inputs.site_domain }}
          UNICORN_DOMAIN: ${{ inputs.unicorn_domain }}
        run: node scripts/setup-github-secrets.js

      # ── Bump UNICORN_FINAL patch version + push ──────────────────────────────
      # The push satisfies vercel-deploy.yml's path filter (UNICORN_FINAL/**)
      # and triggers the full Vercel + Hetzner deploy automatically.
      - name: Bump UNICORN_FINAL version + push (trigger path-filter deploy)
        id: version_bump
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          cd UNICORN_FINAL
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ..
          git add UNICORN_FINAL/package.json
          git commit -m "chore: bump UNICORN_FINAL to v${NEW_VERSION} [deploy]"
          git push origin HEAD:main
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed version bump v${NEW_VERSION} → deploy triggered via path filter"

      # ── Fallback: dispatch workflow_dispatch if push failed ────────────────────
      - name: Fallback — dispatch vercel-deploy.yml directly
        if: steps.version_bump.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏳ Version bump push failed — falling back to workflow_dispatch on vercel-deploy.yml..."
          gh workflow run vercel-deploy.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field force_deploy=true
          echo "✅ Deploy workflow dispatched (fallback)."

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔐 Setup Secrets + Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Push secrets | ${{ steps.push_secrets.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version bump + push | ${{ steps.version_bump.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.push_secrets.outcome }}" != "success" ]; then
            echo "> ⚠️ Secrets push failed (GH_PAT may not be set). Deploy was still triggered using existing secrets." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ✅ All secrets pushed. SITE_DOMAIN and UNICORN_DOMAIN are up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version_bump.outcome }}" = "success" ]; then
            echo "🚀 **UNICORN_FINAL version bumped to \`${{ steps.version_bump.outputs.version }}\`** — pushed to \`main\`, deploy triggered via path filter." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "🚀 **vercel-deploy.yml dispatched on \`main\`** (fallback) — Vercel + Hetzner deploy is running." >> "$GITHUB_STEP_SUMMARY"
          fi
