name: 🔐 Setup Secrets + Trigger Deploy

on:
  # ── Rulare automată la fiecare push pe main (refresh secrete, fără version bump) ──
  push:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/backend/**'
      - 'UNICORN_FINAL/src/**'
      - 'UNICORN_FINAL/scripts/**'
      - '.github/workflows/**'
  # ── Rulare manuală completă (secrete + version bump + deploy) ──────────────────
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy after secrets are set'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      site_domain:
        description: 'Primary domain (e.g. zeusai.pro) – overrides the hardcoded default'
        required: false
        default: ''
        type: string
      unicorn_domain:
        description: 'WWW / secondary domain (e.g. www.zeusai.pro) – overrides the hardcoded default'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  setup-secrets:
    name: 🔐 Push Secrets → GitHub + Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with write token for version bump)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install libsodium-wrappers
        working-directory: UNICORN_FINAL
        run: npm install --no-save libsodium-wrappers

      - name: 🌐 Configure DNS records for zeusai.pro (auto)
        id: setup_dns
        working-directory: UNICORN_FINAL
        continue-on-error: true
        env:
          SITE_DOMAIN:           ${{ inputs.site_domain || secrets.SITE_DOMAIN || 'zeusai.pro' }}
          HETZNER_HOST:          ${{ secrets.HETZNER_HOST || secrets.SSH_HOST || '204.168.230.142' }}
          CF_TOKEN:              ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:            ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/setup-dns.js

      - name: Push known secrets to GitHub Actions
        id: push_secrets
        working-directory: UNICORN_FINAL
        # continue even if GH_PAT is missing — deploy trigger still runs below
        continue-on-error: true
        env:
          # GH_PAT must be a Personal Access Token with `repo` scope stored as a repository secret.
          # GITHUB_TOKEN (the auto-generated workflow token) cannot write repository secrets.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # Admin credentials: pass existing values so the script reuses them instead of regenerating.
          # On first run these are empty → script generates new values and prints them to the logs.
          ADMIN_MASTER_PASSWORD:   ${{ secrets.ADMIN_MASTER_PASSWORD }}
          ADMIN_2FA_CODE:          ${{ secrets.ADMIN_2FA_CODE }}
          # Pass through any already-set optional secrets so the script can re-register them
          HETZNER_API_KEY:         ${{ secrets.HETZNER_API_KEY }}
          HETZNER_API_TOKEN:       ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY:         ${{ secrets.SSH_PRIVATE_KEY || secrets.HETZNER_SSH_PRIVATE_KEY }}
          # Webhook URLs (optional)
          HETZNER_WEBHOOK_URL:     ${{ secrets.HETZNER_WEBHOOK_URL }}
          GH_WEBHOOK_URL:          ${{ secrets.GH_WEBHOOK_URL }}
          WEBHOOK_URL:             ${{ secrets.WEBHOOK_URL }}
          # DNS / Cloudflare (optional)
          HETZNER_DNS_API_KEY:     ${{ secrets.HETZNER_DNS_API_KEY }}
          CF_TOKEN:                ${{ secrets.CF_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID:              ${{ secrets.CF_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
          # AI provider keys (pass-through)
          OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:         ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:          ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:             ${{ secrets.XAI_API_KEY }}
          # Payment keys (pass-through)
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:  ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER_MONTHLY:    ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_YEARLY:     ${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY:        ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY:         ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          STRIPE_PRICE_ENTERPRISE_MONTHLY: ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
          STRIPE_PRICE_ENTERPRISE_YEARLY:  ${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}
          PAYPAL_CLIENT_ID:        ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET:    ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID:       ${{ secrets.PAYPAL_WEBHOOK_ID }}
          # Email credentials (pass-through)
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
          # Allow runtime overrides for domain secrets (only on workflow_dispatch; empty on push = use hardcoded defaults)
          SITE_DOMAIN:    ${{ inputs.site_domain || secrets.SITE_DOMAIN }}
          UNICORN_DOMAIN: ${{ inputs.unicorn_domain || secrets.UNICORN_DOMAIN }}
        run: node scripts/setup-github-secrets.js

      # ── Bump UNICORN_FINAL patch version + push ──────────────────────────────
      # Rulează DOAR pe workflow_dispatch (evita loop infinit cu push trigger)
      # The push satisfies hetzner-deploy.yml's path filter (UNICORN_FINAL/**)
      # and triggers the full Hetzner deploy automatically.
      - name: Bump UNICORN_FINAL version + push (trigger path-filter deploy)
        id: version_bump
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use git credential helper so the token is never embedded in the remote URL
          git config --global credential.helper 'store --file=/tmp/.git-credentials'
          printf 'https://x-access-token:%s@github.com\n' "${GH_TOKEN}" > /tmp/.git-credentials
          cd UNICORN_FINAL
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version" 2>/dev/null)
          if [ -z "$NEW_VERSION" ]; then
            echo "❌ Could not read new version from package.json"
            exit 1
          fi
          cd ..
          git add UNICORN_FINAL/package.json
          git commit -m "chore: bump UNICORN_FINAL to v${NEW_VERSION} [deploy]"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
          rm -f /tmp/.git-credentials
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed version bump v${NEW_VERSION} → deploy triggered via path filter"

      # ── Fallback: dispatch workflow_dispatch if push failed ────────────────────
      - name: Fallback — dispatch hetzner-deploy.yml directly
        if: github.event_name == 'workflow_dispatch' && steps.version_bump.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏳ Version bump push failed — falling back to workflow_dispatch on hetzner-deploy.yml..."
          gh workflow run hetzner-deploy.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field force_deploy=true
          echo "✅ Deploy workflow dispatched (fallback)."

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔐 Setup Secrets + Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Push secrets | ${{ steps.push_secrets.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version bump + push | ${{ steps.version_bump.outcome || 'skipped (push trigger)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.push_secrets.outcome }}" != "success" ]; then
            echo "> ⚠️ Secrets push failed (GH_PAT may not be set). Deploy was still triggered using existing secrets." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ✅ All secrets pushed. SITE_DOMAIN and UNICORN_DOMAIN are up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ steps.version_bump.outcome }}" = "success" ]; then
              echo "🚀 **UNICORN_FINAL version bumped to \`${{ steps.version_bump.outputs.version }}\`** — pushed to \`main\`, deploy triggered via path filter." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "🚀 **hetzner-deploy.yml dispatched on \`main\`** (fallback) — Hetzner deploy is running." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "ℹ️ **Push trigger** — secrete reîmprospătate automat. Deploy va fi pornit de hetzner-deploy.yml." >> "$GITHUB_STEP_SUMMARY"
          fi
