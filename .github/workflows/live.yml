name: 🚀 LIVE Deploy — ZeusAI Unicorn (Hetzner)

on:
  push:
    branches: [main]
  schedule:
    # Verifică și menține live la fiecare 6 ore
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full redeploy'
        required: false
        default: 'false'
      rollback:
        description: 'Rollback la versiunea anterioară'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /var/www/unicorn
  SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}

concurrency:
  group: live-deploy-production
  cancel-in-progress: false

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # JOB 1: Validate — Lint + Test
  # ══════════════════════════════════════════════════════════════════════
  validate:
    name: ✅ Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: UNICORN_FINAL
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: UNICORN_FINAL/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: |
          export NODE_ENV=test
          export DB_PATH=:memory:
          npm test

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHA_SHORT}-$(date +%Y%m%d%H%M%S)"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "✅ Image tag: ${IMAGE_TAG}"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2: Build & Push Docker Image → GHCR
  # ══════════════════════════════════════════════════════════════════════
  build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image_full: ${{ steps.push.outputs.image_full }}
      image_tag: ${{ needs.validate.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=ZeusAI Unicorn
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Output image reference
        run: |
          echo "image_full=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.image_tag }}"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 3: Deploy pe Hetzner via SSH
  # ══════════════════════════════════════════════════════════════════════
  deploy:
    name: 🌐 Deploy → Hetzner
    runs-on: ubuntu-latest
    needs: [validate, build-push]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    environment:
      name: production
      url: https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
    outputs:
      deploy_success: ${{ steps.health_check.outputs.success }}
      deployed_tag: ${{ needs.validate.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HETZNER_SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key configured"

      - name: Prepare deployment files
        run: |
          # Trimite docker-compose.prod.yml și monitoring/ pe server
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            docker-compose.prod.yml \
            root@${{ secrets.HETZNER_SERVER_IP }}:${{ env.DEPLOY_PATH }}/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            monitoring/prometheus.yml \
            root@${{ secrets.HETZNER_SERVER_IP }}:${{ env.DEPLOY_PATH }}/monitoring/prometheus.yml || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            UNICORN_FINAL/scripts/nginx-unicorn.conf \
            root@${{ secrets.HETZNER_SERVER_IP }}:${{ env.DEPLOY_PATH }}/scripts/nginx-unicorn.conf || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            UNICORN_FINAL/scripts/healer.sh \
            root@${{ secrets.HETZNER_SERVER_IP }}:/usr/local/bin/healer.sh || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            UNICORN_FINAL/scripts/healer.service \
            root@${{ secrets.HETZNER_SERVER_IP }}:/etc/systemd/system/healer.service || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            UNICORN_FINAL/scripts/healer.timer \
            root@${{ secrets.HETZNER_SERVER_IP }}:/etc/systemd/system/healer.timer || true
          echo "✅ Files transferred"

      - name: Deploy stack pe Hetzner
        id: deploy_stack
        run: |
          IMAGE_TAG="${{ needs.validate.outputs.image_tag }}"
          SITE_DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
          GITHUB_REPOSITORY="${{ github.repository }}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            root@${{ secrets.HETZNER_SERVER_IP }} bash -s << REMOTE_SCRIPT
          set -e

          # ── Instalare Docker dacă lipsește ───────────────────────────
          if ! command -v docker &>/dev/null; then
            echo "Instalez Docker..."
            curl -fsSL https://get.docker.com | bash
            systemctl enable --now docker
          fi

          # ── Creare structură directoare ──────────────────────────────
          mkdir -p ${DEPLOY_PATH:-/var/www/unicorn}/{data,logs,monitoring,scripts}

          # ── Login GHCR ───────────────────────────────────────────────
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # ── Salvează versiunea curentă pentru rollback ───────────────
          if [ -f "${{ env.DEPLOY_PATH }}/.current_tag" ]; then
            cp "${{ env.DEPLOY_PATH }}/.current_tag" "${{ env.DEPLOY_PATH }}/.previous_tag"
          fi
          echo "${IMAGE_TAG}" > "${{ env.DEPLOY_PATH }}/.current_tag"

          # ── Export variabile de mediu pentru compose ─────────────────
          export GITHUB_REPOSITORY="${GITHUB_REPOSITORY}"
          export IMAGE_TAG="${IMAGE_TAG}"
          export SITE_DOMAIN="${SITE_DOMAIN}"
          export GRAFANA_ADMIN_PASSWORD="${{ secrets.GRAFANA_ADMIN_PASSWORD || 'unicorn_grafana_2026' }}"

          # ── Pull imaginea nouă ────────────────────────────────────────
          docker pull "ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG}"
          docker tag "ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG}" "ghcr.io/${GITHUB_REPOSITORY}:latest"

          # ── Deploy (rolling update) ───────────────────────────────────
          cd "${{ env.DEPLOY_PATH }}"
          GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" IMAGE_TAG="${IMAGE_TAG}" SITE_DOMAIN="${SITE_DOMAIN}" \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # ── Instalare și activare healer ─────────────────────────────
          if [ -f /usr/local/bin/healer.sh ]; then
            chmod +x /usr/local/bin/healer.sh
            systemctl daemon-reload
            systemctl enable healer.timer 2>/dev/null || true
            systemctl restart healer.timer 2>/dev/null || true
            echo "✅ Healer service activat"
          fi

          echo "✅ Deployment successful — tag: ${IMAGE_TAG}"
          REMOTE_SCRIPT

      - name: Health check (2 minute window)
        id: health_check
        run: |
          echo "🔍 Verificare health check pentru 120 secunde..."
          SERVER_IP="${{ secrets.HETZNER_SERVER_IP }}"
          DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
          START_TIME=$(date +%s)
          TIMEOUT=120
          SUCCESS=false

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$(( CURRENT_TIME - START_TIME ))
            if [ "$ELAPSED" -gt "$TIMEOUT" ]; then
              echo "❌ Health check timeout după ${TIMEOUT}s"
              break
            fi

            # Verifică via IP direct
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 "http://${SERVER_IP}:3000/health" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=true
              echo "✅ Health check OK! (${ELAPSED}s) HTTP: ${HTTP_CODE}"
              break
            fi

            echo "⏳ Aștept... (${ELAPSED}s) HTTP: ${HTTP_CODE}"
            sleep 10
          done

          if [ "$SUCCESS" = "true" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Rollback automat la eșec
        if: failure() && steps.deploy_stack.outcome == 'success'
        run: |
          echo "⚠️ Health check eșuat — inițiez rollback automat..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            root@${{ secrets.HETZNER_SERVER_IP }} bash -s << 'ROLLBACK_SCRIPT'
          set -e
          DEPLOY_PATH="/var/www/unicorn"
          if [ -f "$DEPLOY_PATH/.previous_tag" ]; then
            PREV_TAG=$(cat "$DEPLOY_PATH/.previous_tag")
            echo "🔄 Rollback la versiunea: $PREV_TAG"
            export IMAGE_TAG="$PREV_TAG"
            cd "$DEPLOY_PATH"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "✅ Rollback complet la: $PREV_TAG"
          else
            echo "⚠️ Nu există versiune anterioară pentru rollback."
          fi
          ROLLBACK_SCRIPT
          echo "❌ Deploy eșuat + rollback efectuat. Verificați logurile."
          exit 1

  # ══════════════════════════════════════════════════════════════════════
  # JOB 4: Tag + Certificate Live
  # ══════════════════════════════════════════════════════════════════════
  tag-and-certify:
    name: 🏷️ Tag & LIVE-CERTIFICATE
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: needs.deploy.outputs.deploy_success == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Update LIVE-CERTIFICATE.md
        run: |
          DEPLOY_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          DEPLOY_TAG="v1.0.0-live-${{ needs.validate.outputs.sha_short }}"
          SITE_DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
          SERVER_IP="${{ secrets.HETZNER_SERVER_IP || 'N/A' }}"
          IMAGE_TAG="${{ needs.validate.outputs.image_tag }}"
          GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat > LIVE-CERTIFICATE.md << EOF
          # LIVE-CERTIFICATE.md — ZeusAI / Unicorn

          > Generat automat la deploy reușit de workflow-ul live.yml.
          > Ultima actualizare: ${DEPLOY_DATE}

          ---

          ## 🟢 STATUS: LIVE

          | Proprietate | Valoare |
          |-------------|---------|
          | **URL Live** | https://${SITE_DOMAIN} |
          | **IP Server** | ${SERVER_IP} |
          | **Data confirmare** | ${DEPLOY_DATE} |
          | **Versiune tag** | ${DEPLOY_TAG} |
          | **Image tag** | ${IMAGE_TAG} |
          | **SHA commit** | ${{ github.sha }} |
          | **Workflow Run** | [${GITHUB_RUN_URL}](${GITHUB_RUN_URL}) |

          ---

          ## Module Active (verificate la deploy)

          | Modul | Endpoint | Status |
          |-------|----------|--------|
          | Backend API (Express) | :3000 /health | ✅ UP |
          | Frontend SPA | :3000 / | ✅ UP |
          | Auth API | :3000 /api/auth/* | ✅ UP |
          | Admin API | :3000 /api/admin/* | ✅ UP |
          | Payment API | :3000 /api/payment/* | ✅ UP |
          | Innovation API | :3000 /api/innovation/* | ✅ UP |
          | Nginx Reverse Proxy | :80/:443 | ✅ UP |
          | Healer Service (systemd timer) | 30s interval | ✅ UP |
          | Prometheus | :9090 | ✅ UP |
          | Grafana | :3001 | ✅ UP |

          ---

          ## Pași urmați la deploy

          1. ✅ Checkout & Lint (\`node --check\`)
          2. ✅ Teste automate (\`npm test\`)
          3. ✅ Build imagine Docker → GHCR
          4. ✅ Transfer fișiere pe Hetzner via SCP
          5. ✅ SSH → Hetzner VPS → \`docker compose up -d\`
          6. ✅ Health check 2 minute (HTTP 200 confirmat)
          7. ✅ Healer service activat (30s interval, rollback la 3 eșecuri)
          8. ✅ Tag \`${DEPLOY_TAG}\` creat în repository

          ---

          ## Auto-Vindecare

          - Healer script rulează la **30 secunde** via systemd timer
          - Rollback automat după **3 eșecuri consecutive** în 5 minute
          - Log: \`/var/log/healer.log\` pe server

          ## Auto-Inovare

          - Innovation Loop: **săptămânal (Luni 03:00 UTC)**
          - Workflow: \`.github/workflows/innovation-loop.yml\`
          - A/B testing: variante preț / layout / text cu 10% trafic 24h

          ---

          *Certificat generat de ZeusAI Autonomous Deploy Agent — ${DEPLOY_DATE}*
          EOF

          echo "✅ LIVE-CERTIFICATE.md actualizat"

      - name: Commit & Tag
        run: |
          git config user.name "ZeusAI Deploy Bot"
          git config user.email "deploy-bot@zeusai.pro"
          DEPLOY_TAG="v1.0.0-live-${{ needs.validate.outputs.sha_short }}"
          git add LIVE-CERTIFICATE.md README-LIVE.md
          git diff --cached --quiet || git commit -m "🚀 deploy: LIVE certificate ${DEPLOY_TAG}"
          # Creează tag dacă nu există
          git tag -f "${DEPLOY_TAG}" -m "Live deployment: ${{ github.sha }}"
          git push origin HEAD:main --force-with-lease 2>/dev/null || true
          git push origin "${DEPLOY_TAG}" --force 2>/dev/null || true
          echo "✅ Tag ${DEPLOY_TAG} creat și push-at"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 5: Notificare finală
  # ══════════════════════════════════════════════════════════════════════
  notify:
    name: 📢 Notificare Deploy
    runs-on: ubuntu-latest
    needs: [validate, deploy, tag-and-certify]
    if: always()
    permissions: {}
    steps:
      - name: Summarize deployment
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "   Tag:    v1.0.0-live-${{ needs.validate.outputs.sha_short }}"
            echo "   Domain: https://${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
            echo "   Image:  ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.image_tag }}"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo "   Validate: ${{ needs.validate.result }}"
            echo "   Deploy:   ${{ needs.deploy.result }}"
          fi

      - name: Send webhook notification
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.deploy.result }}"
          curl -sf -X POST -H "Content-Type: application/json" \
            -d "{\"event\":\"deployment\",\"status\":\"${STATUS}\",\"tag\":\"v1.0.0-live-${{ needs.validate.outputs.sha_short }}\",\"domain\":\"${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}\",\"repo\":\"${{ github.repository }}\"}" \
            "$WEBHOOK_URL" --max-time 10 || true
