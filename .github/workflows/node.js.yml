# CI for UNICORN_FINAL (lint + test) on push to main.
# Runs only when non-UNICORN_FINAL root files change (e.g. package.json, workflows).
# Full UNICORN_FINAL CI is also handled by hetzner-deploy.yml (push + PR).
name: Node.js CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/node.js.yml'

concurrency:
  group: node-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Test UNICORN_FINAL (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UNICORN_FINAL

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 22
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: UNICORN_FINAL/package-lock.json
    - run: npm ci --legacy-peer-deps --no-audit --no-fund
    - run: npm run lint
    - name: Test
      run: |
        export NODE_ENV=test
        export DB_PATH=:memory:
        npm test


