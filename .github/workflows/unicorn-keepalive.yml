name: 🔗 Unicorn Keep-Alive (Platform Health Check)

# Runs every 30 minutes to verify Vercel + Hetzner are reachable.
# If either is down, triggers the main deploy workflow to heal the platform.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: 'Force redeploy regardless of health'
        required: false
        default: 'false'

concurrency:
  group: unicorn-keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    name: 🩺 Check Platform Health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: Check Vercel health
        id: vercel_check
        continue-on-error: true
        run: |
          URL="${{ secrets.VERCEL_HEALTH_URL || 'https://zeusai.pro/health' }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          echo "Vercel health URL → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "vercel_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Hetzner health
        id: hetzner_check
        continue-on-error: true
        run: |
          HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          if [ -z "$HOST" ]; then
            echo "ℹ️  HETZNER_HOST not configured — skipping Hetzner health check"
            echo "hetzner_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Prefer Nginx port 80 (proxied to backend:3000); port 3000 is firewall-restricted
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST}/api/health" || echo "000")
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "000000" ]; then
            PORT="${{ secrets.HETZNER_APP_PORT || '3000' }}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST}:${PORT}/api/health" || echo "000")
          fi
          echo "Hetzner /api/health → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "hetzner_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "hetzner_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate platform health
        id: health
        run: |
          VERCEL="${{ steps.vercel_check.outputs.vercel_ok || 'unknown' }}"
          HETZNER="${{ steps.hetzner_check.outputs.hetzner_ok || 'unknown' }}"
          FORCE="${{ inputs.force_redeploy || 'false' }}"

          echo "Vercel status  : $VERCEL"
          echo "Hetzner status : $HETZNER"
          echo "Force redeploy : $FORCE"

          if [ "$VERCEL" = "true" ] && [ "$HETZNER" = "true" ] && [ "$FORCE" != "true" ]; then
            echo "✅ Platform fully healthy — no redeploy needed"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Platform needs attention — triggering redeploy"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔗 Unicorn Keep-Alive Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vercel   | ${{ steps.vercel_check.outputs.vercel_ok == 'true' && '✅ OK' || '❌ DOWN' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hetzner  | ${{ steps.hetzner_check.outputs.hetzner_ok == 'true' && '✅ OK' || '❌ DOWN' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Checked at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_STEP_SUMMARY"

  trigger-redeploy:
    name: 🚀 Trigger Redeploy (if unhealthy)
    runs-on: ubuntu-latest
    needs: keepalive
    if: needs.keepalive.outputs.healthy == 'false'
    permissions:
      actions: write
    steps:
      - name: Fast SSH restart (before full redeploy)
        id: ssh_quick_restart
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ℹ️  SSH secrets not configured — skipping fast restart"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" << ENDSSH
            # Restart PM2 processes
            if command -v pm2 >/dev/null 2>&1; then
              DEPLOY_DIR="${DEPLOY_PATH:-/opt/unicorn}"
              cd "\$DEPLOY_DIR" 2>/dev/null || cd "/opt/unicorn" 2>/dev/null || true
              pm2 resurrect || true
              pm2 restart unicorn 2>/dev/null || { \
                echo "pm2 restart failed — clean start from ecosystem"; \
                pm2 delete all 2>/dev/null || true; \
                pm2 start ecosystem.config.js; \
              }
              pm2 save || true
              echo "✅ PM2 restart attempted"
            elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^unicorn\.service'; then
              systemctl restart unicorn && echo "✅ Restarted via systemctl"
            fi
            # Ensure nginx is running
            if command -v nginx >/dev/null 2>&1; then
              systemctl start nginx || service nginx start || true
              echo "✅ Nginx ensured running"
            fi
            sleep 5
            curl -sf http://localhost:3000/api/health && echo "✅ Backend healthy after restart" || echo "⚠️  Backend still starting"
          ENDSSH

      - name: Dispatch main deploy workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'vercel-deploy.yml',
              ref: 'main',
              inputs: { force_deploy: 'true' }
            });
            console.log('✅ Deploy workflow dispatched successfully');
