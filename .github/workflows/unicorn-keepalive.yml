name: 🔗 Unicorn Keep-Alive (Hetzner Health Check)

# Runs every 30 minutes to verify Hetzner is reachable.
# If the server is down, triggers the main deploy workflow to heal the platform.

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: 'Force redeploy regardless of health'
        required: false
        default: 'false'

concurrency:
  group: unicorn-keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    name: 🩺 Check Platform Health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: Check Hetzner health
        id: hetzner_check
        continue-on-error: true
        run: |
          HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          if [ -z "$HOST" ]; then
            echo "ℹ️  HETZNER_HOST not configured — skipping Hetzner health check"
            echo "hetzner_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
          OK=false

          # 1. Try HTTPS first (best signal — SSL + backend both working)
          HTTPS_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://${DOMAIN}/api/health" || echo "000")
          echo "HTTPS /api/health → HTTP $HTTPS_STATUS"
          if [ "$HTTPS_STATUS" = "200" ]; then
            OK=true
            echo "✅ Platform fully healthy (HTTPS 200)"
          fi

          # 2. Fall back to HTTP — follow redirects (301 = nginx up, redirecting to HTTPS)
          if [ "$OK" = "false" ]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST}/health" || echo "000")
            echo "HTTP /health → HTTP $HTTP_STATUS"
            # 200 or 301/302 = Nginx is responding (redirect to HTTPS is expected behavior)
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
              # Nginx is up; check if backend is actually reachable via HTTPS (follow redirect)
              FOLLOW_STATUS=$(curl -skL -o /dev/null -w "%{http_code}" --max-time 15 "http://${HOST}/api/health" || echo "000")
              echo "HTTP→HTTPS /api/health (follow redirect) → HTTP $FOLLOW_STATUS"
              if [ "$FOLLOW_STATUS" = "200" ]; then
                OK=true
                echo "✅ Platform healthy (HTTP→HTTPS redirect → 200)"
              else
                echo "⚠️  Nginx up (${HTTP_STATUS}) but HTTPS backend not reachable — SSL issue likely"
                # Nginx is running; HTTPS/SSL needs repair but not a full redeploy
                OK=false
              fi
            fi
          fi

          # 3. Last resort: try direct port 3000 (firewall may allow it in some configs)
          if [ "$OK" = "false" ]; then
            PORT="${{ secrets.HETZNER_APP_PORT || '3000' }}"
            PORT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST}:${PORT}/api/health" || echo "000")
            echo "Direct port ${PORT} /api/health → HTTP $PORT_STATUS"
            if [ "$PORT_STATUS" = "200" ]; then
              OK=true
              echo "✅ Backend reachable on port ${PORT} (Nginx SSL issue, but backend OK)"
            fi
          fi

          if [ "$OK" = "true" ]; then
            echo "hetzner_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "hetzner_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate platform health
        id: health
        run: |
          HETZNER="${{ steps.hetzner_check.outputs.hetzner_ok || 'unknown' }}"
          FORCE="${{ inputs.force_redeploy || 'false' }}"

          echo "Hetzner status : $HETZNER"
          echo "Force redeploy : $FORCE"

          if [ "$HETZNER" = "true" ] && [ "$FORCE" != "true" ]; then
            echo "✅ Platform healthy — no redeploy needed"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Platform needs attention — triggering redeploy"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write job summary
        if: always()
        run: |
          HETZNER_STATUS="${{ steps.hetzner_check.outputs.hetzner_ok == 'true' && '✅ OK' || '❌ DOWN / SSL issue' }}"
          echo "## 🔗 Unicorn Keep-Alive Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hetzner  | ${HETZNER_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Checked at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_STEP_SUMMARY"

  trigger-redeploy:
    name: 🚀 Trigger Redeploy (if unhealthy)
    runs-on: ubuntu-latest
    needs: keepalive
    if: needs.keepalive.outputs.healthy == 'false'
    permissions:
      actions: write
    steps:
      - name: Fast SSH restart (before full redeploy)
        id: ssh_quick_restart
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
          DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
          CERT_EMAIL: ${{ secrets.OWNER_EMAIL || 'vladoi_ionut@yahoo.com' }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ℹ️  SSH secrets not configured — skipping fast restart"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" << ENDSSH
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/unicorn}"
            DOMAIN="${DOMAIN:-zeusai.pro}"
            CERT_EMAIL="${CERT_EMAIL:-vladoi_ionut@yahoo.com}"
            cd "\$DEPLOY_PATH" 2>/dev/null || cd "/opt/unicorn" 2>/dev/null || true

            resolve_ipv4() {
              getent ahostsv4 "$1" 2>/dev/null | awk 'NR==1{print $1}'
            }

            # Ensure nginx is enabled and running
            if command -v nginx >/dev/null 2>&1; then
              if command -v ufw >/dev/null 2>&1; then
                ufw allow 80/tcp 2>/dev/null || true
                ufw allow 443/tcp 2>/dev/null || true
              fi
              systemctl enable nginx 2>/dev/null || true
              # Test config before starting to avoid silent failures
              if nginx -t 2>/dev/null; then
                systemctl reload nginx 2>/dev/null || systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || true
              else
                echo "⚠️  nginx -t failed — forcing restart (will use current on-disk config)"
                systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || true
              fi
              sleep 2
              systemctl is-active --quiet nginx && echo "✅ Nginx running" || \
                { systemctl start nginx 2>/dev/null || true; echo "ℹ️  nginx start attempted"; }
            fi

            # Attempt HTTPS self-heal if certificate/config is missing.
            if ! curl -kfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health" >/dev/null 2>&1; then
              echo "ℹ️  HTTPS unhealthy locally for $DOMAIN — attempting certbot repair"
              if ! command -v certbot >/dev/null 2>&1; then
                apt-get update -y >/dev/null 2>&1 || true
                apt-get install -y certbot python3-certbot-nginx >/dev/null 2>&1 || snap install --classic certbot >/dev/null 2>&1 || true
              fi

              SERVER_IP=$(curl -4 -fsS --max-time 5 https://ifconfig.me 2>/dev/null || hostname -I | awk '{print $1}')
              DOMAIN_IP=$(resolve_ipv4 "$DOMAIN")
              WWW_DOMAIN_IP=$(resolve_ipv4 "www.$DOMAIN")
              echo "Server IP: ${SERVER_IP} | Domain IP: ${DOMAIN_IP:-'(unresolved)'} | WWW IP: ${WWW_DOMAIN_IP:-'(unresolved)'}"

              if command -v certbot >/dev/null 2>&1 && [ -n "$DOMAIN_IP" ] && [ "$DOMAIN_IP" = "$SERVER_IP" ]; then
                if [ -n "$WWW_DOMAIN_IP" ] && [ "$WWW_DOMAIN_IP" = "$SERVER_IP" ]; then
                  certbot --nginx -d "$DOMAIN" -d "www.$DOMAIN" --non-interactive --agree-tos --email "$CERT_EMAIL" --redirect --keep-until-expiring || true
                else
                  certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos --email "$CERT_EMAIL" --redirect --keep-until-expiring || true
                fi
                nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || systemctl restart nginx 2>/dev/null || true
              else
                echo "⚠️  Skipping certbot repair: DNS mismatch or certbot unavailable"
              fi
            fi

            # Restart PM2 processes safely (avoid delete-all downtime)
            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe unicorn >/dev/null 2>&1; then
                pm2 restart unicorn
              else
                pm2 start ecosystem.config.js --only unicorn
              fi
              # Keep guardian online if defined
              pm2 describe unicorn-health-guardian >/dev/null 2>&1 && pm2 restart unicorn-health-guardian || true
              pm2 save
              # Re-register PM2 startup hook so it survives reboots
              pm2 startup systemd 2>/dev/null | grep "^sudo" | head -1 | bash 2>/dev/null || true
              echo "✅ PM2 safe restart complete"
            elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files 2>/dev/null | grep -q '^unicorn\.service'; then
              systemctl restart unicorn && echo "✅ Restarted via systemctl"
            else
              pkill -f "node backend/index.js" 2>/dev/null || true
              sleep 1
              nohup node backend/index.js > logs/backend.log 2>&1 &
              echo "✅ Restarted via nohup fallback"
            fi

            sleep 10
            curl -sf http://localhost:3000/api/health && echo "✅ Backend healthy after restart" || echo "⚠️  Backend still starting (may need more time)"
            # Verify nginx port 80 is accessible locally
            curl -sf --max-time 5 http://localhost:80/ >/dev/null 2>&1 && echo "✅ Nginx port 80 responding" || echo "⚠️  Nginx port 80 not responding — check: journalctl -u nginx -n 20"
            curl -kfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health" >/dev/null 2>&1 && echo "✅ Nginx HTTPS responding" || echo "⚠️  Nginx HTTPS still not responding — check certbot/nginx logs"

            # ── Ensure server-side self-healing cron exists ───────────────
            if [ -f "${DEPLOY_PATH}/scripts/fix-server.sh" ] && [ ! -f /etc/cron.d/unicorn-self-heal ]; then
              mkdir -p "${DEPLOY_PATH}/logs"
              {
                echo '# Auto-generated by ZeusAI keepalive — heals Nginx/PM2/firewall every 5 minutes'
                echo 'SHELL=/bin/bash'
                echo 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
                echo "*/5 * * * * root bash ${DEPLOY_PATH}/scripts/fix-server.sh ${DEPLOY_PATH} ${DOMAIN} >> ${DEPLOY_PATH}/logs/fix-server-cron.log 2>&1"
              } > /etc/cron.d/unicorn-self-heal
              chmod 644 /etc/cron.d/unicorn-self-heal
              echo "✅ Self-healing cron installed"
            fi
          ENDSSH

      - name: Verify platform recovered after SSH restart
        id: verify_recovery
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "recovered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Allow services 30 s more to stabilise after the SSH restart (server-side
          # health probe already ran inside the SSH command; this wait covers propagation
          # before external re-probing).
          sleep 30
          HEALTH_TIMEOUT=15
          DOMAIN="${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}"
          RECOVERED=false

          # Check HTTPS first (best signal)
          HTTPS_S=$(curl -sk -o /dev/null -w "%{http_code}" --max-time "$HEALTH_TIMEOUT" "https://${DOMAIN}/api/health" || echo "000")
          echo "Hetzner HTTPS re-check: $HTTPS_S"
          [ "$HTTPS_S" = "200" ] && RECOVERED=true

          # Fall back: HTTP with redirect follow
          if [ "$RECOVERED" = "false" ]; then
            HTTP_S=$(curl -skL -o /dev/null -w "%{http_code}" --max-time "$HEALTH_TIMEOUT" "http://${DEPLOY_HOST}/api/health" || echo "000")
            echo "Hetzner HTTP re-check (follow): $HTTP_S"
            [ "$HTTP_S" = "200" ] && RECOVERED=true
          fi

          if [ "$RECOVERED" = "true" ]; then
            echo "✅ Platform recovered via fast SSH restart — skipping full redeploy"
            echo "recovered=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Platform still unhealthy — full redeploy needed"
            echo "recovered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch main deploy workflow
        if: steps.verify_recovery.outputs.recovered != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'hetzner-deploy.yml',
              ref: 'main',
              inputs: { force_deploy: 'true' }
            });
            console.log('✅ Deploy workflow dispatched successfully');
