name: 🟣 Unicorn Supreme + AI — ZERO‑DOWNTIME + AUTO‑HEAL + AUTO‑ROLLBACK + CANARY + AI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: live-deploy-production
  cancel-in-progress: false

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Node setup
      - name: 🟦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ AI — Code Review & Optimization (pre-build)
      - name: 🤖 AI Pre‑Deploy Code Analysis & Optimization
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/ai-predeploy-review.js || echo "AI review failed or warned — continuăm, dar logăm."

      # 4️⃣ Lint & Test
      - name: ✅ Lint & Test UNICORN_FINAL
        working-directory: ./UNICORN_FINAL
        run: |
          npm ci
          npm run lint
          npm test --if-present

      # 5️⃣ Build React (optional — skip if no client dir)
      - name: 🛠️ Build React Client
        run: |
          if [ -d "./client" ]; then
            cd ./client && npm ci && npm run build
          else
            echo "ℹ️  No client/ directory found — skipping React build."
          fi

      # 6️⃣ Stop dacă build-ul pică
      - name: ❌ Stop dacă build-ul React a picat
        if: failure()
        run: |
          echo "❌ Build React FAILED — oprire deploy"
          exit 1

      # 7️⃣ Setup SSH
      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY || secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}

      # 8️⃣ Pregătim slotul GREEN
      - name: 📦 Sync UNICORN to GREEN
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "mkdir -p /var/www/unicorn_green"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_HOST }}:/var/www/unicorn_green/

      # 9️⃣ Build backend în GREEN
      - name: 🟢 Install deps + build backend (GREEN)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            cd /var/www/unicorn_green/UNICORN_FINAL &&
            npm ci &&
            npm run build --if-present
          "

      # 🔟 Smoke tests în GREEN
      - name: 🧪 Smoke Tests (GREEN)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            node /var/www/unicorn_green/scripts/smoke-test.js
          "

      # 1️⃣1️⃣ AI — Deploy Decision (GREEN OK sau nu)
      - name: 🤖 AI Deploy Decision (GREEN)
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/ai-deploy-decision.js || exit 1

      # 1️⃣2️⃣ Dacă GREEN pică sau AI zice NU → rollback instant
      - name: 🔄 AUTO‑ROLLBACK dacă GREEN/AI pică
        if: failure()
        run: |
          echo "❌ GREEN sau AI Deploy Decision FAILED — revenim la BLUE"
          exit 1

      # 1️⃣3️⃣ CANARY DEPLOY — 10%
      - name: 🐤 Canary 10%
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            echo 'Routing 10% traffic to GREEN' &&
            pm2 start /var/www/unicorn_green/UNICORN_FINAL/ecosystem.config.js --name unicorn_canary_10 --update-env 2>/dev/null || \
            pm2 reload unicorn_canary_10 --update-env
          "

      # 1️⃣4️⃣ Health check canary 10%
      - name: ❤️ Health Check Canary 10%
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            for i in 1 2 3; do
              curl -sf http://localhost:3000/health && exit 0 || sleep 5
            done
            exit 1
          "

      # 1️⃣5️⃣ AI — Canary 10% Evaluation
      - name: 🤖 AI Canary 10% Evaluation
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          CANARY_STAGE: "10"
        run: |
          node scripts/ai-canary-eval-10.js || exit 1

      # 1️⃣6️⃣ Dacă pică → rollback
      - name: 🔄 Rollback Canary 10%
        if: failure()
        run: |
          echo "❌ Canary 10% FAILED (health sau AI) — revenim la BLUE"
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "pm2 delete unicorn_canary_10 || true"
          exit 1

      # 1️⃣7️⃣ CANARY DEPLOY — 50%
      - name: 🐤 Canary 50%
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            echo 'Routing 50% traffic to GREEN' &&
            pm2 start /var/www/unicorn_green/UNICORN_FINAL/ecosystem.config.js --name unicorn_canary_50 --update-env 2>/dev/null || \
            pm2 reload unicorn_canary_50 --update-env
          "

      # 1️⃣8️⃣ Health check canary 50%
      - name: ❤️ Health Check Canary 50%
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            for i in 1 2 3; do
              curl -sf http://localhost:3000/health && exit 0 || sleep 5
            done
            exit 1
          "

      # 1️⃣9️⃣ AI — Canary 50% Evaluation
      - name: 🤖 AI Canary 50% Evaluation
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          CANARY_STAGE: "50"
        run: |
          node scripts/ai-canary-eval-50.js || exit 1

      # 2️⃣0️⃣ Dacă pică → rollback
      - name: 🔄 Rollback Canary 50%
        if: failure()
        run: |
          echo "❌ Canary 50% FAILED (health sau AI) — revenim la BLUE"
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "pm2 delete unicorn_canary_50 || true"
          exit 1

      # 2️⃣1️⃣ SWITCH FINAL — 100% GREEN (ZERO‑DOWNTIME)
      - name: 🔄 Switch LIVE to GREEN (ZERO‑DOWNTIME)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            rm -rf /var/www/unicorn_blue &&
            mv /var/www/unicorn /var/www/unicorn_blue || true &&
            mv /var/www/unicorn_green /var/www/unicorn &&
            pm2 delete all || true &&
            pm2 start /var/www/unicorn/UNICORN_FINAL/ecosystem.config.js --update-env &&
            pm2 save
          "

      # 2️⃣2️⃣ Health check final
      - name: ❤️ Health Check LIVE
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            for i in 1 2 3 4 5; do
              curl -sf http://localhost:3000/health && exit 0 || sleep 8
            done
            exit 1
          "

      # 2️⃣3️⃣ AI — Post‑Deploy Risk & Rollback Decision
      - name: 🤖 AI Post‑Deploy Risk Analysis
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/ai-postdeploy-risk.js || echo "AI flagged risk — vezi raport, dar nu forțăm rollback automat aici."

      # 2️⃣4️⃣ AUTO‑HEAL dacă LIVE pică
      - name: 🩺 AUTO‑HEAL dacă LIVE pică
        if: failure()
        run: |
          echo "⚠️ LIVE FAILED — rulăm Server Doctor"
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            DOCTOR=/var/www/unicorn/UNICORN_FINAL/scripts/server-doctor.sh
            [ -f \"\$DOCTOR\" ] && chmod +x \"\$DOCTOR\" && \"\$DOCTOR\" || true
            pm2 delete all || true &&
            pm2 start /var/www/unicorn/UNICORN_FINAL/ecosystem.config.js --update-env &&
            pm2 save
          "

      # 2️⃣5️⃣ Notificare finală
      - name: 📢 Notificare Deploy
        run: echo "🟣 Deploy COMPLET — ZERO‑DOWNTIME + AUTO‑HEAL + AUTO‑ROLLBACK + CANARY + AI finalizat."
