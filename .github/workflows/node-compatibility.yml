name: 🧪 Node Compatibility Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'
  pull_request:
    paths:
      - 'UNICORN_FINAL/src/**'
      - 'UNICORN_FINAL/backend/**'
      - 'UNICORN_FINAL/client/**'
      - 'UNICORN_FINAL/scripts/**'
      - 'UNICORN_FINAL/package.json'
      - 'UNICORN_FINAL/package-lock.json'
      - 'UNICORN_FINAL/ecosystem.config.js'
      - 'package.json'
      - 'Dockerfile'
      - 'UNICORN_FINAL/Dockerfile'
      - '.nvmrc'
      - 'UNICORN_FINAL/.nvmrc'
      - '.github/workflows/node-compatibility.yml'

concurrency:
  group: node-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compat:
    name: Node ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🟦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            UNICORN_FINAL/package-lock.json
            UNICORN_FINAL/client/package-lock.json

      - name: 📦 Install backend deps
        working-directory: ./UNICORN_FINAL
        run: npm ci

      - name: 🔍 Lint backend + site
        working-directory: ./UNICORN_FINAL
        run: npm run lint

      - name: 🧪 Run tests
        working-directory: ./UNICORN_FINAL
        run: npm test --if-present

      - name: 🏗️ Build frontend
        working-directory: ./UNICORN_FINAL/client
        run: |
          npm ci || (sleep 3 && rm -rf node_modules && npm ci)
          CI=false npm run build
