name: Deploy → Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: ✅ Validate build + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            UNICORN_FINAL/package-lock.json
            UNICORN_FINAL/client/package-lock.json

      - name: Install backend dependencies
        working-directory: UNICORN_FINAL
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Lint + tests
        working-directory: UNICORN_FINAL
        run: |
          npm run lint
          npm test

      - name: Build frontend
        working-directory: UNICORN_FINAL/client
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

  deploy:
    name: 🖥️ Hetzner SSH Deploy
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️  No HETZNER_SSH_PRIVATE_KEY secret found – skipping SSH deploy"
            exit 0
          fi
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          DEPLOY_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          ssh-keyscan -t ed25519,rsa -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Hetzner via SSH
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
          DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ ! -f ~/.ssh/deploy_key ]; then
            echo "ℹ️  Hetzner SSH not configured – skipping"
            exit 0
          fi

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -p "${DEPLOY_PORT:-22}" \
              "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
              "set -e
               DEPLOY_PATH='${DEPLOY_PATH}'
               echo '🚀 Hetzner deploy: '\$(date -u)

               cd \"\$DEPLOY_PATH\" || { echo '❌ Deploy path not found'; exit 1; }

               rollback_on_error() {
                 echo '⛑️ Deploy failed. Starting rollback...'
                 if [ -x scripts/rollback-last-backup.sh ]; then
                   bash scripts/rollback-last-backup.sh "\$DEPLOY_PATH" || true
                 fi
                 if command -v pm2 >/dev/null 2>&1; then
                   pm2 startOrRestart ecosystem.config.js || true
                   pm2 save || true
                 fi
               }
               trap rollback_on_error ERR

               echo '💾 Creating backup before update...'
               if [ -x scripts/create-backup.sh ]; then
                 bash scripts/create-backup.sh "\$DEPLOY_PATH" || true
               fi

               echo '📥 git pull…'
               git fetch --all && git reset --hard origin/main

               echo '📦 npm install backend…'
               npm install --legacy-peer-deps --no-audit --no-fund

               echo '🎨 build frontend…'
               if [ -d client ] && [ -f client/package.json ]; then
                 cd client
                 npm install --legacy-peer-deps --no-audit --no-fund
                 npm run build
                 cd "\$DEPLOY_PATH"
               fi

               echo '🧪 local lint + tests…'
               cd "\$DEPLOY_PATH"
               npm run lint
               npm test

               echo '♻️  pm2 restart…'
               if command -v pm2 >/dev/null 2>&1; then
                 pm2 startOrRestart ecosystem.config.js
                 pm2 save
                 echo '✅ PM2 restarted'
               else
                 systemctl restart unicorn 2>/dev/null && echo '✅ systemctl restart ok' || echo '⚠️  pm2/systemctl not found'
               fi

               echo '🛠️  Running server auto-repair (nginx/firewall/ssl)…'
               if [ -f scripts/fix-server.sh ]; then
                             curl -sf http://localhost:3000/api/quantum-integrity/status >/dev/null && echo '🛡️ Quantum Integrity API: OK' || (echo '❌ Quantum Integrity API failed' && false)
                 chmod +x scripts/fix-server.sh || true
                             trap - ERR
                             echo '✅ Deploy complete (idempotent + rollback ready)'
                 bash scripts/fix-server.sh "\$DEPLOY_PATH" "${DOMAIN}" || true
               else
                 echo '⚠️  scripts/fix-server.sh missing — skipping extended repair'
               fi

               sleep 5
               HEALTH=\$(curl -s http://localhost:3000/api/health 2>/dev/null || echo '{\"status\":\"unreachable\"}')
               echo \"🩺 Health: \$HEALTH\"
               curl -kfsS --resolve "${DOMAIN}:443:127.0.0.1" "https://${DOMAIN}/health" >/dev/null 2>&1 && echo '🔒 HTTPS local check: OK' || echo '⚠️  HTTPS local check: FAILED'
              "
