name: Deploy → Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Share the same concurrency group as the primary deploy workflow (hetzner-deploy.yml)
# so that simultaneous Hetzner SSH runs are serialised and never race each other.
concurrency:
  group: zeusai-production
  cancel-in-progress: true

jobs:
  validate:
    name: ✅ Validate build + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            UNICORN_FINAL/package-lock.json
            UNICORN_FINAL/client/package-lock.json

      - name: Install backend dependencies
        working-directory: UNICORN_FINAL
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Lint + tests
        working-directory: UNICORN_FINAL
        run: |
          npm run lint
          npm test

      - name: Build frontend
        working-directory: UNICORN_FINAL/client
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

  deploy:
    # Disabled: hetzner-deploy.yml is the primary SSH deploy workflow.
    # This job is kept for reference only and will never execute.
    if: false
    name: 🖥️ Hetzner SSH Deploy
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          SSH_KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️  No HETZNER_SSH_PRIVATE_KEY secret found – skipping SSH deploy"
            exit 0
          fi
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          DEPLOY_HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          DEPLOY_PORT="${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}"
          ssh-keyscan -t ed25519,rsa -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Hetzner via SSH
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_USER || secrets.SSH_USER || 'root' }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/opt/unicorn' }}
          DOMAIN: ${{ secrets.SITE_DOMAIN || 'zeusai.pro' }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ ! -f ~/.ssh/deploy_key ]; then
            echo "ℹ️  Hetzner SSH not configured – skipping"
            exit 0
          fi

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -p "${DEPLOY_PORT:-22}" \
              "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
              "set -e
               DEPLOY_PATH='${DEPLOY_PATH}'
               echo '🚀 Hetzner deploy: '\$(date -u)

               if [ ! -d \"\$DEPLOY_PATH/.git\" ]; then
                 echo '📁 Deploy path not found — cloning repo for first-time setup...'
                 mkdir -p \"\$(dirname \$DEPLOY_PATH)\"
                 git clone https://github.com/ruffy80/ZeusAI.git \"\$DEPLOY_PATH\"
               fi
               cd \"\$DEPLOY_PATH\" || { echo '❌ Cannot change to deploy path'; exit 1; }

               rollback_on_error() {
                 echo '⛑️ Deploy failed. Starting rollback...'
                 if [ -x scripts/rollback-last-backup.sh ]; then
                   bash scripts/rollback-last-backup.sh "\$DEPLOY_PATH" || true
                 fi
                 if command -v pm2 >/dev/null 2>&1; then
                   pm2 startOrRestart ecosystem.config.js || true
                   pm2 save || true
                 fi
               }
               trap rollback_on_error ERR

               echo '💾 Creating backup before update...'
               if [ -x scripts/create-backup.sh ]; then
                 bash scripts/create-backup.sh "\$DEPLOY_PATH" || true
               fi

               echo '📥 git pull…'
               git fetch --all && git reset --hard origin/main

               echo '📦 npm install…'
               npm install --legacy-peer-deps --no-audit --no-fund
               if [ -d UNICORN_FINAL ]; then
                 npm install --prefix UNICORN_FINAL --legacy-peer-deps --no-audit --no-fund
                 npm rebuild better-sqlite3 --prefix UNICORN_FINAL 2>/dev/null || true
               else
                 npm rebuild better-sqlite3 2>/dev/null || true
               fi

               echo '🎨 build frontend…'
               if [ -d UNICORN_FINAL/client ]; then
                 cd UNICORN_FINAL/client
                 npm install --legacy-peer-deps --no-audit --no-fund
                 npm run build
                 cd ../..
               elif [ -d client ]; then
                 cd client
                 npm install --legacy-peer-deps --no-audit --no-fund
                 npm run build
                 cd ..
               fi

               echo '🧪 local lint + tests…'
               if [ -d UNICORN_FINAL ]; then
                 npm --prefix UNICORN_FINAL run lint
                 npm --prefix UNICORN_FINAL test
               else
                 npm run lint
                 npm test
               fi

               echo '♻️  pm2 restart…'
               if command -v pm2 >/dev/null 2>&1; then
                 pm2 stop all 2>/dev/null || true
                 pm2 delete all 2>/dev/null || true
                 if [ -f UNICORN_FINAL/ecosystem.config.js ]; then
                   pm2 start UNICORN_FINAL/ecosystem.config.js
                 elif [ -f ecosystem.config.js ]; then
                   pm2 start ecosystem.config.js
                 fi
                 pm2 save
                 echo '✅ PM2 started'
               else
                 systemctl restart unicorn 2>/dev/null && echo '✅ systemctl restart ok' || echo '⚠️  pm2/systemctl not found'
               fi

               trap - ERR
               echo '🛠️  Running server auto-repair (nginx/firewall/ssl)…'
               if [ -f UNICORN_FINAL/scripts/fix-server.sh ]; then
                 chmod +x UNICORN_FINAL/scripts/fix-server.sh || true
                 bash UNICORN_FINAL/scripts/fix-server.sh "\$DEPLOY_PATH/UNICORN_FINAL" "${DOMAIN}" || true
               elif [ -f scripts/fix-server.sh ]; then
                 chmod +x scripts/fix-server.sh || true
                 bash scripts/fix-server.sh "\$DEPLOY_PATH" "${DOMAIN}" || true
               else
                 echo '⚠️  scripts/fix-server.sh missing — skipping extended repair'
               fi

               sleep 15
               HEALTH=\$(curl -s http://localhost:3000/api/health 2>/dev/null || echo '{\"status\":\"unreachable\"}')
               echo \"🩺 Health: \$HEALTH\"
               if echo \"\$HEALTH\" | grep -q '\"unreachable\"'; then
                 echo '⚠️  Backend unreachable — showing PM2 logs:'
                 pm2 logs unicorn --lines 30 --nostream 2>/dev/null || true
               fi
               curl -sf http://localhost:3000/api/quantum-integrity/status >/dev/null && echo '🛡️ Quantum Integrity API: OK' || echo '⚠️ Quantum Integrity API: check manually'
               curl -kfsS --resolve "${DOMAIN}:443:127.0.0.1" "https://${DOMAIN}/health" >/dev/null 2>&1 && echo '🔒 HTTPS local check: OK' || echo '⚠️  HTTPS local check: FAILED'
              "
