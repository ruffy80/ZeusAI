name: 🚀 Unicorn Stable Deploy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: unicorn-stable-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ── All GitHub Secrets injected as env vars for create-env.sh ──────────
    env:
      # Auth
      JWT_SECRET:                         ${{ secrets.JWT_SECRET }}
      ADMIN_SECRET:                       ${{ secrets.ADMIN_SECRET }}
      ADMIN_MASTER_PASSWORD:              ${{ secrets.ADMIN_MASTER_PASSWORD }}
      ADMIN_2FA_CODE:                     ${{ secrets.ADMIN_2FA_CODE }}
      WEBHOOK_SECRET:                     ${{ secrets.WEBHOOK_SECRET }}
      HETZNER_WEBHOOK_SECRET:             ${{ secrets.HETZNER_WEBHOOK_SECRET }}
      # GitHub
      GITHUB_TOKEN:                       ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      GH_PAT:                             ${{ secrets.GH_PAT }}
      # AI Providers
      OPENAI_API_KEY:                     ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY:                   ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_API_KEY:                  ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:                     ${{ secrets.GEMINI_API_KEY }}
      MISTRAL_API_KEY:                    ${{ secrets.MISTRAL_API_KEY }}
      COHERE_API_KEY:                     ${{ secrets.COHERE_API_KEY }}
      XAI_API_KEY:                        ${{ secrets.XAI_API_KEY }}
      GROQ_API_KEY:                       ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY:                 ${{ secrets.OPENROUTER_API_KEY }}
      HF_API_KEY:                         ${{ secrets.HF_API_KEY }}
      HUGGINGFACE_API_KEY:                ${{ secrets.HUGGINGFACE_API_KEY }}
      PERPLEXITY_API_KEY:                 ${{ secrets.PERPLEXITY_API_KEY }}
      TOGETHER_API_KEY:                   ${{ secrets.TOGETHER_API_KEY }}
      FIREWORKS_API_KEY:                  ${{ secrets.FIREWORKS_API_KEY }}
      SAMBANOVA_API_KEY:                  ${{ secrets.SAMBANOVA_API_KEY }}
      NVIDIA_NIM_API_KEY:                 ${{ secrets.NVIDIA_NIM_API_KEY }}
      # Stripe
      STRIPE_SECRET_KEY:                  ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PUBLISHABLE_KEY:             ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET:              ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_STARTER_MONTHLY:       ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
      STRIPE_PRICE_STARTER_YEARLY:        ${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}
      STRIPE_PRICE_PRO_MONTHLY:           ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
      STRIPE_PRICE_PRO_YEARLY:            ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
      STRIPE_PRICE_ENTERPRISE_MONTHLY:    ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
      STRIPE_PRICE_ENTERPRISE_YEARLY:     ${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}
      # PayPal
      PAYPAL_CLIENT_ID:                   ${{ secrets.PAYPAL_CLIENT_ID }}
      PAYPAL_CLIENT_SECRET:               ${{ secrets.PAYPAL_CLIENT_SECRET }}
      PAYPAL_WEBHOOK_ID:                  ${{ secrets.PAYPAL_WEBHOOK_ID }}
      # Email / SMTP
      SMTP_HOST:                          ${{ secrets.SMTP_HOST }}
      SMTP_PORT:                          ${{ secrets.SMTP_PORT }}
      SMTP_USER:                          ${{ secrets.SMTP_USER }}
      SMTP_PASS:                          ${{ secrets.SMTP_PASS }}
      # Hetzner
      HETZNER_API_KEY:                    ${{ secrets.HETZNER_API_KEY }}
      HETZNER_API_TOKEN:                  ${{ secrets.HETZNER_API_TOKEN }}
      HETZNER_HOST:                       ${{ secrets.HETZNER_HOST }}
      HETZNER_PASSWORD:                   ${{ secrets.HETZNER_PASSWORD }}
      HETZNER_DNS_API_KEY:                ${{ secrets.HETZNER_DNS_API_KEY }}
      # Vault
      VAULT_MASTER_SECRET:                ${{ secrets.VAULT_MASTER_SECRET }}
      VAULT_EMERGENCY_CODE:               ${{ secrets.VAULT_EMERGENCY_CODE }}
      MASTER_CONFIG_SECRET:               ${{ secrets.MASTER_CONFIG_SECRET }}
      # Social / marketing
      TELEGRAM_BOT_TOKEN:                 ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:                   ${{ secrets.TELEGRAM_CHAT_ID }}
      # Crypto exchanges
      BINANCE_API_KEY:                    ${{ secrets.BINANCE_API_KEY }}
      BINANCE_SECRET:                     ${{ secrets.BINANCE_SECRET }}
      COINBASE_API_KEY:                   ${{ secrets.COINBASE_API_KEY }}
      COINBASE_SECRET:                    ${{ secrets.COINBASE_SECRET }}
      KRAKEN_API_KEY:                     ${{ secrets.KRAKEN_API_KEY }}
      KRAKEN_SECRET:                      ${{ secrets.KRAKEN_SECRET }}
      BYBIT_API_KEY:                      ${{ secrets.BYBIT_API_KEY }}
      BYBIT_SECRET:                       ${{ secrets.BYBIT_SECRET }}
      OKX_API_KEY:                        ${{ secrets.OKX_API_KEY }}
      OKX_SECRET:                         ${{ secrets.OKX_SECRET }}
      OKX_PASSWORD:                       ${{ secrets.OKX_PASSWORD }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🟦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: 🔍 Run Linter (ESLint)
        working-directory: ./UNICORN_FINAL
        run: |
          npm ci
          npm run lint

      - name: 🛠️ Test UNICORN_FINAL
        working-directory: ./UNICORN_FINAL
        run: npm test --if-present

      - name: 🏗️ Build React client UI
        working-directory: ./UNICORN_FINAL/client
        # CI=false: react-scripts treats warnings as errors when CI=true (GitHub Actions default).
        # The project already uses this flag in the vercel-build script for the same reason.
        run: |
          rm -rf node_modules
          npm ci
          CI=false npm run build

      - name: ⚙️ Generate .env with all secrets
        run: |
          bash UNICORN_FINAL/scripts/create-env.sh UNICORN_FINAL

      - name: 🔐 Ensure SSH access (unicorn secrets module auto-bootstrap)
        env:
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          HETZNER_HOST:            ${{ secrets.HETZNER_HOST }}
          HETZNER_DEPLOY_PORT:     ${{ secrets.HETZNER_DEPLOY_PORT || '22' }}
          HETZNER_DEPLOY_USER:     ${{ secrets.HETZNER_DEPLOY_USER || 'root' }}
          HETZNER_PASSWORD:        ${{ secrets.HETZNER_PASSWORD }}
        run: |
          # Folosește modulul unicorn de secrets pentru a garanta că key-auth
          # funcționează înainte de rsync/ssh-agent. Dacă cheia nu e deja
          # autorizată pe server, instalează public key-ul derivat din privata
          # furnizată, folosind HETZNER_PASSWORD ca trust-anchor.
          chmod +x UNICORN_FINAL/scripts/ensure-ssh-access.sh
          bash UNICORN_FINAL/scripts/ensure-ssh-access.sh

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: 🧷 Freshness + anti-downgrade guard
        run: |
          git fetch origin main --quiet
          LATEST_SHA=$(git rev-parse origin/main)
          echo "Latest origin/main commit: $LATEST_SHA"
          echo "Candidate commit: $GITHUB_SHA"
          if [ "$GITHUB_SHA" != "$LATEST_SHA" ]; then
            echo "❌ Refuz deploy stale: acest workflow nu mai este ultimul commit de pe main."
            echo "   Candidate=$GITHUB_SHA"
            echo "   Latest=$LATEST_SHA"
            exit 1
          fi

          DEPLOYED_SHA=$(ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
            "cat /var/www/unicorn/UNICORN_FINAL/.deployed-commit 2>/dev/null || true" | tr -d '[:space:]')
          echo "Server deployed commit: ${DEPLOYED_SHA:-none}"
          if [ -n "$DEPLOYED_SHA" ] && git cat-file -e "${DEPLOYED_SHA}^{commit}" 2>/dev/null; then
            if ! git merge-base --is-ancestor "$DEPLOYED_SHA" "$GITHUB_SHA"; then
              echo "❌ Refuz deploy: candidate-ul nu conține commitul deja deployat pe server (posibil downgrade/rollback)."
              exit 1
            fi
          fi

      - name: 📦 Deploy to Server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='/.env*' \
            --exclude='/logs' \
            --exclude='/backups' \
            --exclude='/snapshots' \
            --exclude='/.archive' \
            --exclude='UNICORN_FINAL/node_modules' \
            --exclude='UNICORN_FINAL/data' \
            --exclude='UNICORN_FINAL/db' \
            --exclude='UNICORN_FINAL/backups' \
            --exclude='UNICORN_FINAL/snapshots' \
            --exclude='UNICORN_FINAL/logs' \
            --exclude='UNICORN_FINAL/.archive' \
            --exclude='UNICORN_FINAL/.unicorn-backups' \
            --exclude='UNICORN_FINAL/.vercel' \
            --exclude='UNICORN_FINAL/generated' \
            --exclude='UNICORN_FINAL/public' \
            --exclude='UNICORN_FINAL/*.log' \
            --exclude='UNICORN_FINAL/.DS_Store' \
            --exclude='UNICORN_FINAL/._*' \
            --exclude='*.zip' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_HOST }}:/var/www/unicorn/
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
            "printf '%s\n' '${{ github.sha }}' > /var/www/unicorn/UNICORN_FINAL/.deployed-commit"

      - name: 🔬 Verify rsync replicated source
        # Catch silent rsync failures: pick a few canonical files from the
        # repo and confirm the deployed copy has the exact same SHA-256.
        run: |
          set -e
          for rel in UNICORN_FINAL/backend/index.js UNICORN_FINAL/package.json; do
            LOCAL_HASH=$(sha256sum "$rel" | awk '{print $1}')
            REMOTE_HASH=$(ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
              "sha256sum /var/www/unicorn/$rel 2>/dev/null | awk '{print \$1}'" || true)
            echo "$rel  local=$LOCAL_HASH  remote=$REMOTE_HASH"
            if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
              echo "❌ Deploy mismatch for $rel — rsync did not replicate the file."
              exit 1
            fi
          done
          echo "✅ rsync replication verified."

      - name: 🩺 Server Doctor + Restart
        env:
          ADMIN_EMAIL: ${{ secrets.SMTP_USER }}
          SITE_DOMAIN: zeusai.pro
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} bash -s << 'SSHEOF'
          # set -uo pipefail (fără -e): fiecare comandă critică are || true explicit, deci
          # erorile individuale sunt raportate dar scriptul continuă — serverul nu rămâne
          # în stare incompletă din cauza unui singur pas eșuat (ex: pm2 delete pe un server fresh).
          set -uo pipefail
          DEPLOY_PATH=/var/www/unicorn/UNICORN_FINAL
          DOMAIN=zeusai.pro
          # Make all scripts executable
          find "$DEPLOY_PATH" -name "*.sh" -type f -exec chmod +x {} \; 2>/dev/null || true
          # Run server-doctor with correct DEPLOY_PATH so it finds ecosystem.config.js,
          # .env, nginx-unicorn.conf, runs npm ci and restarts PM2 in the right directory.
          # server-doctor.sh handles: Node.js install, pm2 install, npm ci, nginx, firewall,
          # pm2 startup systemd, pm2 delete all + start ecosystem.config.js + pm2 save.
          bash "$DEPLOY_PATH/server-doctor.sh" "$DEPLOY_PATH" "$DOMAIN" || true
          # Ensure SSL / HTTPS is active:
          #   - preserves certbot SSL blocks if already present
          #   - reinstalls SSL blocks if cert exists but blocks were wiped (recovery)
          #   - obtains new cert on fresh install
          ADMIN_EMAIL="${SMTP_USER:-admin@zeusai.pro}"
          bash "$DEPLOY_PATH/scripts/setup-ssl.sh" "$DOMAIN" "$ADMIN_EMAIL" "$DEPLOY_PATH" || true
          # Garantează că nginx rutează /api/invoice/* și /api/alerts/* către backend:3000
          # (idempotent — dacă blocurile sunt deja injectate, scriptul iese fără să modifice).
          bash "$DEPLOY_PATH/scripts/ensure-btc-routes.sh" "$DOMAIN" || true
          # HTTPS recovery: dacă portul 443 nu ascultă după setup-ssl.sh, forțează certbot reinstall
          echo "--- Verificare port 443 post-SSL ---"
          if ! ss -tlnp 2>/dev/null | grep -q ':443'; then
            echo "⚠️  Port 443 inactiv — forțez certbot reinstall nginx SSL..."
            certbot --nginx -d "${DOMAIN}" \
              --non-interactive --agree-tos --email "${ADMIN_EMAIL}" \
              --redirect --keep-until-expiring 2>&1 | tail -20 || \
            certbot --nginx -d "${DOMAIN}" \
              --non-interactive --agree-tos --email "admin@${DOMAIN}" \
              --keep-until-expiring 2>&1 | tail -20 || true
            systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true
            if ss -tlnp 2>/dev/null | grep -q ':443'; then
              echo "✅ Port 443 activ după certbot reinstall"
            else
              echo "⚠️  Port 443 tot inactiv — verificați DNS și certbot: certbot certificates"
            fi
          else
            echo "✅ Port 443 activ"
          fi
          # Persist PM2 process list for systemd resurrection at boot
          pm2 save --force 2>/dev/null || true
          echo "✅ Deploy complet: $(pm2 list 2>/dev/null | grep -c online || echo '?') procese PM2 online"
          SSHEOF

      - name: 🏥 Health Check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "http://${{ secrets.HETZNER_HOST }}:3000/health" 2>/dev/null || true)
          echo "Health check Node.js port 3000: $STATUS"
          NGINX_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "http://${{ secrets.HETZNER_HOST }}/health" 2>/dev/null || true)
          echo "Health check Nginx port 80: $NGINX_STATUS"
          # 301/302/308 pe :80 sunt healthy — nginx face redirect HTTP→HTTPS (comportament dorit)
          case "$NGINX_STATUS" in
            200|301|302|308) NGINX_OK=1 ;;
            *)               NGINX_OK=0 ;;
          esac
          # Verificare domeniu real (zeusai.pro) — HTTP și HTTPS
          # Notă: nu folosi || echo "000" cu %{http_code} — curl scrie deja 000 pe stdout
          # la eroare de conectare, iar || echo "000" ar adăuga un al doilea 000 → "000000"
          DOMAIN_HTTP=$(curl -sL -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "http://zeusai.pro/health" 2>/dev/null || true)
          echo "Health check domain HTTP zeusai.pro: $DOMAIN_HTTP"
          DOMAIN_HTTPS=$(curl -skL -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "https://zeusai.pro/health" 2>/dev/null || true)
          echo "Health check domain HTTPS zeusai.pro: $DOMAIN_HTTPS"
          if [ "$STATUS" = "200" ] && [ "$NGINX_OK" = "1" ]; then
            echo "✅ Site LIVE — Node.js și Nginx funcționează corect (Nginx=$NGINX_STATUS)"
          elif [ "$STATUS" = "200" ]; then
            echo "⚠️  Node.js OK dar Nginx NU răspunde pe port 80 (status: $NGINX_STATUS) — auto-recovery..."
            ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
              "nginx -t 2>&1 && systemctl restart nginx && echo '✅ Nginx restarted' || true; ss -tlnp | grep ':80\|:443' || true; pm2 list 2>/dev/null | tail -5 || true"
          else
            echo "⚠️  Health returned Node=$STATUS Nginx=$NGINX_STATUS — checking PM2 status..."
            ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
              "pm2 list && pm2 logs unicorn --lines 30 --nostream" || true
          fi
          if [ "$DOMAIN_HTTP" = "200" ] || [ "$DOMAIN_HTTPS" = "200" ]; then
            echo "✅ Domeniu zeusai.pro accesibil (HTTP=$DOMAIN_HTTP HTTPS=$DOMAIN_HTTPS)"
          else
            echo "⚠️  zeusai.pro NU răspunde (HTTP=$DOMAIN_HTTP HTTPS=$DOMAIN_HTTPS) — forțez recovery SSL remote..."
            ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} \
              "certbot certificates 2>/dev/null || true; ss -tlnp | grep ':80\|:443' || true; \
               if ! ss -tlnp | grep -q ':443'; then \
                 certbot --nginx -d zeusai.pro --non-interactive --agree-tos --email admin@zeusai.pro --redirect --keep-until-expiring 2>&1 | tail -20 || true; \
                 systemctl reload nginx 2>/dev/null || true; \
                 echo 'Post-recovery HTTPS:'; curl -sk -o /dev/null -w '%{http_code}' https://zeusai.pro/health 2>/dev/null; echo ''; \
               fi; \
               nginx -T 2>/dev/null | grep -E 'server_name|listen|ssl_certificate' | head -10 || true" || true
          fi
          # Raport final HTTPS
          if [ "$DOMAIN_HTTPS" = "200" ]; then
            echo "✅ HTTPS zeusai.pro funcțional"
          else
            echo "⚠️  HTTPS zeusai.pro: $DOMAIN_HTTPS — SSL necesită verificare manuală dacă DNS e greșit"
          fi

      - name: 🧪 Commerce Smoke (catalog + delivery)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} bash -s << 'SSHEOF'
          set -uo pipefail
          DEPLOY_PATH=/var/www/unicorn/UNICORN_FINAL
          cd "$DEPLOY_PATH"
          echo "--- Remote syntax check ---"
          node --check src/index.js
          node --check src/site/v2/delivery-registry.js
          node --check test/site-commerce-smoke.test.js
          echo "--- Remote commerce smoke (self-cleaning) ---"
          EXPECTED_MIN_CATALOG_ITEMS=65 PORT=31992 npm run test:site-commerce
          echo "--- Smoke ledger cleanup proof ---"
          grep -R "smoke@zeusai.pro\|smoke-test-loopback" data/commerce-*.json 2>/dev/null && exit 1 || true
          SSHEOF
          echo "--- Live domain catalog count ---"
          node - <<'NODE'
          const min = 65;
          fetch('https://zeusai.pro/api/catalog/master')
            .then(r => r.json().then(j => ({ status: r.status, body: j })))
            .then(({ status, body }) => {
              const count = Array.isArray(body.items) ? body.items.length : 0;
              console.log(`catalog status=${status} count=${count}`);
              if (status !== 200 || count < min) process.exit(1);
            })
            .catch((err) => { console.error(err); process.exit(1); });
          NODE

      - name: 📢 Done
        run: echo "✅ Deploy complet și stabil — ZeusAI / Unicorn LIVE."
