name: 🚀 Unicorn Stable Deploy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🛠️ Build & Test UNICORN_FINAL
        working-directory: ./UNICORN_FINAL
        run: |
          npm ci
          npm run lint
          npm test --if-present

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: 📦 Deploy to Server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.HETZNER_HOST }}:/var/www/unicorn/

      - name: 🩺 Server Doctor + Restart
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} "
            chmod +x /var/www/unicorn/UNICORN_FINAL/server-doctor.sh &&
            /var/www/unicorn/UNICORN_FINAL/server-doctor.sh &&
            pm2 delete all || true &&
            pm2 start /var/www/unicorn/UNICORN_FINAL/ecosystem.config.js --update-env &&
            pm2 save --force 2>/dev/null || true
          "

      - name: 📢 Done
        run: echo "Deploy complet și stabil."
