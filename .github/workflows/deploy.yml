            const serviceId = await pickServiceId(host);
            if (!serviceId) return { ok: false, reason: 'no_service_id', target };
            try {
              const r = await fetch(target.url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'User-Agent': 'unicorn-deploy-verify/1.0' },
                body: JSON.stringify({ serviceId, qty: 1, currency: 'USD' }),
              });
              const text = await r.text();
              let body = null; try { body = JSON.parse(text); } catch (_) {}
              const addrOk = body && body.receive_address === EXPECTED_BTC;
              const satsOk = body && Number(body.amount_sats) > 0;
              const ok = (r.status === 200 || r.status === 201) && addrOk && satsOk;
              return { ok, status: r.status, addrOk, satsOk, sats: body && body.amount_sats, addr: body && body.receive_address, preview: text.slice(0, 200), target };
            } catch (e) {
              return { ok: false, status: 0, preview: String(e && e.message || e), target };
            }
          }
          (async () => {
            for (let attempt = 1; attempt <= 4; attempt++) {
