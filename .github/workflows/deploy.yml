        # legat direct de wallet-ul owner-ului (bc1q4f7e66z…) și că suma este
        # validă în sats. Eșuarea NU pică deploy-ul (continue-on-error) — este
        # un canary preventiv pentru rail-ul sovereign-commerce.
        continue-on-error: true
        run: |
