name: 📊 Actions Usage Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  actions: read
  contents: read

jobs:
  usage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONS_RUNS_WARN_THRESHOLD: '120'
    steps:
      - name: 📈 Summarize last 24h workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          warn_threshold = int(os.environ.get("ACTIONS_RUNS_WARN_THRESHOLD", "120"))
          since = dt.datetime.now(dt.timezone.utc) - dt.timedelta(hours=24)

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "actions-usage-monitor",
          }

          all_runs = []
          for page in range(1, 6):
              url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              runs = payload.get("workflow_runs", [])
              if not runs:
                  break
              all_runs.extend(runs)
              last_created = runs[-1].get("created_at")
              if last_created:
                  created = dt.datetime.fromisoformat(last_created.replace("Z", "+00:00"))
                  if created < since:
                      break

          last_24h = []
          for run in all_runs:
              created_at = run.get("created_at")
              if not created_at:
                  continue
              created = dt.datetime.fromisoformat(created_at.replace("Z", "+00:00"))
              if created >= since:
                  last_24h.append(run)

          counts = {}
          in_progress = 0
          completed = 0
          for run in last_24h:
              name = run.get("name") or "Unknown"
              counts[name] = counts.get(name, 0) + 1
              status = run.get("status")
              if status == "completed":
                  completed += 1
              else:
                  in_progress += 1

          total = len(last_24h)
          top = sorted(counts.items(), key=lambda kv: kv[1], reverse=True)[:20]

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [
              "## Actions usage (last 24h)",
              "",
              f"- Total runs: **{total}**",
              f"- Completed: **{completed}**",
              f"- In progress / queued: **{in_progress}**",
              f"- Warning threshold: **{warn_threshold}** runs / 24h",
              "",
              "| Workflow | Runs |",
              "|---|---:|",
          ]
          for name, count in top:
              lines.append(f"| {name} | {count} |")
          if not top:
              lines.append("| (none) | 0 |")

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")

          if total > warn_threshold:
              print(f"::warning::High Actions volume: {total} runs in last 24h (> {warn_threshold})")
          else:
              print(f"Actions volume OK: {total} runs in last 24h")
          PY
