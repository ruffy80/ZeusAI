name: 🔐 Sync ALL GitHub Secrets → Hetzner .env

# Pushes every secret defined in backend/constants/secretKeys.js from
# GitHub Actions Secrets to the Hetzner server as a .env file, then
# restarts all unicorn PM2 apps so they pick up fresh values.
#
# Trigger:
#   - Manual (workflow_dispatch)
#   - On every push to main (so a new secret added in GitHub is live within minutes)
#   - Every 6 hours (cron safety net)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'UNICORN_FINAL/backend/constants/secretKeys.js'
      - '.github/workflows/sync-all-secrets.yml'
  schedule:
    - cron: '17 */6 * * *'   # every 6h at :17

permissions:
  contents: read

jobs:
  sync:
    name: 🔐 Sync secrets → server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Validate SSH prerequisites
        run: |
          HOST="${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}"
          USER="${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}"
          KEY="${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}"
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$KEY" ]; then
            echo "❌ SSH secrets missing (HETZNER_HOST, HETZNER_DEPLOY_USER, HETZNER_SSH_PRIVATE_KEY)"; exit 1
          fi
          echo "✅ SSH ok"

      - name: Setup SSH
        env:
          PRIV_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$PRIV_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Non-secret diagnostics: lengths + partial hashes
          echo "DEPLOY_USER length: ${#DEPLOY_USER}, md5-first6: $(printf '%s' "$DEPLOY_USER" | md5sum | head -c 6)"
          echo "HOST length: ${#HOST}, md5-first6: $(printf '%s' "$HOST" | md5sum | head -c 6)"
          echo "PORT length: ${#PORT}"
          # root -> md5 first6 = dc76e9  ; 204.168.230.142 -> 73a1b8
          # Verify key format & print fingerprint (safe, no key material leaked)
          echo "--- private key fingerprint ---"
          ssh-keygen -l -f ~/.ssh/deploy_key || { echo "❌ key format invalid"; exit 1; }
          echo "--- first/last byte sanity ---"
          head -c 40 ~/.ssh/deploy_key | head -1
          wc -c ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "--- auth probe (BatchMode, no password fallback) ---"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
              -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -o IdentitiesOnly=yes \
              "${DEPLOY_USER}@${HOST}" 'echo OK_$(hostname) uid=$(id -un)' || {
            echo "❌ SSH auth probe failed — running verbose:"
            ssh -vv -i ~/.ssh/deploy_key -p "$PORT" \
                -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                -o IdentitiesOnly=yes \
                "${DEPLOY_USER}@${HOST}" 'true' 2>&1 | tail -40
            exit 1
          }

      - name: Build .env from ALL_SECRET_KEYS + GitHub Secrets
        env:
          # --- Real keys are stored under SHORT names (set by owner) ---
          # The workflow prefers short-name, falls back to *_API_KEY,
          # and treats placeholder values (your_*, skip, changeme) as empty.
          OPENAI_API_KEY_ALT:   ${{ secrets.OPENAI }}
          DEEPSEEK_API_KEY_ALT: ${{ secrets.DEEPSEEK }}
          GEMINI_API_KEY_ALT:   ${{ secrets.GEMINI }}
          MISTRAL_API_KEY_ALT:  ${{ secrets.MISTRAL }}

          # AI Providers
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:      ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:       ${{ secrets.COHERE_API_KEY }}
          XAI_API_KEY:          ${{ secrets.XAI_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          AMAZON_API_KEY:       ${{ secrets.AMAZON_API_KEY }}
          APPLE_API_KEY:        ${{ secrets.APPLE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY:           ${{ secrets.HF_API_KEY }}
          HUGGINGFACE_API_KEY:  ${{ secrets.HUGGINGFACE_API_KEY }}
          PERPLEXITY_API_KEY:   ${{ secrets.PERPLEXITY_API_KEY }}
          TOGETHER_API_KEY:     ${{ secrets.TOGETHER_API_KEY }}
          FIREWORKS_API_KEY:    ${{ secrets.FIREWORKS_API_KEY }}
          SAMBANOVA_API_KEY:    ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_NIM_API_KEY:   ${{ secrets.NVIDIA_NIM_API_KEY }}
          # Free/fast providers added 2026-04-21
          CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY }}
          CODESTRAL_API_KEY:    ${{ secrets.CODESTRAL_API_KEY }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          CEREBRAS_MODEL:       ${{ secrets.CEREBRAS_MODEL }}
          CODESTRAL_MODEL:      ${{ secrets.CODESTRAL_MODEL }}
          GROQ_MODEL:           ${{ secrets.GROQ_MODEL }}
          OPENROUTER_MODEL:     ${{ secrets.OPENROUTER_MODEL }}
          TOGETHER_MODEL:       ${{ secrets.TOGETHER_MODEL }}
          HF_MODEL:             ${{ secrets.HF_MODEL }}
          MISTRAL_MODEL:        ${{ secrets.MISTRAL_MODEL }}
          OPENAI_MODEL:         ${{ secrets.OPENAI_MODEL }}
          DEEPSEEK_MODEL:       ${{ secrets.DEEPSEEK_MODEL }}
          GEMINI_MODEL:         ${{ secrets.GEMINI_MODEL }}
          COHERE_MODEL:         ${{ secrets.COHERE_MODEL }}
          ANTHROPIC_MODEL:      ${{ secrets.ANTHROPIC_MODEL }}
          GROK_MODEL:           ${{ secrets.GROK_MODEL }}

          # Auth & Security
          JWT_SECRET:             ${{ secrets.JWT_SECRET }}
          ADMIN_SECRET:           ${{ secrets.ADMIN_SECRET }}
          ADMIN_MASTER_PASSWORD:  ${{ secrets.ADMIN_MASTER_PASSWORD }}
          ADMIN_2FA_CODE:         ${{ secrets.ADMIN_2FA_CODE }}
          VAULT_MASTER_SECRET:    ${{ secrets.VAULT_MASTER_SECRET }}
          VAULT_EMERGENCY_CODE:   ${{ secrets.VAULT_EMERGENCY_CODE }}
          WEBHOOK_SECRET:         ${{ secrets.WEBHOOK_SECRET }}
          MASTER_CONFIG_SECRET:   ${{ secrets.MASTER_CONFIG_SECRET }}

          # GitHub / Deploy
          GITHUB_TOKEN_SYNC:  ${{ secrets.GITHUB_TOKEN_SYNC }}
          GITHUB_OWNER:       ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO:        ${{ secrets.GITHUB_REPO }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_REPO_FULL:   ${{ github.repository }}

          # Hetzner
          HETZNER_HOST:        ${{ secrets.HETZNER_HOST }}
          HETZNER_USER:        ${{ secrets.HETZNER_USER }}
          HETZNER_API_TOKEN:   ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_BACKEND_URL: ${{ secrets.HETZNER_BACKEND_URL }}
          DEPLOY_PATH:         ${{ secrets.HETZNER_DEPLOY_PATH }}
          BRANCH:              main

          # Stripe
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:  ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER_MONTHLY:     ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_YEARLY:      ${{ secrets.STRIPE_PRICE_STARTER_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY:         ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY:          ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          STRIPE_PRICE_ENTERPRISE_MONTHLY:  ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
          STRIPE_PRICE_ENTERPRISE_YEARLY:   ${{ secrets.STRIPE_PRICE_ENTERPRISE_YEARLY }}

          # PayPal
          PAYPAL_CLIENT_ID:      ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET:  ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID:     ${{ secrets.PAYPAL_WEBHOOK_ID }}
          PAYPAL_ENV:            ${{ secrets.PAYPAL_ENV }}

          # NOWPayments
          NOWPAYMENTS_API_KEY:     ${{ secrets.NOWPAYMENTS_API_KEY }}
          NOWPAYMENTS_IPN_SECRET:  ${{ secrets.NOWPAYMENTS_IPN_SECRET }}
          NOWPAYMENTS_SANDBOX:     ${{ secrets.NOWPAYMENTS_SANDBOX }}

          # Crypto
          BTC_WALLET_ADDRESS:   ${{ secrets.BTC_WALLET_ADDRESS }}
          ETH_WALLET_ADDRESS:   ${{ secrets.ETH_WALLET_ADDRESS }}
          USDC_WALLET_ADDRESS:  ${{ secrets.USDC_WALLET_ADDRESS }}

          # Exchanges
          BINANCE_API_KEY:  ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET:   ${{ secrets.BINANCE_SECRET }}
          BYBIT_API_KEY:    ${{ secrets.BYBIT_API_KEY }}
          BYBIT_SECRET:     ${{ secrets.BYBIT_SECRET }}
          COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
          COINBASE_SECRET:  ${{ secrets.COINBASE_SECRET }}

          # SMTP
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          EMAIL_FROM_NAME:  ${{ secrets.EMAIL_FROM_NAME }}

          # Social
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          X_BEARER_TOKEN:              ${{ secrets.X_BEARER_TOKEN }}
          X_ACCESS_TOKEN:              ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:             ${{ secrets.X_ACCESS_SECRET }}
          YOUTUBE_API_KEY:             ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_OAUTH_CLIENT_ID:     ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          PINTEREST_TOKEN:             ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_BOARD_ID:          ${{ secrets.PINTEREST_BOARD_ID }}
          PRODUCTHUNT_API_KEY:         ${{ secrets.PRODUCTHUNT_API_KEY }}
          PRODUCTHUNT_API_SECRET:      ${{ secrets.PRODUCTHUNT_API_SECRET }}
          PRODUCTHUNT_DEVELOPER_TOKEN: ${{ secrets.PRODUCTHUNT_DEVELOPER_TOKEN }}

          # Domain / DNS
          DOMAIN:          ${{ secrets.DOMAIN }}
          SAV_API_TOKEN:   ${{ secrets.SAV_API_TOKEN }}
          PUBLIC_APP_URL:  ${{ secrets.PUBLIC_APP_URL }}
          APP_BASE_URL:    ${{ secrets.APP_BASE_URL }}
          FRONTEND_URL:    ${{ secrets.FRONTEND_URL }}

          # AWS
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BACKUP_BUCKET:      ${{ secrets.AWS_BACKUP_BUCKET }}

          # Owner / Admin
          ADMIN_EMAIL:       ${{ secrets.ADMIN_EMAIL }}
          LEGAL_OWNER_EMAIL: ${{ secrets.LEGAL_OWNER_EMAIL }}
          LEGAL_OWNER_NAME:  ${{ secrets.LEGAL_OWNER_NAME }}
          LEGAL_OWNER_BTC:   ${{ secrets.LEGAL_OWNER_BTC }}
          OWNER_EMAIL:       ${{ secrets.OWNER_EMAIL }}

          # Misc
          DEV_API_KEY:   ${{ secrets.DEV_API_KEY }}
          EXEC_SERVERS:  ${{ secrets.EXEC_SERVERS }}
          CORS_ORIGINS:  ${{ secrets.CORS_ORIGINS }}
        run: |
          node -e "
          const fs=require('fs');
          const {ALL_SECRET_KEYS}=require('./UNICORN_FINAL/backend/constants/secretKeys');
          const extra=['GROQ_API_KEY','OPENROUTER_API_KEY','HF_API_KEY','HUGGINGFACE_API_KEY',
            'PERPLEXITY_API_KEY','TOGETHER_API_KEY','FIREWORKS_API_KEY','SAMBANOVA_API_KEY','NVIDIA_NIM_API_KEY',
            'BACKEND_API_URL','NODE_ENV','PORT'];
          const keys=[...new Set([...ALL_SECRET_KEYS,...extra])];
          // Treat these literal values as placeholder (empty)
          const isPlaceholder = v => !v
            || /^your_.*_here$/i.test(v)
            || /^(skip|changeme|todo|placeholder|xxx+|\\*+)\$/i.test(v)
            || /^(sk-proj-\\.\\.\\.|sk-\\.\\.\\.|AIza\\.\\.\\.)$/i.test(v);
          // Short-name fallbacks: real keys live under OPENAI/DEEPSEEK/GEMINI/MISTRAL
          const FALLBACK = {
            OPENAI_API_KEY:   process.env.OPENAI_API_KEY_ALT,
            DEEPSEEK_API_KEY: process.env.DEEPSEEK_API_KEY_ALT,
            GEMINI_API_KEY:   process.env.GEMINI_API_KEY_ALT,
            MISTRAL_API_KEY:  process.env.MISTRAL_API_KEY_ALT,
          };
          const out=['# GENERATED by sync-all-secrets.yml @ '+new Date().toISOString()];
          let set=0,empty=0,fellback=0;
          for(const k of keys){
            let v=process.env[k]||'';
            if(isPlaceholder(v) && FALLBACK[k] && !isPlaceholder(FALLBACK[k])){
              v=FALLBACK[k];
              fellback++;
            }
            if(isPlaceholder(v)) v='';
            out.push(k+'='+v.replace(/\n/g,'\\\\n'));
            if(v) set++; else empty++;
          }
          // Force fixed values
          out.push('BACKEND_API_URL=http://127.0.0.1:3000');
          out.push('NODE_ENV=production');
          out.push('PORT=3000');
          fs.writeFileSync('/tmp/server.env',out.join('\n')+'\n',{mode:0o600});
          console.log('✅ built .env with',keys.length,'keys ('+set+' set, '+empty+' empty, '+fellback+' via short-name fallback)');
          "

      - name: Upload .env + restart PM2
        env:
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST || secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER || secrets.HETZNER_USER || secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT || secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH || '/var/www/unicorn/UNICORN_FINAL' }}
        run: |
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" \
              -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              /tmp/server.env "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env.new"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
              -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" "
                cd '${DEPLOY_PATH}' &&
                mv .env.new .env && chmod 600 .env &&
                echo '✅ .env installed ('\$(grep -c '=' .env)' keys)' &&
                (pm2 reload ecosystem.config.js --update-env || pm2 reload unicorn-backend unicorn-site unicorn-guardian --update-env) 2>&1 | tail -12 &&
                sleep 3 &&
                curl -sf http://127.0.0.1:3000/api/health | head -c 400 || echo 'backend health check failed'
              "
