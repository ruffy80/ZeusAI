version: 2

updates:
  # ── Root Next.js app ────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-dom"]
      next:
        patterns: ["next"]

  # ── Main production app (UNICORN_FINAL) ─────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/UNICORN_FINAL"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 10
    groups:
      security-patches:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
    ignore:
      # ccxt updates are very frequent and breaking — pin manually
      - dependency-name: "ccxt"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # NOTE: release/ directory is intentionally excluded — it contains archived
  # build artifacts and is not a maintained dependency tree.
